[workspace]
members = [".", "crates/ironclaw_common", "crates/ironclaw_observability", "crates/ironclaw_host_api", "crates/ironclaw_host_ingress", "crates/ironclaw_filesystem", "crates/ironclaw_attachments", "crates/ironclaw_extractors", "crates/ironclaw_memory", "crates/ironclaw_memory_native", "crates/ironclaw_events", "crates/ironclaw_event_projections", "crates/ironclaw_event_streams", "crates/ironclaw_reborn_event_store", "crates/ironclaw_extensions", "crates/ironclaw_extension_host", "crates/ironclaw_processes", "crates/ironclaw_dispatcher", "crates/ironclaw_scripts", "crates/ironclaw_process_sandbox", "crates/ironclaw_mcp", "crates/ironclaw_wasm", "crates/ironclaw_wasm_limiter", "crates/ironclaw_capabilities", "crates/ironclaw_secrets", "crates/ironclaw_network", "crates/ironclaw_host_runtime", "crates/ironclaw_runtime_policy", "crates/ironclaw_authorization", "crates/ironclaw_run_state", "crates/ironclaw_approvals", "crates/ironclaw_resources", "crates/ironclaw_auth", "crates/ironclaw_trust", "crates/ironclaw_turns", "crates/ironclaw_agent_loop", "crates/ironclaw_threads", "crates/ironclaw_prompt_envelope", "crates/ironclaw_hooks", "crates/ironclaw_loop_host", "crates/ironclaw_runner", "crates/ironclaw_reborn_config", "crates/ironclaw_reborn_composition", "crates/ironclaw_reborn_identity", "crates/ironclaw_first_party_extensions", "crates/ironclaw_reborn_cli", "crates/ironclaw_reborn_traces", "crates/ironclaw_webui", "crates/ironclaw_reborn_openai_compat", "crates/ironclaw_conversations", "crates/ironclaw_product", "crates/ironclaw_telegram_extension", "crates/ironclaw_telegram_v2_adapter", "crates/ironclaw_slack_extension", "crates/ironclaw_outbound", "crates/ironclaw_triggers", "crates/ironclaw_projects", "crates/ironclaw_architecture", "crates/ironclaw_safety", "crates/ironclaw_skills", "crates/ironclaw_llm", "crates/ironclaw_embeddings", "tools/ironclaw_stress"]
exclude = [
    "crates/ironclaw_silk_decoder",
    "fuzz",
    "crates/ironclaw_safety/fuzz",
]

[workspace.package]
rust-version = "1.96"

[workspace.dependencies]
# WASM sandbox for untrusted tool execution.
# Floor 46.0.1: minimum current major patch containing the fixes for the
# Wasmtime WASI FilePerms advisories RUSTSEC-2026-0149 and RUSTSEC-2026-0188.
wasmtime = { version = "46.0.1", features = ["component-model"] }
# Only the WASI p2 host API is linked (`p2::add_to_linker_sync`). Keeping
# defaults off avoids compiling unused p0/p1 WITX proc macros under remote CI
# sccache workers, where registry sidecar WITX files are not present.
wasmtime-wasi = { version = "46.0.1", default-features = false, features = ["p2"] }

# Maintainability guardrails against dead/speculative public API
# (the "Theme 1" anti-pattern from the maintainability audit: accessors,
# `_dyn` variants, and getters with zero callers that needlessly expand the
# stable surface). These are `warn`, not `deny`, and are *opted into*
# per-crate via `[lints] workspace = true` so they do not flood the build
# with pre-existing noise across the whole workspace. Currently scoped to the
# hook/reborn crates.
#
# - `unreachable_pub`: flags `pub` items that are not reachable outside their
#   crate — the classic "this should be `pub(crate)`" smell.
# - `dead_code`: warn on never-used items (this is the rustc default, declared
#   here so it survives any future `#![allow(dead_code)]` creep at the crate root).
[workspace.lints.rust]
unreachable_pub = "warn"
dead_code = "warn"
# A `Result`/`#[must_use]` value that is silently discarded is a swallowed
# error. `unused_must_use` is warn-by-default; deny it so a dropped `Result`
# fails the build instead of hiding a failure. Verified zero current fires
# across the workspace, so this only guards against *future* silent drops.
#
# Companion clippy lints that catch the other swallow idioms are deferred to
# follow-up PRs because they need a real cleanup first (measured on this tree):
#   * `clippy::let_underscore_must_use` — 67 sites (`let _ = <must_use>`), a mix
#     of safe discards and genuine swallows (e.g. an ignored async delete).
#   * `clippy::map_err_ignore` — ~861 sites; a blanket deny is wrong here since
#     `.claude/rules/error-handling.md` permits `map_err` to a *specific* typed
#     error and only forbids cause-dropping ones. Needs a scoped sweep.
unused_must_use = "deny"

[package]
# Tier B (see docs/plans/2026-07-02-reborn-internal-module-refactor.md §8):
# the v1 legacy monolith (`src/`, package `ironclaw_legacy`, binary
# `ironclaw-legacy`) has been deleted. This package now exists solely to host
# the Reborn integration test suite (`tests/integration/*`, the `reborn_*`
# `[[test]]` targets below, and their shared `[dev-dependencies]`) — it has no
# library or binary target of its own.
name = "ironclaw_reborn_integration_tests"
publish = false
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"

[package.metadata.ironclaw]
layer = "app"

[package.metadata.dist]
dist = false

[dev-dependencies]
# Common utility crates the Reborn integration tests (`tests/integration/*`,
# `tests/reborn_*.rs`) reference directly — previously satisfied via the now-
# deleted v1 `[dependencies]` block, since regular deps were visible to test
# binaries too.
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
thiserror = "2"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "v5", "serde"] }
secrecy = { version = "0.10", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
axum = { version = "0.8", features = ["ws"] }
tower = { version = "0.5", features = ["util"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart", "rustls-tls-native-roots", "stream"] }
base64 = "0.22"
rust_decimal = { version = "1", features = ["serde", "serde-with-str"] }
regex = "1"
sha2 = "0.11"
hex = "0.4"
url = "2"
toml = "1.1"
zip = { version = "8", default-features = false, features = ["deflate"] }
libsql = { version = "0.9", default-features = false, features = ["core", "replication", "remote", "tls"] }
ironclaw_host_api = { path = "crates/ironclaw_host_api", version = "0.1.0" }
ironclaw_host_ingress = { path = "crates/ironclaw_host_ingress", version = "0.1.0" }
ironclaw_runtime_policy = { path = "crates/ironclaw_runtime_policy", version = "0.1.0" }
ironclaw_common = { path = "crates/ironclaw_common" }
ironclaw_safety = { path = "crates/ironclaw_safety" }
ironclaw_reborn_traces = { path = "crates/ironclaw_reborn_traces", version = "0.1.0" }
# The Reborn integration harness provisions Postgres testcontainers in every
# feature lane (StorageMode::Postgres skips at runtime when unavailable), so
# the pool deps are unconditional dev-dependencies (the `postgres` feature is
# a marker with no dependency gating).
deadpool-postgres = "0.14"
tokio-postgres = { version = "0.7", features = ["with-uuid-1", "with-chrono-0_4", "with-serde_json-1"] }
# The generic-extension ingress/delivery integration suites verify webhook
# HMAC recipes and collect axum response bodies.
hmac = "0.13"
http-body-util = "0.1"
tokio-test = "0.4"
tracing-test = "0.2"
testcontainers-modules = { version = "0.12", features = ["postgres"] }
pretty_assertions = "1"
tempfile = "3"
insta = { version = "1.46.3", features = ["yaml"] }
# Pull the LLM crate's `testing` feature in only for tests so `StubLlm` and
# fault-injection helpers don't ship in release binaries.
ironclaw_llm = { path = "crates/ironclaw_llm", version = "0.1.0", features = ["test-support"] }
ironclaw_agent_loop = { path = "crates/ironclaw_agent_loop", version = "0.1.0", features = ["test-support"] }
ironclaw_approvals = { path = "crates/ironclaw_approvals", version = "0.1.0", features = ["test-support"] }
# Pull the auth crate's `test-support` feature in only for tests so the
# `test_support::conformance` OAuth-flow suite (used by the
# `reborn_integration_oauth_connect` test) doesn't ship in release binaries.
ironclaw_auth = { path = "crates/ironclaw_auth", version = "0.1.0", features = ["test-support"] }
# C-ATTACH: `InboundAttachment` for `submit_turn_with_image_attachment`.
ironclaw_attachments = { path = "crates/ironclaw_attachments", version = "0.1.0" }
# `test-support` enables the in-memory-backed capability-lease store constructor
# for the integration-test harness (cfg(test) does not propagate into deps).
ironclaw_authorization = { path = "crates/ironclaw_authorization", version = "0.1.0", features = ["test-support"] }
# Integration harness builds a fresh in-memory `ReplayPayloadStore`
# fallback for harnesses without shared approval parts (§5.3 Stage 2a-i).
ironclaw_capabilities = { path = "crates/ironclaw_capabilities", version = "0.1.0" }
ironclaw_extensions = { path = "crates/ironclaw_extensions", version = "0.1.0" }
# Extension-runtime P2: the invented-vendor fixture factory the integration
# harness registers (`NativeExtensionFactory`), plus scripted channel fakes.
ironclaw_extension_host = { path = "crates/ironclaw_extension_host", version = "0.1.0", features = ["test-support"] }
ironclaw_filesystem = { path = "crates/ironclaw_filesystem", version = "0.1.0" }
ironclaw_mcp = { path = "crates/ironclaw_mcp", version = "0.1.0" }
ironclaw_first_party_extensions = { path = "crates/ironclaw_first_party_extensions", version = "0.1.0" }
# W6-COLD-SPOTS: `CommunicationPreferenceRecord`/`CommunicationPreferenceKey`
# for the outbound-store-durability reopen test.
ironclaw_outbound = { path = "crates/ironclaw_outbound", version = "0.1.0", features = ["test-support"] }
# Recording hook doubles + `HookDispatcherBuilderFactory` builders for the
# C-HOOKS / E-HOOK-INFRA int-tier coverage (tests/integration/support/hooks.rs).
ironclaw_hooks = { path = "crates/ironclaw_hooks", version = "0.1.0" }
ironclaw_host_runtime = { path = "crates/ironclaw_host_runtime", version = "0.1.0" }
ironclaw_network = { path = "crates/ironclaw_network", version = "0.1.0" }
ironclaw_processes = { path = "crates/ironclaw_processes", version = "0.1.0", features = ["test-support"] }
ironclaw_resources = { path = "crates/ironclaw_resources", version = "0.1.0", features = ["test-support"] }
ironclaw_secrets = { path = "crates/ironclaw_secrets", version = "0.1.0" }
ironclaw_product = { path = "crates/ironclaw_product", version = "0.1.0", features = ["test-support"] }
ironclaw_runner = { path = "crates/ironclaw_runner", version = "0.1.0", features = ["test-support"] }
# `ironclaw_webui` + `ironclaw_reborn_identity` sit on the int-tier coverage
# lane (identity_resolution_smoke / webui_v2_router_smoke); they compile into
# every int-tier build, behaviorally inert for suites that never call them.
# W5-SLACK-PAIR: the Slack host surface grows the lcov denominator by ~42k
# lines of slack_*.rs modules (previously invisible, not 0%) and unlocks
# composing them in int-tier tests. All 17 of those modules are recompiled
# into every int-tier test binary — a real, one-time build-time cost for the
# lane, behaviorally inert for suites that never reference Slack types.
ironclaw_reborn_composition = { path = "crates/ironclaw_reborn_composition", version = "0.1.0", features = ["test-support"] }
ironclaw_loop_host = { path = "crates/ironclaw_loop_host", features = ["test-support"] }
# Direct dev-dep: composition deliberately does NOT re-export the bare
# `webui_v2_router`/`WebUiV2State` (facade-only rule), and the router smoke
# drives the bare router, not the `webui_v2_app` wrapper. The v2 route surface
# merged into `ironclaw_webui` (as its public `webui_v2` module).
ironclaw_webui = { path = "crates/ironclaw_webui", version = "0.1.0" }
# Direct dev-dep for the same reason as ironclaw_webui above: composition's
# facade-only rule means it re-exports no SLACK_V2_ADAPTER_ID/SLACK_USER_ACTOR_KIND-style
# constants; Slack pairing/actor-resolution int-tier tests need them directly.
ironclaw_slack_extension = { path = "crates/ironclaw_slack_extension", version = "0.1.0" }
ironclaw_telegram_extension = { path = "crates/ironclaw_telegram_extension", version = "0.1.0" }
ironclaw_reborn_config = { path = "crates/ironclaw_reborn_config", version = "0.1.0" }
ironclaw_reborn_openai_compat = { path = "crates/ironclaw_reborn_openai_compat", version = "0.1.0"}
ironclaw_run_state = { path = "crates/ironclaw_run_state", version = "0.1.0", features = ["test-support"] }
ironclaw_threads = { path = "crates/ironclaw_threads", version = "0.1.0" }
# `test-support` unlocks `ironclaw_turns::test_support::in_memory_turn_state_store`
# — the shared `TurnStateRowStore<InMemoryBackend>` double that replaced
# the deleted public `InMemoryTurnStateStore` (refactor #6263). cfg(test) does not
# propagate from an integration-test binary into its deps, so the feature is
# explicit here.
ironclaw_turns = { path = "crates/ironclaw_turns", version = "0.1.0", features = ["test-support"] }
# `InMemoryDurableEventLog` for the W5-WEBUI-API-1 SSE scenario's test-local
# `ProjectionStream` wiring (`build_webui_event_stream_for_test`).
ironclaw_events = { path = "crates/ironclaw_events", version = "0.1.0" }
# `test-support` unlocks `TrustedTriggerSubmitRequest::new_for_test` (E-TRIGGERED-SUBMIT
# harness seam) — cfg(test) does not propagate from an integration-test binary into its deps.
ironclaw_triggers = { path = "crates/ironclaw_triggers", version = "0.1.0", features = ["test-support"] }
# Trigger-conversation binding/session services for the E-TRIGGERED-SUBMIT harness seam —
# mirrors the conversation-services type production's own local-dev build wires for the
# trusted-trigger submit path (ironclaw_reborn_composition::runtime.rs).
ironclaw_conversations = { path = "crates/ironclaw_conversations", version = "0.1.0" }
ironclaw_trust = { path = "crates/ironclaw_trust", version = "0.1.0" }
ironclaw_wasm = { path = "crates/ironclaw_wasm", version = "0.1.0" }
# `ironclaw_outbound/test-support` provides the in-memory-backed
# `OutboundStateStore` the triggered-delivery outcome-seam int-tier
# proof injects (asserting a real `TriggeredRunDeliveryDriver`'s recorded
# outcome via the same public store trait the composition factory accepts).
# Same idea for embeddings: `MockEmbeddings` is only reachable in dev builds.
ironclaw_embeddings = { path = "crates/ironclaw_embeddings", version = "0.1.0", features = ["test-support"] }
# Named `#[case]` parametrization for the storage-backend matrix tests (slice 3).
rstest = "0.23"

