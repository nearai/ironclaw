[package]
name = "weechat-relay-channel"
version = "0.1.0"
edition = "2021"
description = "WeeChat Relay WASM channel for IronClaw"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Must match IronClaw's channel interface version
# Check your IronClaw repo's channels-src/telegram/Cargo.toml for the correct version
wit-bindgen = "0.36"

[profile.release]
opt-level = "s"
lto = true
strip = true

[workspace]
