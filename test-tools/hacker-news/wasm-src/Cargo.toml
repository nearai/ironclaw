[package]
name = "hacker-news-tool"
version = "0.1.0"
edition = "2021"
description = "Canned Hacker News top-stories extension for IronClaw (#5459 network+no-key test fixture, WASM component)"
license = "MIT OR Apache-2.0"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "=0.36"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = "s"
lto = true
strip = true
codegen-units = 1

[workspace]
