schema_version = "reborn.extension_manifest.v2"
id = "hacker-news"
name = "Hacker News"
version = "0.1.0"
description = "Toy tool (#5459 test fixture): returns canned Hacker News top stories. The network + no-key case: declares its egress host but injects no credential. Data is CANNED (no real Hacker News call), so it always completes once activated."
trust = "first_party_requested"

[runtime]
kind = "wasm"
module = "wasm/hacker_news_tool.wasm"

# Keyless networked capability: declares the `network` effect and its egress
# host directly via `network_targets`, with NO runtime credential. It therefore
# gets an `ApplyNetworkPolicy` obligation (scoped to news.ycombinator.com) and
# NO secret-injection obligation. The fixture returns canned data and never
# actually calls out.
[[capabilities]]
id = "hacker-news.top_stories"
description = "Return the current top Hacker News stories (title, url, score, author, comment count). Optional `limit` (1-10, default 5)."
effects = ["dispatch_capability", "network"]
default_permission = "allow"
visibility = "model"
input_schema_ref = "schemas/hacker-news/top_stories.input.v1.json"
output_schema_ref = "schemas/hacker-news/top_stories.output.v1.json"
prompt_doc_ref = "prompts/hacker-news/top_stories.md"

[[capabilities.network_targets]]
scheme = "https"
host_pattern = "news.ycombinator.com"
