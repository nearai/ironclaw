[package]
name = "darkirc-channel"
version = "0.1.0"
edition = "2024"
description = "DarkIRC WASM channel for IronClaw"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Must match ironclaw's Telegram channel (channels-src/telegram/Cargo.toml)
wit-bindgen = "0.36"

[profile.release]
opt-level = "s"
lto = true
strip = true

[workspace]
