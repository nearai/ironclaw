[package]
name = "ironclaw_openai_compat"
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
description = "IronClaw-native OpenAI-compatible API contract surface"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[package.metadata.ironclaw]
layer = "products"

[dependencies]
async-trait = "0.1"
base64 = "0.22"
chrono = { version = "0.4", features = ["clock"] }
hex = "0.4"
ironclaw_attachments = { path = "../ironclaw_attachments", version = "0.1.0" }
ironclaw_common = { path = "../ironclaw_common", version = "0.4.2" }
ironclaw_filesystem = { path = "../ironclaw_filesystem", version = "0.1.0" }
ironclaw_host_api = { path = "../ironclaw_host_api", version = "0.1.0" }
ironclaw_product_adapters = { path = "../ironclaw_product_adapters", version = "0.1.0" }
ironclaw_product_workflow = { path = "../ironclaw_product_workflow", version = "0.1.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
thiserror = "2"
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }

async-stream = { version = "0.3" }
axum = { version = "0.8" }
futures-core = { version = "0.3" }
tokio = { version = "1", features = ["sync", "time"] }

[dev-dependencies]
# Force `storage` on for this crate's own test builds so the ref-store contract
# suite runs under a bare `cargo test -p ironclaw_openai_compat`.
ironclaw_openai_compat = { path = "." }
http = "1"
http-body-util = "0.1"
ironclaw_product_adapters = { path = "../ironclaw_product_adapters", features = ["test-support"] }
ironclaw_threads = { path = "../ironclaw_threads", version = "0.1.0" }
ironclaw_turns = { path = "../ironclaw_turns", version = "0.1.0" }
tokio = { version = "1", features = ["macros", "rt", "time"] }
tower = { version = "0.5", features = ["util"] }

[lints]
workspace = true
