[package]
name = "ironclaw_reborn_webui_ingress"
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
description = "Host-owned listener binding + serve loop for the Reborn WebChat v2 HTTP gateway"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[package.metadata.ironclaw]
layer = "products"

[features]
default = []
webui-v2-beta = ["ironclaw_webui_v2/webui-v2-beta"]
openai-compat-beta = [
    "dep:ironclaw_product_adapters",
    "ironclaw_product_adapters/host-auth-mint",
    "dep:ironclaw_reborn_openai_compat",
    "ironclaw_reborn_openai_compat/openai-compat-beta",
]
# Compile in `InMemorySessionStore` as a public crate item. Off by
# default so a production deployment cannot accidentally wire the
# process-local store as a `SessionStore` impl — `SessionAuthenticator`
# would happily accept it, but sessions would vanish on every restart
# and the O(n) constant-time lookup would scale poorly under real
# user load. Local dev and tests opt in by enabling this feature.
dev-in-memory-session = []

[dependencies]
async-trait = "0.1"
axum = "0.8"
base64 = "0.22"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde", "std"] }
hex = "0.4.3"
hmac = "0.13"
ironclaw_host_api = { path = "../ironclaw_host_api" }
ironclaw_product_adapters = { path = "../ironclaw_product_adapters", optional = true }
ironclaw_product_workflow = { path = "../ironclaw_product_workflow" }
ironclaw_reborn_openai_compat = { path = "../ironclaw_reborn_openai_compat", optional = true }
ironclaw_webui_v2 = { path = "../ironclaw_webui_v2" }
jsonwebtoken = { version = "10", features = ["aws_lc_rs"] }
lru = "0.18"
parking_lot = "0.12"
rand = "0.10"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
secrecy = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
subtle = "2"
thiserror = "2"
tokio = { version = "1", features = ["macros", "net", "rt", "rt-multi-thread", "signal", "sync", "time"] }
tower = { version = "0.5", features = ["util"] }
tower-http = { version = "0.6", features = ["cors", "set-header", "limit", "catch-panic"] }
tracing = "0.1"
url = "2"
urlencoding = "2"
# `uuid` is consumed by `InMemorySessionStore` (session.rs) and the
# library's internal tests under `#[cfg(test)]`. The earlier attempt
# to mark it `optional = true` broke `cargo test` because the
# `cfg(test)` gate activated the `use uuid::Uuid;` import without
# pulling in the optional crate.
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
axum = { version = "0.8", features = ["macros"] }
http = "1"
http-body-util = "0.1"
# End-to-end session test (`tests/session_round_trip.rs`) drives the
# composed `webui_v2_app` with a minimal `RebornServicesApi` stub so
# the assertion covers SessionAuthenticator + the v2 route surface
# together. The crates below supply the trait + DTO shapes the stub
# implements.
ironclaw_product_workflow = { path = "../ironclaw_product_workflow", features = ["test-support"] }
ironclaw_threads = { path = "../ironclaw_threads" }
ironclaw_turns = { path = "../ironclaw_turns" }
# Generate test RSA keypairs at test time so the OIDC e2e test can
# mint real signed JWTs without relying on a checked-in private key.
rsa = { version = "0.9", features = ["sha2"] }
rand = "0.10"
rand_core = { version = "0.6", features = ["getrandom"] }
base64 = "0.22"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "net", "time", "io-util"] }
