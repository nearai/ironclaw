[package]
name = "ironclaw_reborn_migration"
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
description = "Reborn operator migration utilities"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[package.metadata.ironclaw]
layer = "app"

# Keep out of cargo-dist release packaging; this is an operator/migration tool,
# not a shipped product binary (mirrors ironclaw_reborn_cli).
[package.metadata.dist]
dist = false

[[bin]]
name = "ironclaw-reborn-extension-ownership-migration"
path = "src/extension_ownership_main.rs"

[features]
default = ["libsql", "postgres"]
libsql = [
    "dep:libsql",
    "ironclaw_filesystem/libsql",
    "ironclaw_reborn_composition/libsql",
]
postgres = [
    "dep:deadpool-postgres",
    "ironclaw_filesystem/postgres",
    "ironclaw_reborn_composition/postgres",
]

[dependencies]
ironclaw_host_api = { path = "../ironclaw_host_api" }
ironclaw_filesystem = { path = "../ironclaw_filesystem" }
ironclaw_extensions = { path = "../ironclaw_extensions" }
ironclaw_reborn_composition = { path = "../ironclaw_reborn_composition", features = [
    "migration-support",
] }
ironclaw_reborn_identity = { path = "../ironclaw_reborn_identity" }

anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive", "env"] }
secrecy = { version = "0.10", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "fs"] }

deadpool-postgres = { version = "0.14", optional = true }
libsql = { version = "0.9", optional = true, default-features = false, features = ["core", "replication", "remote", "tls"] }

[dev-dependencies]
tempfile = "3"
