[package]
name = "ironclaw_reborn_migration"
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
description = "Migrates IronClaw v1 / engine-v2 persisted state into the Reborn state substrate"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[package.metadata.ironclaw]
layer = "app"

# Keep out of cargo-dist release packaging; this is an operator/migration tool,
# not a shipped product binary (mirrors ironclaw_reborn_cli).
[package.metadata.dist]
dist = false

[[bin]]
name = "ironclaw-reborn-migration"
path = "src/main.rs"

[[bin]]
name = "ironclaw-reborn-extension-ownership-migration"
path = "src/extension_ownership_main.rs"

[dependencies]
# ── Reborn write side (path deps; versions intentionally unpinned) ───────────
ironclaw_common = { path = "../ironclaw_common" }
ironclaw_host_api = { path = "../ironclaw_host_api" }
ironclaw_filesystem = { path = "../ironclaw_filesystem" }
ironclaw_threads = { path = "../ironclaw_threads" }
ironclaw_triggers = { path = "../ironclaw_triggers" }
ironclaw_memory = { path = "../ironclaw_memory" }
ironclaw_memory_native = { path = "../ironclaw_memory_native" }
ironclaw_secrets = { path = "../ironclaw_secrets" }
ironclaw_extensions = { path = "../ironclaw_extensions" }
ironclaw_host_runtime = { path = "../ironclaw_host_runtime" }
ironclaw_reborn_composition = { path = "../ironclaw_reborn_composition", features = [
    "migration-support",
] }
ironclaw_reborn_identity = { path = "../ironclaw_reborn_identity" }

# ── shared ──────────────────────────────────────────────────────────────────
anyhow = "1"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"
clap = { version = "4", features = ["derive", "env"] }
secrecy = { version = "0.10", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "fs"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
ulid = "1"
uuid = { version = "1", features = ["v4", "v5", "serde"] }

# ── frozen v1 read path (src/legacy_snapshot/) — AES-256-GCM + HKDF-SHA256,
# byte-for-byte matching src/secrets/crypto.rs so previously-encrypted v1
# secrets keep decrypting ────────────────────────────────────────────────────
aes-gcm = "0.10"
hkdf = "0.13"
sha2 = "0.11"

# backend-specific handles
deadpool-postgres = "0.14"
libsql = { version = "0.9", default-features = false, features = ["core", "replication", "remote", "tls"] }
tokio-postgres = { version = "0.7", features = ["with-uuid-1", "with-chrono-0_4", "with-serde_json-1"] }

[dev-dependencies]
tempfile = "3"
# Dev-only: `legacy_snapshot::postgres_tests` (Postgres coverage for the
# frozen v1 reader) — skips gracefully when Docker is unavailable, same
# pattern as `ironclaw_reborn_composition`/`ironclaw_triggers`.
testcontainers-modules = { version = "0.12", features = ["postgres"] }
# `tests/migration_roundtrip.rs` seeds its v1 fixture with raw SQL against a
# frozen snapshot of the v1 schema (`tests/fixtures/legacy_v1_schema.sql`,
# formerly `src/db/libsql_migrations.rs`) — the `ironclaw_legacy` (`src/`)
# monolith was deleted under Tier B, so there is no longer a real v1 write
# path to seed through. The fixture re-encrypts its seeded secret with the
# same AES-256-GCM + HKDF-SHA256 scheme (via the `aes-gcm`/`hkdf`/`sha2`
# `[dependencies]` above) so the migration's frozen decrypt path
# (`src/legacy_snapshot/secrets.rs`) can read it back.

# Docker-free acceptance test: seeds a rich v1+engine-v2 libSQL fixture, runs the
# migration, and asserts the round-trip + the exact gap set.
[[test]]
name = "migration_roundtrip"
path = "tests/migration_roundtrip.rs"
