[package]
name = "ironclaw_signing_provider"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
description = "Provider-agnostic SigningProvider trait for the IronClaw attested-signing substrate (no chain/crypto/secrets dependencies)"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"

[package.metadata.dist]
dist = false

[dependencies]
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
thiserror = "2"

[dev-dependencies]
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt"] }
