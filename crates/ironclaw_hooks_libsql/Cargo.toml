[package]
name = "ironclaw_hooks_libsql"
version = "0.1.0"
edition = "2024"
publish = false
description = "Durable libSQL-backed PredicateStateBackend for the ironclaw_hooks framework (durable-backend PR 3/4)."

[dependencies]
async-trait = "0.1"
blake3 = "1"
chrono = { version = "0.4", features = ["serde"] }
ironclaw_hooks = { path = "../ironclaw_hooks" }
ironclaw_host_api = { path = "../ironclaw_host_api" }
libsql = { version = "0.9", default-features = false, features = ["core", "replication", "remote", "tls"] }
rust_decimal = { version = "1", features = ["serde", "serde-with-str"] }
# `sync` for the connection-admission Semaphore; `time` for connect-retry
# backoff sleeps (see the concurrency contract on LibSqlPredicateStateBackend).
tokio = { version = "1", features = ["sync", "time"] }
tracing = "0.1"

[dev-dependencies]
# Run the shared PredicateStateBackend contract harness from ironclaw_hooks
# against this backend.
ironclaw_hooks = { path = "../ironclaw_hooks", features = ["contract-tests"] }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync"] }

# The libSQL contract + adversarial suite runs with `harness = false` and a
# tiny in-file serial runner. Each heavy case fills a key to MAX_SAMPLES_PER_KEY
# (4 096 connect/BEGIN IMMEDIATE/COMMIT cycles). Running several of those fill
# loops concurrently — each on its OWN temp db via its OWN backend instance, as
# the default harness would — intermittently trips SQLITE_MISUSE ("bad parameter
# or other API misuse"). This is a DRIVER-LEVEL limit of the replication-enabled
# libSQL build when many independent `Database` handles operate concurrently in
# one process; it is NOT the production fail-closed risk. The backend's
# in-process write_lock + connect retry (see the concurrency contract on
# LibSqlPredicateStateBackend) fixes the production case — concurrent writers on
# a SHARED backend instance no longer fail-close on "database is locked" — but
# the cross-instance driver MISUSE persists, so the serial runner is still
# required. (Verified empirically: 6 heavy fills as concurrent default-harness
# #[tokio::test]s reproduce MISUSE every run even with the write_lock; the
# serial runner does not.) The default libtest harness also gives no in-crate
# way to cap parallelism and no per-case runtime-flavor control, so we own the
# runner: cases run serially by default, concurrency cases get their own
# multi-thread runtime. See the runner doc comment for detail.
[[test]]
name = "predicate_state_contract"
path = "tests/predicate_state_contract.rs"
harness = false
