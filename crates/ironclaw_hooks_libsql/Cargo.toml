[package]
name = "ironclaw_hooks_libsql"
version = "0.1.0"
edition = "2024"
publish = false
description = "Durable libSQL-backed PredicateStateBackend for the ironclaw_hooks framework (durable-backend PR 3/4)."

[dependencies]
async-trait = "0.1"
blake3 = "1"
chrono = { version = "0.4", features = ["serde"] }
ironclaw_hooks = { path = "../ironclaw_hooks" }
ironclaw_host_api = { path = "../ironclaw_host_api" }
libsql = { version = "0.6", default-features = false, features = ["core", "replication", "remote", "tls"] }
rust_decimal = { version = "1", features = ["serde", "serde-with-str"] }
tracing = "0.1"

[dev-dependencies]
# Run the shared PredicateStateBackend contract harness from ironclaw_hooks
# against this backend.
ironclaw_hooks = { path = "../ironclaw_hooks", features = ["contract-tests"] }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync"] }

# The libSQL contract + adversarial suite runs with `harness = false` and a
# tiny in-file serial runner. Each heavy case fills a key to MAX_SAMPLES_PER_KEY
# (4 096 sequential connect/BEGIN IMMEDIATE/COMMIT cycles); running several of
# those fill loops concurrently against the replication-enabled libSQL build
# intermittently trips SQLITE_MISUSE ("bad parameter or other API misuse").
# The default libtest harness gives no in-crate way to cap parallelism, and the
# fail-closed contract case is generated by a cross-crate macro we can't gate,
# so we own the runner and execute the cases serially (multi-threaded cases get
# their own multi-thread runtime). See the runner doc comment for detail.
[[test]]
name = "predicate_state_contract"
path = "tests/predicate_state_contract.rs"
harness = false
