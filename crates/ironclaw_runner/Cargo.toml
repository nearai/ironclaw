[package]
name = "ironclaw_runner"
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
description = "Reborn runner control plane and loop-driver adapters for IronClaw"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[package.metadata.ironclaw]
layer = "kernel"

[features]
# Exposes filesystem-backed in-memory test constructors to integration tests and
# downstream harnesses. Off by default so production builds do not carry test
# helpers.
test-support = []

[dependencies]
async-trait = "0.1"
base64 = "0.22"
# Scope-roster shard-prefix hashing only (§4.5) — same version already used
# by `ironclaw_filesystem` for the identical stable-hex-from-key pattern
# (`db.rs`'s index-name collision suffixing); not a `[workspace.dependencies]`
# entry, so this crate needs its own line.
blake3 = "1"
chrono = "0.4"
futures-util = { version = "0.3", default-features = false }
ironclaw_agent_loop = { path = "../ironclaw_agent_loop", version = "0.1.0" }
ironclaw_common = { path = "../ironclaw_common", version = "0.4.2" }
ironclaw_events = { path = "../ironclaw_events", version = "0.1.0" }
ironclaw_hooks = { path = "../ironclaw_hooks", version = "0.1.0" }
ironclaw_host_api = { path = "../ironclaw_host_api", version = "0.1.0" }
ironclaw_host_runtime = { path = "../ironclaw_host_runtime", version = "0.1.0" }
ironclaw_llm = { path = "../ironclaw_llm", version = "0.1.0", default-features = false }
ironclaw_loop_host = { path = "../ironclaw_loop_host", version = "0.1.0" }
ironclaw_memory = { path = "../ironclaw_memory", version = "0.1.0" }
ironclaw_observability = { path = "../ironclaw_observability" }
ironclaw_run_state = { path = "../ironclaw_run_state", version = "0.1.0" }
ironclaw_safety = { path = "../ironclaw_safety", version = "0.2.2" }
ironclaw_filesystem = { path = "../ironclaw_filesystem", version = "0.1.0" }
ironclaw_threads = { path = "../ironclaw_threads", version = "0.1.0" }
ironclaw_turns = { path = "../ironclaw_turns", version = "0.1.0" }
jsonschema = { version = "0.46", default-features = false }
libsql = { version = "0.9", default-features = false, features = ["core", "replication", "remote", "tls"] }
parking_lot = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"

[dev-dependencies]
ironclaw_runner = { path = ".", features = ["test-support"] }
ironclaw_loop_host = { path = "../ironclaw_loop_host", features = ["test-support"] }
chrono = "0.4"
ironclaw_agent_loop = { path = "../ironclaw_agent_loop", version = "0.1.0", features = ["test-support"] }
ironclaw_authorization = { path = "../ironclaw_authorization", version = "0.1.0" }
ironclaw_event_projections = { path = "../ironclaw_event_projections", version = "0.1.0" }
ironclaw_extensions = { path = "../ironclaw_extensions", version = "0.1.0" }
ironclaw_memory_native = { path = "../ironclaw_memory_native", version = "0.1.0" }
ironclaw_processes = { path = "../ironclaw_processes", version = "0.1.0", features = ["test-support"] }
ironclaw_reborn_event_store = { path = "../ironclaw_reborn_event_store", version = "0.1.0" }
ironclaw_resources = { path = "../ironclaw_resources", version = "0.1.0" }
ironclaw_scripts = { path = "../ironclaw_scripts", version = "0.1.0" }
ironclaw_skills = { path = "../ironclaw_skills", version = "0.3.0", default-features = false }
ironclaw_trust = { path = "../ironclaw_trust", version = "0.1.0" }
ironclaw_turns = { path = "../ironclaw_turns", version = "0.1.0", features = ["test-support"] }
rust_decimal = "1"
serde = "1"
serde_json = "1"
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
wat = "1.245.1"
tracing-test = { version = "0.2", features = ["no-env-filter"] }
tracing-subscriber = "0.3"


[lints]
workspace = true
