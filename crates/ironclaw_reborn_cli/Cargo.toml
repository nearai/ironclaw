[package]
name = "ironclaw"
version = "1.0.0-rc.1"
edition = "2024"
rust-version.workspace = true
description = "Secure personal AI assistant that protects your data and expands its capabilities on the fly"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[package.metadata.ironclaw]
layer = "app"

[package.metadata.dist]
dist = true
display-name = "ironclaw"

[package.metadata.wix]
upgrade-guid = "650712A0-A6B4-4584-829A-03A90CE3D7D9"
path-guid = "9BB3F0DB-3513-45E6-A23B-CE5A5E5C1759"
license = false
eula = false

[features]
# Compile in the (off-by-default) mem0 third-party memory provider so an
# `ironclaw-reborn` binary can bind `memory.document_store.v1` to a self-hosted
# mem0 OSS server. Mirrors the same feature on `ironclaw_reborn_composition`;
# without it a default binary carries no mem0 code or its reqwest/rustls
# transport and a mem0 binding fails closed.
memory-mem0 = [
    "ironclaw_reborn_composition/memory-mem0",
]
[dependencies]
anyhow = "1"
async-trait = { version = "0.1" }
chrono = { version = "0.4", features = ["serde"] }
hex = "0.4.3"
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4.5.0"
# Masked (echo-suppressed) API-key prompt in `onboard`. Same crate v1's setup
# wizard uses for secret-input masking — reused here rather than adding a
# second terminal-masking dependency.
crossterm = "0.29"
dotenvy = "0.15"
ironclaw_reborn_composition = { path = "../ironclaw_reborn_composition", version = "0.1.0" }
ironclaw_reborn_config = { path = "../ironclaw_reborn_config", version = "0.1.0" }
ironclaw_reborn_traces = { path = "../ironclaw_reborn_traces", version = "0.1.0" }
ironclaw_extension_host = { path = "../ironclaw_extension_host", version = "0.1.0" }
# DEL-7: the binary is the one generic-side crate allowed to link the concrete
# first-party extensions; it converts the package inventory into composition's
# neutral bundle set and supplies the GSuite/web-access capability registrars.
# Host-api / host-runtime / auth types are reached through composition facade
# re-exports, not direct deps.
ironclaw_first_party_extensions = { path = "../ironclaw_first_party_extensions", version = "0.1.0" }
ironclaw_slack_extension = { path = "../ironclaw_slack_extension", version = "0.1.0" }
ironclaw_telegram_extension = { path = "../ironclaw_telegram_extension", version = "0.1.0" }
ironclaw_webui = { path = "../ironclaw_webui", version = "0.1.0" }
rand = "0.10"
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart", "rustls-tls-native-roots", "stream"] }
secrecy = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
tempfile = "3"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "io-util", "io-std", "sync", "time"] }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1", features = ["v4", "v5", "serde"] }

[target.'cfg(unix)'.dependencies]
# O_NOFOLLOW for the single-handle, symlink-safe token file open in
# `webui_token::read_token_file_checked` — the flag's raw value differs
# across unix platforms (Linux vs macOS), so it must come from `libc`
# rather than being hardcoded. Already present transitively; pinned here
# as a direct dependency of the code that now uses it.
libc = "0.2"

[dev-dependencies]
# Enable the composition crate's `test-support` seam for CLI unit tests so
# `open_reborn_identity_resolver` (the test-only standalone resolver opener)
# is available when building this crate's tests. Production code uses the
# runtime-owned `RebornRuntime::open_reborn_identity_resolver` accessor
# instead. Feature-unifies with the `[dependencies]` entry above.
ironclaw_reborn_composition = { path = "../ironclaw_reborn_composition", version = "0.1.0", features = ["test-support"] }
# Canonical workspace-wide process-env test lock. Env-mutating unit tests in
# this crate serialize on `ironclaw_common::env_helpers::lock_env()` — the same
# mutex the composition/llm/auth crates and `src/` use — so no crate defines a
# second, non-serializing lock domain (the #6015 flake). Dev-only: the lock is
# reached solely from `#[cfg(test)]` code in `runtime::test_env`.
ironclaw_common = { path = "../ironclaw_common", version = "0.4.2" }
# FaultInjecting decorator: test store fault paths through the real store.
# `commands::onboard::llm_credentials`'s write-first-then-config-ordering test
# builds the real `ironclaw_secrets::SecretStore` over a
# `FaultInjecting<InMemoryBackend>` armed to fail secret writes, so the failing
# put exercises the production store's real error mapping.
ironclaw_filesystem = { path = "../ironclaw_filesystem", version = "0.1.0", features = ["test-support"] }
# `commands::onboard::llm_credentials`'s write-ordering test builds the real
# `ironclaw_secrets::SecretStore::ephemeral_over(..)` (plus
# `keychain::generate_master_key_hex`); production onboarding code only ever
# touches secrets through `ironclaw_reborn_composition::LlmKeyStore`'s facade
# (`put_plaintext`), so this stays a dev-only dependency — see
# `crates/ironclaw_architecture/tests/reborn_dependency_boundaries.rs::reborn_cli_binary_crate_stays_separate_from_v1_root`.
ironclaw_secrets = { path = "../ironclaw_secrets", version = "0.1.0" }
toml = "1.1"

[[bin]]
name = "ironclaw"
path = "src/main.rs"
