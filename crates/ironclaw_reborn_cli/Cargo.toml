[package]
name = "ironclaw_reborn_cli"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
description = "Standalone IronClaw Reborn binary"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

# Keep disabled until #3483 resolves cargo-dist tag/versioning + Windows WiX
# packaging for the standalone Reborn binary.
[package.metadata.dist]
dist = false

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4.5.0"
ironclaw_reborn = { path = "../ironclaw_reborn", version = "0.1.0" }
ironclaw_reborn_config = { path = "../ironclaw_reborn_config", version = "0.1.0" }
serde_json = "1"

# Optional: Telegram v2 channel host. Gated behind the `telegram-v2` feature
# (default-on). Future channels (Slack, Discord, WeChat per #3577) follow
# the same pattern — each ships as its own optional dep behind its own
# feature flag, and `commands/run.rs` env-detects and boots whichever are
# enabled. Storage backend features (`libsql`, `postgres`) forward to the
# host crate via the `?` syntax so we never pull libSQL/Postgres in unless
# `telegram-v2` is on.
ironclaw_reborn_telegram_v2_host = { path = "../ironclaw_reborn_telegram_v2_host", version = "0.1.0", optional = true, default-features = false }
tokio = { version = "1", features = ["rt-multi-thread"], optional = true }

[[bin]]
name = "ironclaw-reborn"
path = "src/main.rs"

[features]
default = ["telegram-v2", "libsql"]
telegram-v2 = ["dep:ironclaw_reborn_telegram_v2_host", "dep:tokio"]
libsql = ["ironclaw_reborn_telegram_v2_host?/libsql"]
postgres = ["ironclaw_reborn_telegram_v2_host?/postgres"]

[dev-dependencies]
tempfile = "3"
