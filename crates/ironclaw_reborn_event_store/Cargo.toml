[package]
name = "ironclaw_reborn_event_store"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
description = "Reborn-owned durable event and audit store backends"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[features]
default = []
postgres = ["dep:tokio-postgres", "dep:uuid"]
libsql = ["dep:libsql"]

[dependencies]
async-trait = "0.1"
ironclaw_events = { path = "../ironclaw_events", version = "0.1.0" }
ironclaw_host_api = { path = "../ironclaw_host_api", version = "0.1.0" }
libsql = { version = "0.6", optional = true, default-features = false, features = ["core", "replication", "remote", "tls"] }
secrecy = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["fs", "io-util", "rt", "sync"] }
tokio-postgres = { version = "0.7", optional = true, features = ["with-uuid-1", "with-chrono-0_4", "with-serde_json-1"] }
tracing = "0.1"
urlencoding = "2"
uuid = { version = "1", optional = true }

[dev-dependencies]
chrono = { version = "0.4", features = ["serde"] }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt"] }
