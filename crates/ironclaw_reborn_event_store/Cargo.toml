[package]
name = "ironclaw_reborn_event_store"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
description = "Reborn-owned durable event and audit store backends"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[features]
default = []
postgres = [
    "dep:deadpool-postgres",
    "dep:tokio-postgres",
    "dep:tokio-postgres-rustls",
    "dep:rustls",
    "dep:rustls-native-certs",
    "dep:webpki-roots",
    "dep:url",
    "dep:uuid",
]
libsql = ["dep:libsql"]

[dependencies]
async-trait = "0.1"
deadpool-postgres = { version = "0.14", optional = true }
hex = "0.4"
ironclaw_events = { path = "../ironclaw_events", version = "0.1.0" }
ironclaw_host_api = { path = "../ironclaw_host_api", version = "0.1.0" }
libsql = { version = "0.6", optional = true, default-features = false, features = ["core", "replication", "remote", "tls"] }
rustls = { version = "0.23", optional = true, default-features = false, features = ["ring"] }
rustls-native-certs = { version = "0.8", optional = true }
secrecy = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
tokio = { version = "1", features = ["fs", "io-util", "rt", "sync", "time"] }
tokio-postgres = { version = "0.7", optional = true, features = ["with-uuid-1", "with-chrono-0_4", "with-serde_json-1"] }
tokio-postgres-rustls = { version = "0.13", optional = true }
tracing = "0.1"
url = { version = "2", optional = true }
urlencoding = "2"
webpki-roots = { version = "0.26", optional = true }
uuid = { version = "1", optional = true }

[dev-dependencies]
chrono = { version = "0.4", features = ["serde"] }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt"] }
