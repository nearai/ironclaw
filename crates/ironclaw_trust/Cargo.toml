[package]
name = "ironclaw_trust"
version = "0.1.0"
edition = "2024"
# Keep in sync with the workspace-level package.rust-version.
rust-version = "1.92"
description = "Host-controlled trust-class policy engine for IronClaw Reborn"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[features]
# Exposes `crate::fixtures` constructors that produce privileged
# `EffectiveTrustClass` values without going through the policy engine.
# Off by default — production builds must NEVER enable this. Tests opt in
# via `cargo test --features test-fixtures` (or `--features
# ironclaw_trust/test-fixtures` from the workspace root).
test-fixtures = []

[dependencies]
ironclaw_host_api = { path = "../ironclaw_host_api", version = "0.1.0" }
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
thiserror = "2"

[dev-dependencies]
serde_json = "1"
static_assertions = "1"

[[test]]
name = "policy_contract"
required-features = ["test-fixtures"]
