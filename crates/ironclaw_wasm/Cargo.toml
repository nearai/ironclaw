[package]
name = "ironclaw_wasm"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
description = "WASM runtime contracts for IronClaw Reborn"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[dependencies]
blake3 = "1"
ironclaw_extensions = { path = "../ironclaw_extensions", version = "0.1.0" }
futures = "0.3"
ironclaw_filesystem = { path = "../ironclaw_filesystem", version = "0.1.0" }
ironclaw_host_api = { path = "../ironclaw_host_api", version = "0.1.0" }
ironclaw_resources = { path = "../ironclaw_resources", version = "0.1.0" }
rust_decimal = { version = "1", features = ["serde", "serde-with-str"] }
serde_json = "1"
thiserror = "2"
wasmtime = "43.0.1"

[dev-dependencies]
rust_decimal_macros = "1"
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt"] }
wat = "1"
