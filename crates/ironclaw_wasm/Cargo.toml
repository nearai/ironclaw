[package]
name = "ironclaw_wasm"
version = "0.1.0"
edition = "2024"
publish = false

[package.metadata.ironclaw]
layer = "runtimes"

[dependencies]
ironclaw_host_api = { path = "../ironclaw_host_api" }
ironclaw_wasm_limiter = { path = "../ironclaw_wasm_limiter" }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }
tracing = "0.1"
wasmtime = { workspace = true }
wasmtime-wasi = { workspace = true }

[dev-dependencies]
async-trait = "0.1"
ironclaw_dispatcher = { path = "../ironclaw_dispatcher", features = ["test-support"] }
ironclaw_events = { path = "../ironclaw_events" }
ironclaw_extensions = { path = "../ironclaw_extensions" }
ironclaw_filesystem = { path = "../ironclaw_filesystem" }
ironclaw_resources = { path = "../ironclaw_resources" }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
wat = "1.245.1"
wit-component = "0.245.1"
wit-parser = "0.245.1"
