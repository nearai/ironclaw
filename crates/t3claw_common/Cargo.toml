[package]
name = "t3claw_common"
version = "0.3.0"
edition = "2024"
rust-version = "1.92"
description = "Shared types and utilities for the T3Claw workspace"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/Terminal-3/t3-claw"
repository = "https://github.com/Terminal-3/t3-claw"

[package.metadata.dist]
dist = false

[dependencies]
chrono-tz = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
