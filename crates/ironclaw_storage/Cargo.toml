[package]
name = "ironclaw_storage"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
description = "Shared storage substrate primitives for IronClaw Reborn persistence adapters"
publish = false

[dependencies]
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
