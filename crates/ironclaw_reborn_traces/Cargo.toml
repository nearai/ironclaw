[package]
name = "ironclaw_reborn_traces"
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
license = "MIT OR Apache-2.0"
publish = false

[package.metadata.ironclaw]
layer = "substrates"

[dependencies]
anyhow = "1"
async-trait = "0.1"
base64 = "0.22.1"
chrono = { version = "0.4", features = ["serde"] }
dirs = "6"
ed25519-dalek = { version = "2.2.0", features = ["std", "rand_core", "zeroize"] }
hex = "0.4.3"
ironclaw_common = { path = "../ironclaw_common", version = "0.5.0" }
ironclaw_host_api = { path = "../ironclaw_host_api" }
ironclaw_llm = { path = "../ironclaw_llm", version = "0.1.0" }
ironclaw_safety = { path = "../ironclaw_safety", version = "0.2.3" }
jsonwebtoken = { version = "10", features = ["aws_lc_rs"] }
rand = "0.10"
rand_core = { version = "0.6", features = ["getrandom"] }
regex = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart", "rustls-tls-native-roots", "stream"] }
rust_decimal = { version = "1", features = ["serde", "serde-with-str", "maths"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4", "v5", "serde"] }

[dev-dependencies]
axum = { version = "0.8", features = ["ws"] }
tempfile = "3"
