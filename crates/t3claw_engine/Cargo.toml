[package]
name = "t3claw_engine"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
description = "Unified thread-capability-CodeAct execution engine for T3Claw"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/Terminal-3/t3-claw"
repository = "https://github.com/Terminal-3/t3-claw"
publish = false

[package.metadata.dist]
dist = false

[dependencies]
async-trait = "0.1"
cron = "0.13"
t3claw_common = { path = "../t3claw_common", version = "0.3.0" }
t3claw_skills = { path = "../t3claw_skills", version = "0.2.0", default-features = false }
chrono = { version = "0.4", features = ["serde"] }
monty = { git = "https://github.com/pydantic/monty.git", tag = "v0.0.11" }
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["sync", "time", "macros", "rt"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4", "v5", "serde"] }
sha2 = "0.10"

[dev-dependencies]
pretty_assertions = "1"
tempfile = "3"
tokio = { version = "1", features = ["full", "test-util"] }
