<!-- Brand faces for the manager chrome (sidebar/toolbar) so the theme's
     fontBase actually resolves to Geist, matching the preview. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
  rel="stylesheet"
/>
<style>
  /* IronClaw polish on manager chrome that the theme API doesn't reach.
     Values mirror tokens.css (light). */

  /* Sidebar group headings read like the app's eyebrow labels. */
  #storybook-explorer-menu button[data-action="collapse-root"],
  .sidebar-subheading {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #999999; /* --v2-text-faint */
  }

  /* Brand title: app wordmark weight, ink color. */
  .sidebar-header a {
    font-weight: 500;
    letter-spacing: -0.01em;
    color: #090909; /* --v2-ink */
  }

  /* Storybook's stock cog glyph draws its inner ring with a visible gap;
     swap in the design system's settings icon (icons.tsx) via mask so it
     inherits the button's currentColor states. */

    display: none;
  }
