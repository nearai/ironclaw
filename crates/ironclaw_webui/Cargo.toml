[package]
name = "ironclaw_webui"
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
description = "Host-owned listener binding + serve loop for the Reborn WebChat v2 HTTP gateway"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[package.metadata.ironclaw]
layer = "products"

[features]
default = []
# Compile in `InMemorySessionStore` as a public crate item. Off by
# default so a production deployment cannot accidentally wire the
# process-local store as a `SessionStore` impl — `SessionAuthenticator`
# would happily accept it, but sessions would vanish on every restart
# and the O(n) constant-time lookup would scale poorly under real
# user load. Local dev and tests opt in by enabling this feature.
dev-in-memory-session = []
# Forward the Slack host-beta surface. `webui_v2_app` (folded up here from
# composition) mounts the Slack personal-OAuth setup + channel-route admin
# surface under this feature; it forwards to composition, which owns the Slack
# adapter and the route/mount builders this crate consumes through its public
# surface.
slack-v2-host-beta = ["ironclaw_reborn_composition/slack-v2-host-beta"]
# Forward the OpenAI-compat host-beta surface: the bearer-auth middleware stamps
# an `OpenAiCompatActorScope` onto each verified caller for protected
# OpenAI-compatible route mounts. Pulls in the openai-compat scope/caller types
# and the product-adapters bearer-evidence helper the middleware calls.
openai-compat-beta = [
    "dep:ironclaw_reborn_openai_compat",
    "ironclaw_reborn_composition/openai-compat-beta",
    "ironclaw_reborn_openai_compat/openai-compat-beta",
]

[dependencies]
async-stream = "0.3"
async-trait = "0.1"
axum = { version = "0.8", features = ["ws"] }
base64 = "0.22"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde", "std"] }
futures = "0.3"
hex = "0.4.3"
hmac = "0.13"
ironclaw_host_api = { path = "../ironclaw_host_api" }
# Folded up from the former `ironclaw_webui_v2` crate: the v2 handlers consume
# only the `RebornServicesApi` facade + ingress/error vocabulary.
ironclaw_product_workflow = { path = "../ironclaw_product_workflow" }
ironclaw_reborn_composition = { path = "../ironclaw_reborn_composition", features = ["webui-v2-beta"] }
# Optional, enabled by `openai-compat-beta`: the moved `webui_v2_app` auth
# middleware stamps an `OpenAiCompatActorScope` onto verified callers for
# protected OpenAI-compatible route mounts. The tenant-scoped bearer evidence it
# pairs with the scope comes from `ironclaw_product_adapters` via composition's
# facade (`ironclaw_reborn_composition::mark_bearer_token_verified_for_tenant`) —
# ingress must not depend on product_adapters directly (architecture boundary).
ironclaw_reborn_openai_compat = { path = "../ironclaw_reborn_openai_compat", optional = true }
# Sliding-window per-route rate limiter (moved from composition's webui_rate_limit).
lru = "0.18"
# axum/tower-http middleware stack used by `webui_serve` (moved from composition).
tower-http = { version = "0.6", features = ["cors", "set-header", "limit", "catch-panic"] }
jsonwebtoken = { version = "10", features = ["aws_lc_rs"] }
parking_lot = "0.12"
rand = "0.10"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
secrecy = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
subtle = "2"
thiserror = "2"
tokio = { version = "1", features = ["macros", "net", "rt", "rt-multi-thread", "signal", "sync", "time"] }
tower = { version = "0.5", features = ["util"] }
tracing = "0.1"
url = "2"
urlencoding = "2"
# `uuid` is consumed by `InMemorySessionStore` (session.rs) and the
# library's internal tests under `#[cfg(test)]`. The earlier attempt
# to mark it `optional = true` broke `cargo test` because the
# `cfg(test)` gate activated the `use uuid::Uuid;` import without
# pulling in the optional crate.
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
axum = { version = "0.8", features = ["macros"] }
http = "1"
http-body-util = "0.1"
# End-to-end session test (`tests/session_round_trip.rs`) drives the
# composed `webui_v2_app` with a minimal `RebornServicesApi` stub so
# the assertion covers SessionAuthenticator + the v2 route surface
# together. The runtime `ironclaw_reborn_composition` dep already
# enables `webui-v2-beta`; the three crates below supply the trait
# + DTO shapes the stub implements.
ironclaw_product_workflow = { path = "../ironclaw_product_workflow", features = ["test-support"] }
# Handler contract test (moved from ironclaw_webui_v2) constructs
# `ProductOutboundEnvelope` fixtures with the canonical newtype constructors.
ironclaw_product_adapters = { path = "../ironclaw_product_adapters" }
# `tests/slack_host_beta_webui_v2.rs` (gated on `slack-v2-host-beta`) drives the
# Slack host-beta surface composed into `webui_v2_app`. It builds a local-dev
# runtime through composition's public builders, so it needs composition's
# `test-support` + `libsql` seams plus the model-gateway / capability-port traits.
ironclaw_reborn_composition = { path = "../ironclaw_reborn_composition", features = ["test-support", "libsql"] }
ironclaw_loop_host = { path = "../ironclaw_loop_host" }
tempfile = "3"
ironclaw_threads = { path = "../ironclaw_threads" }
ironclaw_turns = { path = "../ironclaw_turns" }
# Generate test RSA keypairs at test time so the OIDC e2e test can
# mint real signed JWTs without relying on a checked-in private key.
rsa = { version = "0.9", features = ["sha2"] }
rand = "0.10"
rand_core = { version = "0.6", features = ["getrandom"] }
base64 = "0.22"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "net", "time", "io-util", "sync", "test-util"] }
# Real WebSocket client for the moved `webui_v2_handlers_contract` stream_events_ws
# frame-content test (oneshot cannot complete a true WS upgrade).
tokio-tungstenite = { version = "0.29", default-features = false, features = ["connect"] }
