[package]
name = "ironclaw_webui"
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
description = "Host-owned listener binding + serve loop for the Reborn WebChat v2 HTTP gateway"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[package.metadata.ironclaw]
layer = "products"

[features]
# Compile in `EmailUserDirectory` as a public crate item. Off by default so a
# production deployment cannot accidentally trust provider identities without a
# host-owned user join. Local dev and tests opt in.
test-support = []

[dependencies]
async-stream = "0.3"
async-trait = "0.1"
axum = { version = "0.8", features = ["ws"] }
base64 = "0.22"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde", "std"] }
futures = "0.3"
hex = "0.4.3"
hmac = "0.13"
ironclaw_host_api = { path = "../ironclaw_host_api" }
ironclaw_host_ingress = { path = "../ironclaw_host_ingress" }
# Folded up from the former `ironclaw_webui_v2` crate: the v2 handlers consume
# only the `ProductSurface` facade + ingress/error vocabulary.
ironclaw_product = { path = "../ironclaw_product", features = ["host-auth-mint"] }
# The `webui_v2_app` auth middleware stamps an `OpenAiCompatActorScope`
# onto verified callers for protected OpenAI-compatible route mounts. The
# tenant-scoped bearer evidence it pairs with the scope comes from
# `ironclaw_product`; ingress must not depend on product_adapters directly
# (architecture boundary).
ironclaw_reborn_openai_compat = { path = "../ironclaw_reborn_openai_compat" }
# Sliding-window per-route rate limiter (moved from composition's webui_rate_limit).
lru = "0.18"
# axum/tower-http middleware stack used by `webui_serve` (moved from composition).
tower-http = { version = "0.6", features = ["cors", "set-header", "limit", "catch-panic"] }
jsonwebtoken = { version = "10", features = ["aws_lc_rs"] }
parking_lot = "0.12"
rand = "0.10"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
secrecy = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
subtle = "2"
thiserror = "2"
tokio = { version = "1", features = ["macros", "net", "rt", "rt-multi-thread", "signal", "sync", "time"] }
tower = { version = "0.5", features = ["util"] }
tracing = "0.1"
url = "2"
urlencoding = "2"
# `uuid` is consumed by the signed session token store and library tests.
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
axum = { version = "0.8", features = ["macros"] }
http = "1"
http-body-util = "0.1"
# End-to-end session test (`tests/session_round_trip.rs`) drives the
# composed `webui_v2_app` with a minimal `ProductSurface` stub so
# the assertion covers SessionAuthenticator + the v2 route surface
# together. The three crates below supply the trait + DTO shapes
# the stub implements.
ironclaw_product = { path = "../ironclaw_product", features = ["test-support"] }
# Handler contract test (moved from ironclaw_webui_v2) constructs
# `ProductOutboundEnvelope` fixtures through the product facade re-export.
ironclaw_loop_host = { path = "../ironclaw_loop_host" }
tempfile = "3"
ironclaw_threads = { path = "../ironclaw_threads" }
ironclaw_turns = { path = "../ironclaw_turns" }
# Generate test RSA keypairs at test time so the OIDC e2e test can
# mint real signed JWTs without relying on a checked-in private key.
rsa = { version = "0.9", features = ["sha2"] }
rand = "0.10"
rand_core = { version = "0.6", features = ["getrandom"] }
base64 = "0.22"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "net", "time", "io-util", "sync", "test-util"] }
# Real WebSocket client for the moved `webui_v2_handlers_contract` stream_events_ws
# frame-content test (oneshot cannot complete a true WS upgrade).
tokio-tungstenite = { version = "0.29", default-features = false, features = ["connect"] }
