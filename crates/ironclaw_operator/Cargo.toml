[package]
name = "ironclaw_operator"
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
description = "Host/operator control-plane services for IronClaw Reborn"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[package.metadata.ironclaw]
layer = "products"

[dependencies]
async-trait = "0.1"
axum = "0.8"
chrono = { version = "0.4", features = ["serde"] }
fs4 = "1.1"
ironclaw_common = { path = "../ironclaw_common" }
ironclaw_filesystem = { path = "../ironclaw_filesystem" }
ironclaw_host_api = { path = "../ironclaw_host_api" }
ironclaw_llm = { path = "../ironclaw_llm", default-features = false, features = ["registry-provider-factory"] }
ironclaw_product = { path = "../ironclaw_product" }
ironclaw_reborn_config = { path = "../ironclaw_reborn_config" }
ironclaw_safety = { path = "../ironclaw_safety" }
ironclaw_secrets = { path = "../ironclaw_secrets" }
nix = { version = "0.30", default-features = false, features = ["process"] }
libc = "0.2"
secrecy = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt", "sync", "time"] }
toml = "1.1"
tracing = "0.1"
tracing-subscriber = "0.3"
url = "2"
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
ironclaw_filesystem = { path = "../ironclaw_filesystem", features = ["test-support"] }
ironclaw_secrets = { path = "../ironclaw_secrets" }
rust_decimal = "1"
tempfile = "3"
tower = { version = "0.5", features = ["util"] }

[lints]
workspace = true
