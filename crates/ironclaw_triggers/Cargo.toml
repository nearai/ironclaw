[package]
name = "ironclaw_triggers"
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
description = "Scheduled trigger domain and source-provider contracts for IronClaw Reborn"
publish = false

[package.metadata.ironclaw]
layer = "substrates"

[features]
test-support = []

[dependencies]
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"
cron = "0.17"
hex = "0.4"
deadpool-postgres = "0.14"
ironclaw_common = { path = "../ironclaw_common" }
ironclaw_host_api = { path = "../ironclaw_host_api" }
ironclaw_turns = { path = "../ironclaw_turns" }
libsql = { version = "0.9", default-features = false, features = ["core", "replication", "remote", "tls"] }
tokio-postgres = "0.7"
serde = { version = "1", features = ["derive"] }
sha2 = "0.11"
thiserror = "2"
tokio = { version = "1", features = ["sync", "time"] }
tracing = "0.1"
ulid = { version = "3", features = ["serde"] }

[dev-dependencies]
serde_json = "1"
tempfile = "3"
testcontainers-modules = { version = "0.12", features = ["postgres"] }
tokio = { version = "1", features = ["macros", "rt"] }
