[package]
name = "ironclaw_telegram_v2_adapter"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
description = "Telegram v2 ProductAdapter payload normalization for IronClaw Reborn (#3285 tracer-bullet)"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
ironclaw_product_adapters = { path = "../ironclaw_product_adapters", version = "0.1.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

[dev-dependencies]
# `mark_*_verified` host-auth helpers used by payload tests live behind
# the `host-auth-mint` feature on `ironclaw_product_adapters` (sealed
# evidence — only the host can mint, and tests stand in for the host).
ironclaw_product_adapters = { path = "../ironclaw_product_adapters", features = ["host-auth-mint"] }
