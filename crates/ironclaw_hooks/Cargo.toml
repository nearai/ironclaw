[package]
name = "ironclaw_hooks"
version = "0.1.0"
edition = "2024"
publish = false

[package.metadata.ironclaw]
layer = "substrates"
description = "Reborn loop hook framework: trust-tiered points/kinds/decisions, sealed witness types, dispatcher contract."

[features]
# The crate's dev-only seam. Two things live behind it:
#
#  * test-only constructors (e.g., `SanitizedArguments::for_tests`) that bypass
#    the resolver wiring, and
#  * the `predicate_state::contract` trait-level test harness, so the durable
#    backends (`libsql_backend` / `postgres_backend`, folded in from the former
#    `ironclaw_hooks_{libsql,postgres}` crates) can run the same
#    `PredicateStateBackend` contract suite from this crate's own `tests/`.
#
# Production builds MUST NOT enable this: the constructors would let untrusted
# code bypass the sanitizer-only-on-trusted-path invariant. Intended exclusively
# as a `dev-dependency` feature for hook authors writing predicate tests outside
# `ironclaw_runner`. Named `test-support` to match every other crate's dev seam.
test-support = []
# Gates the heavy multi-host adversarial suite (folded in from the former
# `ironclaw_hooks_parity` crate) so a bare `cargo test` stays fast and only the
# deterministic parity matrix / per-backend contract suites run. Mirrors the
# workspace-wide `integration` gate used for DB-backed tests.
integration = []

[dependencies]
async-trait = "0.1"
blake3 = "1"
chrono = { version = "0.4", features = ["serde"] }
deadpool-postgres = "0.14"
libsql = { version = "0.9", default-features = false, features = ["core", "replication", "remote", "tls"] }
tokio-postgres = { version = "0.7", features = ["with-chrono-0_4"] }
futures = "0.3"
ironclaw_events = { path = "../ironclaw_events" }
ironclaw_host_api = { path = "../ironclaw_host_api" }
ironclaw_prompt_envelope = { path = "../ironclaw_prompt_envelope" }
ironclaw_turns = { path = "../ironclaw_turns" }
ironclaw_wasm_limiter = { path = "../ironclaw_wasm_limiter" }
lru = "0.18"
rust_decimal = { version = "1", features = ["serde", "serde-with-str", "db-tokio-postgres"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["time", "rt", "sync"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }
wasmtime = { workspace = true }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
tempfile = "3"
toml = "1.1"
wat = "1"

# Durable-backend test suites folded in from the former
# `ironclaw_hooks_{postgres,libsql}` / `ironclaw_hooks_parity` crates. The
# Postgres legs skip at runtime when no DB URL is reachable.
[[test]]
name = "predicate_state_postgres_contract"
path = "tests/predicate_state_postgres_contract.rs"
required-features = ["test-support"]

[[test]]
name = "predicate_state_postgres_adversarial"
path = "tests/predicate_state_postgres_adversarial.rs"

# libSQL contract suite keeps its hand-rolled serial runner (see the file's
# `harness = false` rationale): each heavy case fills a key to the sample cap,
# and running those concurrently on independent libSQL handles trips
# SQLITE_MISUSE.
[[test]]
name = "predicate_state_libsql_contract"
path = "tests/predicate_state_libsql_contract.rs"
harness = false
required-features = ["test-support"]

# Cross-backend parity matrix: the libSQL leg always runs; the Postgres leg
# skips at runtime when no DB URL is reachable. Drives only public backend
# types + the in-memory reference, so it needs no `test-support`.
[[test]]
name = "parity_matrix"
path = "tests/parity_matrix.rs"

[[test]]
name = "multi_host_adversarial"
path = "tests/multi_host_adversarial.rs"
required-features = ["integration"]

[lints]
workspace = true
