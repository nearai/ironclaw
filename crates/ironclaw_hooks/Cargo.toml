[package]
name = "ironclaw_hooks"
version = "0.1.0"
edition = "2024"
publish = false
description = "Reborn loop hook framework: trust-tiered points/kinds/decisions, sealed witness types, dispatcher contract."

[features]
default = []
# Exposes test-only constructors (e.g., `SanitizedArguments::for_tests`) that
# bypass the resolver wiring. Production builds MUST NOT enable this; the
# constructors it exposes would let untrusted code bypass the sanitizer-only-
# on-trusted-path invariant. Intended exclusively as a `dev-dependency` feature
# for hook authors writing predicate tests outside `ironclaw_reborn`.
test-support = []
# Exposes the `predicate_state::contract` trait-level test harness so
# out-of-crate durable backends (durable-backend PRs 2/3 — Postgres,
# libSQL) can run the same `PredicateStateBackend` contract suite against
# their impl. Mirrors `ironclaw_memory`'s `contract-tests` feature.
contract-tests = []
# Compiles the durable libSQL-backed `PredicateStateBackend` impl
# (`predicate_state::libsql`). Pulls in the `libsql` crate. Off by default
# so postgres / no-DB builds of `ironclaw_hooks` stay lean (durable-backend
# PR 3/4). The sibling postgres backend (PR 2/4) is gated on its own
# feature; the two are independent and may both be enabled.
libsql = ["dep:libsql"]

[dependencies]
async-trait = "0.1"
blake3 = "1"
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
ironclaw_events = { path = "../ironclaw_events" }
ironclaw_host_api = { path = "../ironclaw_host_api" }
ironclaw_prompt_envelope = { path = "../ironclaw_prompt_envelope" }
ironclaw_turns = { path = "../ironclaw_turns" }
ironclaw_wasm_limiter = { path = "../ironclaw_wasm_limiter" }
libsql = { version = "0.6", optional = true, default-features = false, features = ["core", "replication", "remote", "tls"] }
lru = "0.16"
rust_decimal = { version = "1", features = ["serde", "serde-with-str"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["time", "rt", "sync"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }
wasmtime = "44.0.2"

[dev-dependencies]
# Mirrors the optional runtime dep so the libSQL contract / adversarial
# integration test (`tests/predicate_state_libsql_contract.rs`, itself gated
# on the `libsql` feature) can build a database handle. Same version/features
# as the optional dependency above.
libsql = { version = "0.6", default-features = false, features = ["core", "replication", "remote", "tls"] }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread"] }
toml = "0.8"
wat = "1"
