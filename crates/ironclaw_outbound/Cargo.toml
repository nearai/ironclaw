[package]
name = "ironclaw_outbound"
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
description = "Outbound egress and projection subscription policy storage for IronClaw Reborn"
publish = false

[package.metadata.ironclaw]
layer = "substrates"

[features]
# Exposes `test_support` in-memory-backed store constructors for downstream
# crates' tests. Ships zero bytes in production binaries.
test-support = []

[dependencies]
async-trait = "0.1"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
hex = "0.4"
ironclaw_event_projections = { path = "../ironclaw_event_projections" }
ironclaw_filesystem = { path = "../ironclaw_filesystem" }
ironclaw_host_api = { path = "../ironclaw_host_api" }
ironclaw_turns = { path = "../ironclaw_turns" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
thiserror = "2"
tracing = "0.1"
uuid = { version = "1", features = ["v4", "v5", "serde"] }

[dev-dependencies]
ironclaw_events = { path = "../ironclaw_events" }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync"] }
