[package]
name = "ironclaw_hooks_parity"
version = "0.1.0"
edition = "2024"
publish = false
description = "Cross-backend adversarial parity suite for the reborn hook PredicateStateBackend (durable-backend PR 4/4). Proves the in-memory, Postgres, and libSQL backends are behaviorally interchangeable."
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"

# This crate is test-only: it owns no production source, only a cross-backend
# parity matrix + multi-host adversarial suite that drives all three backends
# through the same scripted input sequence and cross-asserts identical output.
[lib]
path = "src/lib.rs"

[features]
default = []
# Compile + run the Postgres leg of the parity matrix and the Postgres
# multi-host adversarial cases. Mirrors the per-crate `postgres` gate used by
# `ironclaw_hooks_postgres` itself: the Postgres backend type only exists with
# this on, and the parity matrix's Postgres leg is `#[cfg]`-gated to match. The
# libSQL leg always compiles (embedded temp-file db, runs anywhere); the
# Postgres leg additionally needs a reachable server at runtime via
# `IRONCLAW_HOOKS_POSTGRES_URL` / `DATABASE_URL`.
#
# NOTE: Cargo forbids optional dev-dependencies, so the Postgres *driver* dev-
# deps (`deadpool-postgres`, `tokio-postgres`) are always compiled; only the
# Postgres backend code path and the parity matrix's Postgres leg are gated.
postgres = ["ironclaw_hooks_postgres/postgres"]
# Gate the heavy multi-host adversarial suite (N concurrent writers across
# simulated hosts, cross-host replay, LRU eviction races, per-key cap under
# flood, clock-skew) so the default `cargo test` for this crate stays fast and
# only runs the deterministic parity matrix. `cargo test --features integration`
# runs the libSQL multi-host legs (embedded, no server) plus — when `postgres`
# is also on and a DB URL is set — the Postgres multi-host legs. Mirrors the
# workspace-wide `integration` gate used for DB-backed tests.
integration = []

[dependencies]
# No production dependencies — see the `[lib]` note above. The lib target
# exists only so `cargo test -p ironclaw_hooks_parity` has a crate to attach
# the integration-test binaries to.

[dev-dependencies]
# All three backends under test. `contract-tests` exposes the shared
# trait-level contract harness from `ironclaw_hooks` so the parity matrix can
# reuse the same scripted helpers the per-backend contract suites use.
ironclaw_hooks = { path = "../ironclaw_hooks", features = ["contract-tests"] }
ironclaw_hooks_libsql = { path = "../ironclaw_hooks_libsql" }
ironclaw_hooks_postgres = { path = "../ironclaw_hooks_postgres" }
ironclaw_host_api = { path = "../ironclaw_host_api" }

async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
libsql = { version = "0.9", default-features = false, features = ["core", "replication", "remote", "tls"] }
rust_decimal = { version = "1", features = ["serde"] }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "sync"] }

# Postgres driver for the parity matrix's own pool/schema setup. Always
# compiled (optional dev-deps are not allowed); the code that uses these is
# `#[cfg(feature = "postgres")]`-gated, so a build without `postgres` simply
# never references them.
deadpool-postgres = { version = "0.14" }
tokio-postgres = { version = "0.7", features = ["with-chrono-0_4"] }
