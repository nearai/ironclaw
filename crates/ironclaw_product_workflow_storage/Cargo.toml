[package]
name = "ironclaw_product_workflow_storage"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
description = "Durable storage adapters for IronClaw Reborn product workflow"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[features]
default = []
libsql = ["ironclaw_filesystem/libsql"]
postgres = ["ironclaw_filesystem/postgres"]

[dependencies]
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
futures-util = "0.3"
ironclaw_filesystem = { path = "../ironclaw_filesystem", version = "0.1.0" }
ironclaw_host_api = { path = "../ironclaw_host_api", version = "0.1.0" }
ironclaw_product_workflow = { path = "../ironclaw_product_workflow", version = "0.1.0" }
serde_json = "1"
tracing = "0.1"

[dev-dependencies]
deadpool-postgres = "0.14"
ironclaw_filesystem = { path = "../ironclaw_filesystem", features = ["libsql", "postgres"] }
ironclaw_product_adapters = { path = "../ironclaw_product_adapters" }
libsql = { version = "0.6", default-features = false, features = ["core", "replication", "remote", "tls"] }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt", "sync", "time"] }
tokio-postgres = "0.7"
