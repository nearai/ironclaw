[package]
name = "ironclaw_reborn_tui"
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
description = "Reborn TUI — a thin ratatui client of `ironclaw-reborn serve`'s WebChat v2 API."
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[package.metadata.ironclaw]
layer = "products"

[dependencies]
ironclaw_product_workflow = { path = "../ironclaw_product_workflow", version = "0.1.0" }
ratatui = { version = "0.29", features = ["crossterm"] }
crossterm = "0.29"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "sync", "time", "process"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls-native-roots", "stream"] }
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
anyhow = "1"

[dev-dependencies]
axum = { version = "0.8", features = ["ws"] }
tower = { version = "0.5", features = ["util"] }
tokio = { version = "1", features = ["full"] }
# app-state reducer test fixtures only (`GatePromptView`/`CapabilityActivityView`/…
# construction) — production code in this crate never names these types; see
# `app/mod.rs`'s module doc and `crates/ironclaw_architecture/tests/reborn_dependency_boundaries.rs`
# (`reborn_tui_allowed`), which only inspects `[dependencies]`.
chrono = { version = "0.4", features = ["serde"] }
ironclaw_host_api = { path = "../ironclaw_host_api", version = "0.1.0" }
ironclaw_turns = { path = "../ironclaw_turns", version = "0.1.0" }

[lints]
workspace = true
