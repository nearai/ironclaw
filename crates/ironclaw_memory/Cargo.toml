[package]
name = "ironclaw_memory"
version = "0.1.0"
edition = "2024"
# Keep in sync with the workspace-level package.rust-version.
rust-version.workspace = true
description = "Provider-neutral memory contract types for IronClaw Reborn"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[package.metadata.ironclaw]
layer = "substrates"

[dependencies]
async-trait = "0.1"
# Required by `MemoryServiceProfileSetRequest::from_tool_input`, which validates
# IANA timezone names; the constructor must stay an inherent method on the
# contract type so the existing consumer call site is unchanged.
chrono-tz = "0.10"
hex = "0.4"
ironclaw_host_api = { path = "../ironclaw_host_api", version = "0.1.0" }
# The memory service is the sole producer of prompt-safe memory context: its
# `read_long_term`/`read_thread` defaults wrap retrieved text in the untrusted
# envelope here so no provider can return unsafe context. Leaf crate (no ironclaw
# deps), so this introduces no cycle.
ironclaw_prompt_envelope = { path = "../ironclaw_prompt_envelope", version = "0.1.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
# Required only by `DocumentMetadata::from_value`, which logs a diagnostic on
# deserialize failure; preserved to keep behavior identical to the impl crate.
tracing = "0.1"

[dev-dependencies]
# Test substrate only: drives the async `MemoryService` default-impl unit test.
tokio = { version = "1", features = ["macros", "rt"] }
