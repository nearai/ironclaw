[package]
name = "ironclaw_product"
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
description = "Product-facing workflow facade for IronClaw Reborn (#3280)"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[package.metadata.ironclaw]
layer = "products"

[features]
# Compile in-memory fakes (FakeInboundTurnService, FakeConversationBindingService,
# FakeIdempotencyLedger, etc.). Off by default so production binaries don't carry
# the fake state machinery; downstream crates enable it from `[dev-dependencies]`.
test-support = ["ironclaw_host_api/test-support", "ironclaw_turns/test-support"]
host-auth-mint = ["ironclaw_host_api/host-auth-mint", "ironclaw_turns/host-auth-mint"]

[dependencies]
async-trait = "0.1"
base64 = "0.22"
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
rand = "0.10"
ironclaw_common = { path = "../ironclaw_common", version = "0.4.1" }
ironclaw_attachments = { path = "../ironclaw_attachments", version = "0.1.0" }
ironclaw_filesystem = { path = "../ironclaw_filesystem", version = "0.1.0" }
ironclaw_approvals = { path = "../ironclaw_approvals", version = "0.1.0" }
ironclaw_authorization = { path = "../ironclaw_authorization", version = "0.1.0" }
ironclaw_auth = { path = "../ironclaw_auth", version = "0.1.0" }
ironclaw_events = { path = "../ironclaw_events", version = "0.1.0" }
ironclaw_extensions = { path = "../ironclaw_extensions", version = "0.1.0" }
ironclaw_host_api = { path = "../ironclaw_host_api", version = "0.1.0" }
ironclaw_conversations = { path = "../ironclaw_conversations", version = "0.1.0" }
ironclaw_outbound = { path = "../ironclaw_outbound", version = "0.1.0" }
ironclaw_reborn_traces = { path = "../ironclaw_reborn_traces", version = "0.1.0" }
ironclaw_run_state = { path = "../ironclaw_run_state", version = "0.1.0" }
ironclaw_threads = { path = "../ironclaw_threads", version = "0.1.0" }
ironclaw_triggers = { path = "../ironclaw_triggers", version = "0.1.0" }
ironclaw_turns = { path = "../ironclaw_turns", version = "0.1.0" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
secrecy = { version = "0.10", features = ["serde"] }
sha2 = "0.11"
thiserror = "2"
tokio = { version = "1", features = ["macros", "sync", "time"] }
toml = "1.1"
tracing = "0.1"
url = "2"
uuid = { version = "1", features = ["v4", "v5", "serde"] }

[dev-dependencies]
# Enables the shared in-memory turn-state store double for tests only.
ironclaw_turns = { path = "../ironclaw_turns", features = ["test-support"] }
# Enables the in-memory-backed outbound-state store constructor for tests only.
ironclaw_outbound = { path = "../ironclaw_outbound", version = "0.1.0", features = ["test-support"] }
# Enables the in-memory-backed approval store constructors for tests only.
ironclaw_approvals = { path = "../ironclaw_approvals", features = ["test-support"] }
# Enables the in-memory-backed capability-lease store constructor for tests only.
ironclaw_authorization = { path = "../ironclaw_authorization", features = ["test-support"] }
# Enables the in-memory-backed run-state/approval store constructors for tests only.
ironclaw_run_state = { path = "../ironclaw_run_state", features = ["test-support"] }
# FaultInjecting decorator: test store fault paths through the real store
ironclaw_filesystem = { path = "../ironclaw_filesystem", features = ["test-support"] }
# ProductLive planned-loop harness builds a `FilesystemReplayPayloadStore` over
# an in-memory filesystem so approval/auth resumes reconstitute their replay
# input (mirrors production's capability-store wiring).
ironclaw_capabilities = { path = "../ironclaw_capabilities", version = "0.1.0" }
ironclaw_host_runtime = { path = "../ironclaw_host_runtime" }
ironclaw_loop_host = { path = "../ironclaw_loop_host", features = ["test-support"] }
ironclaw_event_projections = { path = "../ironclaw_event_projections" }
ironclaw_reborn_composition = { path = "../ironclaw_reborn_composition", features = ["test-support"] }
# Test-only construction of `ironclaw_runner` CAS-backed fixtures over an
# in-memory filesystem in this crate's own test harnesses.
ironclaw_runner = { path = "../ironclaw_runner", features = ["test-support"] }
ironclaw_trust = { path = "../ironclaw_trust" }
ironclaw_product = { path = ".", features = ["test-support"] }
ironclaw_threads = { path = "../ironclaw_threads", version = "0.1.0", features = ["test-support"] }
ironclaw_telegram_extension = { path = "../ironclaw_telegram_extension" }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt", "sync", "test-util", "time"] }
tokio-util = { version = "0.7", features = ["rt"] }
# Durable-ledger contract tests drive the libSQL/Postgres RootFilesystem
# backends directly; the Postgres leg builds its own pool. libSQL leg runs
# embedded; Postgres leg needs a DB URL.
deadpool-postgres = "0.14"
tokio-postgres = "0.7"
libsql = { version = "0.9", default-features = false, features = ["core", "replication", "remote", "tls"] }
