[package]
name = "ironclaw_skill_learning"
version = "0.1.0"
edition = "2024"
rust-version = "1.92"
description = "Skill learning logic for IronClaw Reborn: distill reusable skills from completed runs (and, later, refine and maintain them)"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"

[package.metadata.dist]
dist = false

[dependencies]
async-trait = "0.1"
ironclaw_skills = { path = "../ironclaw_skills", version = "0.3.0" }
thiserror = "2"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
