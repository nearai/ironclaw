schema_version = "reborn.extension_manifest.v2"
id = "ironclaw.memory"
name = "Reborn Memory"
version = "0.1.0"
description = "Host-bundled memory extension (issue #3537). The read and write tools below implement the host-defined memory.document_store.v1 profile; search and tree are provider-specific model-facing tools that implement no portable profile. Registered on the always-on first-party lane (like the builtin toolset), so the tools are unconditionally available. The backing provider is resolved by the document-store profile binding — the native filesystem provider by default, swappable without changing these tools — not by install/enable lifecycle."
# Requested trust only; the host trust policy computes effective trust. A
# `first_party` runtime + reserved `ironclaw.*` id are accepted only for the
# loader-supplied `HostBundled` source, and only when a matching host service
# (`native_memory_provider`) is registered — the bundled TOML alone is not
# authority.
trust = "first_party_requested"

[runtime]
kind = "first_party"
service = "native_memory_provider"

# Model-facing tools are declared through the host-defined
# `ironclaw.capability_provider/v1` contract (extension-runtime §5.5): top-level
# `[[capabilities]]` is no longer accepted, so the memory tools live under the
# `capability_provider.tools` section this host_api projects.
[[host_api]]
id = "ironclaw.capability_provider/v1"
section = "capability_provider.tools"

[capability_provider.tools]

# memory.document_store.v1 — read operation, exposed as a model-facing tool. The
# schema refs match the document_store profile's read-operation refs so the
# conformance harness binds this capability to that operation.
[[capability_provider.tools.capabilities]]
id = "ironclaw.memory.read"
implements = ["memory.document_store.v1"]
description = "Read a Reborn persistent memory document in the current tenant/user/agent/project scope."
effects = ["read_filesystem"]
default_permission = "allow"
visibility = "model"
input_schema_ref = "schemas/memory/document-read.input.v1.json"
output_schema_ref = "schemas/memory/document-read.output.v1.json"
prompt_doc_ref = "prompts/memory-native/read.md"

# memory.document_store.v1 — write operation, exposed as a model-facing tool.
# Host prompt-write safety runs before dispatching writes to prompt-injected
# memory files.
[[capability_provider.tools.capabilities]]
id = "ironclaw.memory.write"
implements = ["memory.document_store.v1"]
description = "Write, append, or patch Reborn persistent memory documents in the current tenant/user/agent/project scope. For structured user facts (timezone, locale, location), use builtin.profile_set instead."
effects = ["read_filesystem", "write_filesystem"]
default_permission = "allow"
visibility = "model"
input_schema_ref = "schemas/memory/document-write.input.v1.json"
output_schema_ref = "schemas/memory/document-write.output.v1.json"
prompt_doc_ref = "prompts/memory-native/write.md"

# Native search convenience. Implements no portable profile operation — it is a
# provider-specific model tool layered on the same filesystem store.
[[capability_provider.tools.capabilities]]
id = "ironclaw.memory.search"
implements = []
description = "Search only Reborn internal persistent memory documents in the current tenant/user/agent/project scope; this does not search connected app or extension data."
effects = ["read_filesystem"]
default_permission = "allow"
visibility = "model"
input_schema_ref = "schemas/memory/search.input.v1.json"
output_schema_ref = "schemas/memory/search.output.v1.json"
prompt_doc_ref = "prompts/memory-native/search.md"

# Native tree/list convenience. Implements no portable profile operation.
[[capability_provider.tools.capabilities]]
id = "ironclaw.memory.tree"
implements = []
description = "List Reborn persistent memory documents as a compact tree."
effects = ["read_filesystem"]
default_permission = "allow"
visibility = "model"
input_schema_ref = "schemas/memory/tree.input.v1.json"
output_schema_ref = "schemas/memory/tree.output.v1.json"
prompt_doc_ref = "prompts/memory-native/tree.md"
