[package]
name = "ironclaw_turns"
version = "0.1.0"
edition = "2024"
# Keep in sync with the workspace-level package.rust-version.
rust-version.workspace = true
description = "Host-layer turn coordination contracts for IronClaw Reborn"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[package.metadata.ironclaw]
layer = "kernel"

[features]
# In-memory turn-state store double (`test_support::in_memory_turn_state_store`)
# for cross-crate tests. Enabled via dev-dependencies; never in production.
test-support = []

[dependencies]
async-trait = "0.1"
blake3 = "1"
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"
futures-util = "0.3"
ironclaw_filesystem = { path = "../ironclaw_filesystem", version = "0.1.0" }
ironclaw_host_api = { path = "../ironclaw_host_api", version = "0.1.0" }
ironclaw_observability = { path = "../ironclaw_observability" }
hex = "0.4.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_jcs = "0.2"
sha2 = "0.11"
thiserror = "2"
tokio = { version = "1", features = ["rt", "sync", "time"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
# Self-reference so the crate's own integration tests see `test_support`.
ironclaw_turns = { path = ".", features = ["test-support"] }
# Test-only: the durable-read perf harness (`events_query_stress`) builds a real
# libSQL-backed store. Matches `ironclaw_filesystem`'s libsql feature set.
libsql = { version = "0.9", default-features = false, features = [
    "core",
    "replication",
    "remote",
    "tls",
] }
rand = "0.10"
static_assertions = "1"
tempfile = "3"
tokio = { version = "1", features = [
    "macros",
    "rt",
    "rt-multi-thread",
    "test-util",
    "time",
] }
