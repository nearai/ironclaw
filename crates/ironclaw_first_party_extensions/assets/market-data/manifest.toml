schema_version = "reborn.extension_manifest.v2"
id = "market-data"
name = "Market Data"
version = "0.1.0"
description = "Fake market-data tool (#5459 test fixture): returns a current S&P 500 (SPX) snapshot. Keyless — installed by an admin and shared with all users."
trust = "first_party_requested"

[runtime]
kind = "wasm"
module = "wasm/market_data_tool.wasm"

[[capabilities]]
id = "market-data.snp500"
description = "Get the current S&P 500 (SPX) index snapshot — level, daily change, and percent change. Takes no arguments."
effects = ["dispatch_capability", "network"]
default_permission = "allow"
visibility = "model"
input_schema_ref = "schemas/market-data/snp500.input.v1.json"
output_schema_ref = "schemas/market-data/snp500.output.v1.json"
prompt_doc_ref = "prompts/market-data/snp500.md"

[[capabilities.network_targets]]
scheme = "https"
host_pattern = "api.marketdata.example"
