schema_version = "reborn.extension_manifest.v3"
id = "google-calendar"
name = "Google Calendar"
version = "0.1.0"
description = "First-party Google Calendar capabilities for Reborn."
trust = "first_party_requested"

[runtime]
kind = "first_party"
service = "google-calendar"

[admin_configuration]
group_id = "vendor.google"
display_name = "Google OAuth client credentials"
description = "Deployment OAuth client credentials shared by Google extensions."
fields = [
  { handle = "google_oauth_client_id", label = "Google OAuth client ID", secret = false, required = true },
  { handle = "google_oauth_client_secret", label = "Google OAuth client secret", secret = true, required = true },
]

[[tools]]
origin_gate_matrix = { loop_run = "gated_unless_granted", product = "forbidden", automation = "forbidden" }
id = "google-calendar.list_calendars"
description = "List Google calendars."
effects = ["network", "use_secret"]
default_permission = "allow"
visibility = "model"
input_schema_ref = "schemas/google-calendar/list_calendars.input.v1.json"
prompt_doc_ref = "prompts/google-calendar/list_calendars.md"

[[tools.credentials]]
handle = "google_calendar_account"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/calendar.readonly"]
audience = { scheme = "https", host = "www.googleapis.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
origin_gate_matrix = { loop_run = "gated_unless_granted", product = "forbidden", automation = "forbidden" }
id = "google-calendar.list_events"
description = "List Google Calendar events. Defaults to upcoming expanded events ordered by start time; use include_all_calendars or calendar_ids to cover more than the primary calendar."
effects = ["network", "use_secret"]
default_permission = "allow"
visibility = "model"
input_schema_ref = "schemas/google-calendar/list_events.input.v1.json"
prompt_doc_ref = "prompts/google-calendar/list_events.md"

[[tools.credentials]]
handle = "google_calendar_account"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/calendar.readonly"]
audience = { scheme = "https", host = "www.googleapis.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

