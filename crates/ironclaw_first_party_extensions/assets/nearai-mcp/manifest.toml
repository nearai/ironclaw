schema_version = "reborn.extension_manifest.v3"
id = "nearai"
name = "NEAR AI"
version = "0.1.0"
description = "NEAR AI MCP tools for web search and hosted agent capabilities."
trust = "first_party_requested"

[mcp]
origin_gate_matrix = { loop_run = "gated_unless_granted", product = "forbidden", automation = "forbidden" }
server = "https://private.near.ai/mcp"
namespace = "nearai"
max_tools = 64
default_permission = "ask"
effects = ["network", "use_secret"]

# The connection credential reuses the assistant's host-managed NEAR AI LLM
# key (`llm_nearai_api_key`); no separate account setup is required.
[[mcp.credentials]]
handle = "llm_nearai_api_key"
vendor = "nearai"
scopes = []
injection = { type = "header", name = "authorization", prefix = "Bearer " }

# Statically pinned tool: guaranteed model-visible from first boot and on the
# bundled-manifest fallback, without live MCP discovery. A successful
# tools/list discovery replaces the static set with the server's live catalog.
# Credentials/effects inherit the [mcp] connection template.
[[tools]]
origin_gate_matrix = { loop_run = "gated_unless_granted", product = "forbidden", automation = "forbidden" }
id = "nearai.web_search"
description = "Search through the NEAR AI MCP server."
default_permission = "ask"
input_schema_ref = "schemas/nearai/web_search.input.v1.json"
prompt_doc_ref = "prompts/nearai/web_search.md"

[auth.nearai]
method = "api_key"
display_name = "NEAR AI API key"
fields = [
  { handle = "llm_nearai_api_key", label = "NEAR AI API key", secret = true },
]
