schema_version = "reborn.extension_manifest.v3"
id = "nearai"
name = "NEAR AI"
version = "0.1.0"
description = "NEAR AI MCP tools for web search and hosted agent capabilities."
trust = "first_party_requested"

[mcp]
server = "https://private.near.ai/mcp"
namespace = "nearai"
max_tools = 64
default_permission = "ask"
effects = ["network", "use_secret"]

# The connection credential reuses the assistant's host-managed NEAR AI LLM
# key (`llm_nearai_api_key`); no separate account setup is required.
[[mcp.credentials]]
handle = "llm_nearai_api_key"
vendor = "nearai"
scopes = []
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[auth.nearai]
method = "api_key"
display_name = "NEAR AI API key"
fields = [
  { handle = "llm_nearai_api_key", label = "NEAR AI API key", secret = true },
]
