schema_version = "reborn.extension_manifest.v3"
id = "notion"
name = "Notion"
version = "0.1.0"
description = "Notion MCP tools for creating, searching, fetching, querying, and managing Notion workspace content."
trust = "third_party"

[mcp]
origin_gate_matrix = { loop_run = "gated_unless_granted", product = "forbidden", automation = "forbidden" }
server = "https://mcp.notion.com/mcp"
namespace = "notion"
max_tools = 256
default_permission = "ask"
effects = ["network", "use_secret", "external_write"]

[[mcp.credentials]]
handle = "mcp_notion_access_token"
vendor = "notion"
scopes = []
injection = { type = "header", name = "authorization", prefix = "Bearer " }

# Hosted-MCP Notion uses dynamic client registration (RFC 7591): the absence
# of a client_credentials block declares exactly that.
[auth.notion]
method = "oauth2_code"
display_name = "Notion account"
authorization_endpoint = "https://mcp.notion.com/authorize"
token_endpoint = "https://mcp.notion.com/token"
scopes = []

# Notion MCP is OAuth 2.1 with a dynamically registered public client:
# access tokens expire (~1h) and refresh tokens rotate single-use. Without
# the refresh/expiry captures below the engine stores the token as
# non-expiring and every Notion connection dies within the hour.
[auth.notion.refresh]
rotates_refresh_token = true

[auth.notion.token_response]
access_token = "/access_token"
refresh_token = "/refresh_token"
expires_in = "/expires_in"
scope = { path = "/scope", missing = "fallback_to_requested" }
