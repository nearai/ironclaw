schema_version = "reborn.extension_manifest.v2"
id = "notion"
name = "Notion"
version = "0.1.0"
description = "Notion MCP tools for creating, searching, fetching, querying, and managing Notion workspace content."
trust = "third_party"

[runtime]
kind = "mcp"
transport = "http"
url = "https://mcp.notion.com/mcp"

[[capabilities]]
id = "notion.notion-search"
description = "Search Notion workspace content and connected sources through Notion MCP."
effects = ["dispatch_capability", "network", "use_secret"]
runtime_credentials = [
  { handle = "mcp_notion_access_token", audience = { scheme = "https", host_pattern = "mcp.notion.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/notion/notion-search.input.v1.json"
output_schema_ref = "schemas/notion/notion-search.output.v1.json"
prompt_doc_ref = "prompts/notion/notion-search.md"
required_host_ports = ["host.runtime.http_egress"]

[[capabilities]]
id = "notion.notion-fetch"
description = "Fetch a Notion page, database, or data source by URL or ID through Notion MCP."
effects = ["dispatch_capability", "network", "use_secret"]
runtime_credentials = [
  { handle = "mcp_notion_access_token", audience = { scheme = "https", host_pattern = "mcp.notion.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/notion/notion-fetch.input.v1.json"
output_schema_ref = "schemas/notion/notion-fetch.output.v1.json"
prompt_doc_ref = "prompts/notion/notion-fetch.md"
required_host_ports = ["host.runtime.http_egress"]

[[capabilities]]
id = "notion.notion-create-pages"
description = "Create one or more Notion pages with properties, content, templates, icons, or covers through Notion MCP."
effects = ["dispatch_capability", "network", "use_secret", "external_write"]
runtime_credentials = [
  { handle = "mcp_notion_access_token", audience = { scheme = "https", host_pattern = "mcp.notion.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/notion/notion-create-pages.input.v1.json"
output_schema_ref = "schemas/notion/notion-create-pages.output.v1.json"
prompt_doc_ref = "prompts/notion/notion-create-pages.md"
required_host_ports = ["host.runtime.http_egress"]

[[capabilities]]
id = "notion.notion-update-page"
description = "Update a Notion page's properties, content, icon, cover, or template through Notion MCP."
effects = ["dispatch_capability", "network", "use_secret", "external_write"]
runtime_credentials = [
  { handle = "mcp_notion_access_token", audience = { scheme = "https", host_pattern = "mcp.notion.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/notion/notion-update-page.input.v1.json"
output_schema_ref = "schemas/notion/notion-update-page.output.v1.json"
prompt_doc_ref = "prompts/notion/notion-update-page.md"
required_host_ports = ["host.runtime.http_egress"]

[[capabilities]]
id = "notion.notion-move-pages"
