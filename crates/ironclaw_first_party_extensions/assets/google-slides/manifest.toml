schema_version = "reborn.extension_manifest.v3"
id = "google-slides"
name = "Google Slides"
version = "0.1.0"
description = "Google Slides capabilities for creating, reading, editing, and formatting presentations."
trust = "first_party_requested"

[runtime]
kind = "wasm"
module = "wasm/google_slides_tool.wasm"

[admin_configuration]
group_id = "vendor.google"
display_name = "Google OAuth client credentials"
description = "Deployment OAuth client credentials shared by Google extensions."
fields = [
  { handle = "google_oauth_client_id", label = "Google OAuth client ID", secret = false, required = true },
  { handle = "google_oauth_client_secret", label = "Google OAuth client secret", secret = true, required = true },
]

[[tools]]
id = "google-slides.create_presentation"
description = "Create a new presentation."
effects = ["network", "use_secret", "external_write"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-slides/create_presentation.input.v1.json"
prompt_doc_ref = "prompts/google-slides/create_presentation.md"

[[tools.credentials]]
handle = "google_runtime_token"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/presentations"]
audience = { scheme = "https", host = "slides.googleapis.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "google-slides.get_presentation"
description = "Get presentation metadata."
effects = ["network", "use_secret"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-slides/get_presentation.input.v1.json"
prompt_doc_ref = "prompts/google-slides/get_presentation.md"

[[tools.credentials]]
handle = "google_runtime_token"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/presentations.readonly"]
audience = { scheme = "https", host = "slides.googleapis.com" }
