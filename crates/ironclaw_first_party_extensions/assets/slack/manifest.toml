schema_version = "reborn.extension_manifest.v2"
id = "slack"
name = "Slack"
version = "0.1.0"
description = "Act as you in Slack via your own user token (xoxp-): search all your messages, list and read your DMs and group DMs, read channel history, and post as you."
trust = "first_party_requested"

[runtime]
kind = "wasm"
module = "wasm/slack_user_tool.wasm"

# Least-privilege scopes: the read-only tools request only read scopes; only
# send_message requests chat:write. The slack_personal OAuth grant is the union
# of these (a single account shared by all tools), so a read-only user still
# grants chat:write while send_message is a default tool. Reducing the grant for
# read-only users needs a write-opt-in / scope-upgrade re-consent flow — tracked
# separately (see the follow-up issue referenced on SLACK_PERSONAL_OAUTH_SETUP_SCOPES).

[[capabilities]]
id = "slack.search_messages"
description = "Search across all messages you can see (your DMs, group DMs, and channels you belong to). Requires the search:read user scope."
effects = ["dispatch_capability", "network", "use_secret"]
runtime_credentials = [
  { handle = "slack_user_token", source = { type = "product_auth_account", provider = "slack_personal", setup = { kind = "oauth", scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read"] } }, provider_scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read"], audience = { scheme = "https", host_pattern = "slack.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/slack/search_messages.input.v1.json"
output_schema_ref = "schemas/slack/raw_output.v1.json"
prompt_doc_ref = "prompts/slack/search_messages.md"
required_host_ports = ["host.runtime.http_egress"]

[[capabilities]]
id = "slack.list_conversations"
description = "List channels, private channels, DMs (im), and group DMs (mpim) you belong to. Use this to discover DM conversation IDs."
effects = ["dispatch_capability", "network", "use_secret"]
runtime_credentials = [
  { handle = "slack_user_token", source = { type = "product_auth_account", provider = "slack_personal", setup = { kind = "oauth", scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read"] } }, provider_scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read"], audience = { scheme = "https", host_pattern = "slack.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/slack/list_conversations.input.v1.json"
output_schema_ref = "schemas/slack/raw_output.v1.json"
prompt_doc_ref = "prompts/slack/list_conversations.md"
required_host_ports = ["host.runtime.http_egress"]

[[capabilities]]
id = "slack.get_conversation_history"
description = "Read message history from any channel or DM you can see, identified by its conversation ID."
effects = ["dispatch_capability", "network", "use_secret"]
runtime_credentials = [
  { handle = "slack_user_token", source = { type = "product_auth_account", provider = "slack_personal", setup = { kind = "oauth", scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read"] } }, provider_scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read"], audience = { scheme = "https", host_pattern = "slack.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/slack/get_conversation_history.input.v1.json"
output_schema_ref = "schemas/slack/raw_output.v1.json"
prompt_doc_ref = "prompts/slack/get_conversation_history.md"
required_host_ports = ["host.runtime.http_egress"]

[[capabilities]]
id = "slack.get_user_info"
description = "Get information about a Slack user (name, real name)."
effects = ["dispatch_capability", "network", "use_secret"]
runtime_credentials = [
  { handle = "slack_user_token", source = { type = "product_auth_account", provider = "slack_personal", setup = { kind = "oauth", scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read"] } }, provider_scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read"], audience = { scheme = "https", host_pattern = "slack.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/slack/get_user_info.input.v1.json"
output_schema_ref = "schemas/slack/raw_output.v1.json"
prompt_doc_ref = "prompts/slack/get_user_info.md"
required_host_ports = ["host.runtime.http_egress"]

[[capabilities]]
id = "slack.send_message"
description = "Send a message as you to a channel or DM. Requires the chat:write user scope; the message appears to come from your account."
effects = ["dispatch_capability", "network", "use_secret", "external_write"]
runtime_credentials = [
  { handle = "slack_user_token", source = { type = "product_auth_account", provider = "slack_personal", setup = { kind = "oauth", scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read", "chat:write"] } }, provider_scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read", "chat:write"], audience = { scheme = "https", host_pattern = "slack.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/slack/send_message.input.v1.json"
output_schema_ref = "schemas/slack/raw_output.v1.json"
prompt_doc_ref = "prompts/slack/send_message.md"
required_host_ports = ["host.runtime.http_egress"]
