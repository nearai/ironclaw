schema_version = "reborn.extension_manifest.v3"
id = "slack"
name = "Slack"
version = "0.1.0"
description = "Slack: DM the assistant via the Slack Events API channel (workspace bot), and act as you via your own user token (xoxp-): search all your messages, list and read your DMs and group DMs, read channel history, and post as you."
trust = "first_party_requested"

[runtime]
kind = "wasm"
module = "wasm/slack_user_tool.wasm"

# Least-privilege scopes: the read-only tools request only read scopes; only
# send_message requests chat:write. The slack OAuth grant is the union of
# these (the [auth.slack] recipe ceiling — a single account shared by all
# tools), so a read-only user still grants chat:write while send_message is a
# default tool. Reducing the grant for read-only users needs a write-opt-in /
# scope-upgrade re-consent flow — tracked separately.

# ---- tool surfaces ---------------------------------------------------------

[[tools]]
id = "slack.search_messages"
description = "Search across all messages you can see (your DMs, group DMs, and channels you belong to). Requires the search:read user scope."
effects = ["network", "use_secret"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/slack/search_messages.input.v1.json"
prompt_doc_ref = "prompts/slack/search_messages.md"

[[tools.credentials]]
handle = "slack_user_token"
vendor = "slack"
scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read"]
audience = { scheme = "https", host = "slack.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "slack.list_conversations"
description = "List channels, private channels, DMs (im), and group DMs (mpim) you belong to. Use this to discover DM conversation IDs."
effects = ["network", "use_secret"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/slack/list_conversations.input.v1.json"
prompt_doc_ref = "prompts/slack/list_conversations.md"

[[tools.credentials]]
handle = "slack_user_token"
vendor = "slack"
scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read"]
audience = { scheme = "https", host = "slack.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "slack.get_conversation_history"
description = "Read message history from any channel or DM you can see, identified by its conversation ID."
effects = ["network", "use_secret"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/slack/get_conversation_history.input.v1.json"
prompt_doc_ref = "prompts/slack/get_conversation_history.md"

[[tools.credentials]]
handle = "slack_user_token"
vendor = "slack"
scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read"]
audience = { scheme = "https", host = "slack.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "slack.get_user_info"
description = "Get information about a Slack user (name, real name)."
effects = ["network", "use_secret"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/slack/get_user_info.input.v1.json"
prompt_doc_ref = "prompts/slack/get_user_info.md"

[[tools.credentials]]
handle = "slack_user_token"
vendor = "slack"
scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read"]
audience = { scheme = "https", host = "slack.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "slack.send_message"
description = "Send a Slack message as the user to a channel or DM — a side effect inside the current job (the message appears to come from their account; requires the chat:write user scope). Never use this to deliver your final answer or reply to the user: the host delivers final replies on the conversation's outbound channel."
effects = ["network", "use_secret", "external_write"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/slack/send_message.input.v1.json"
prompt_doc_ref = "prompts/slack/send_message.md"

[[tools.credentials]]
handle = "slack_user_token"
vendor = "slack"
scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read", "chat:write"]
audience = { scheme = "https", host = "slack.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

# ---- channel surface (at most one per extension) ---------------------------

[channel]
id = "messages"
display_name = "Slack messages"
inbound = true
outbound = true
conversation_model = "continuous"

[channel.ingress]
route_suffix = "events"
method = "post"
body_limit_bytes = 1048576

[channel.ingress.verification]
kind = "hmac_sha256"
secret_handle = "slack_signing_secret"
signature_header = "X-Slack-Signature"
signature_prefix = "v0="
signature_encoding = "hex"
timestamp_header = "X-Slack-Request-Timestamp"
max_age_seconds = 300
signed_payload = [
  { literal = "v0:" },
  { header = "X-Slack-Request-Timestamp" },
  { literal = ":" },
  { body = true },
]

[channel.config]
fields = [
  { handle = "slack_bot_token", label = "Bot token", secret = true },
  { handle = "slack_signing_secret", label = "Signing secret", secret = true },
  # Connection-scoping values for the generic post-OAuth identity binding
  # (handle-suffix convention: *_team_id / *_app_id map onto the proven
  # identity claims). The Slack setup surface still owns these values until
  # its configure lane folds into [channel.config]; the manifest declares
  # their durable home.
  { handle = "slack_team_id", label = "Workspace (team) ID", secret = false },
  { handle = "slack_api_app_id", label = "App ID", secret = false },
]

[[channel.egress]]
scheme = "https"
host = "slack.com"
methods = ["post"]
credential_handle = "slack_bot_token"

[channel.presentation]
supports_markdown = true
supports_threads = true
max_message_chars = 40000

# ---- auth surface: recipe data, zero extension code ------------------------

[auth.slack]
method = "oauth2_code"
display_name = "Slack account"
authorization_endpoint = "https://slack.com/oauth/v2/authorize"
token_endpoint = "https://slack.com/api/oauth.v2.access"
scope_param = "user_scope"
pkce = "s256"
scopes = ["search:read", "channels:history", "groups:history", "im:history", "mpim:history", "channels:read", "groups:read", "im:read", "mpim:read", "users:read", "chat:write"]
client_credentials = { client_id_handle = "slack_oauth_client_id", client_secret_handle = "slack_oauth_client_secret" }

[auth.slack.token_response]
access_token = "/authed_user/access_token"
scope = { path = "/authed_user/scope", missing = "fallback_to_requested" }

[auth.slack.identity]
account_id = "/authed_user/id"
team_id = "/team/id"
enterprise_id = "/enterprise/id"
app_id = "/app_id"
