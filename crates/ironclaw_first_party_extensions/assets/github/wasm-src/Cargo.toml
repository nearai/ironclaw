[package]
name = "github-tool"
version = "0.1.0"
edition = "2021"
description = "First-party GitHub Reborn WASM extension"
license = "MIT OR Apache-2.0"
publish = false

[lib]
crate-type = ["cdylib"]

[workspace]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
wit-bindgen = "0.41.0"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
