schema_version = "reborn.extension_manifest.v3"
id = "github"
name = "GitHub"
version = "0.2.7"
description = "GitHub repository, issue, pull request, search, branch, file, release, workflow, fork, and webhook capabilities."
trust = "first_party_requested"

[runtime]
kind = "wasm"
module = "wasm/github_tool.wasm"

# GitHub REST endpoints return heterogeneous provider-owned response shapes.
# The WASM intentionally preserves those raw JSON contracts for v1 parity while
# keeping inputs typed and host-mediated.

[[tools]]
origin_gate_matrix = { loop_run = "gated_unless_granted", product = "forbidden", automation = "forbidden" }
