schema_version = "reborn.extension_manifest.v2"
id = "github"
name = "GitHub"
version = "0.2.6"
description = "GitHub repository, issue, pull request, search, branch, file, release, workflow, fork, and webhook capabilities."
trust = "first_party_requested"

[runtime]
kind = "wasm"
module = "wasm/github_tool.wasm"

[[host_api]]
id = "ironclaw.capability_provider/v1"
section = "capability_provider.tools"

[capability_provider.tools]

# GitHub REST endpoints return heterogeneous provider-owned response shapes.
# The WASM intentionally preserves those raw JSON contracts for v1 parity while
# keeping inputs typed and host-mediated.

[[capability_provider.tools.capabilities]]
id = "github.get_repo"
description = "Get a GitHub repository."
effects = ["network", "use_secret"]
runtime_credentials = [
  { handle = "github_runtime_token", source = { type = "product_auth_account", provider = "github" }, audience = { scheme = "https", host_pattern = "api.github.com" }, target = { type = "header", name = "authorization", prefix = "Bearer " } },
]
default_permission = "allow"
visibility = "model"
input_schema_ref = "schemas/github/get_repo.input.v1.json"
output_schema_ref = "schemas/github/raw_output.v1.json"
prompt_doc_ref = "prompts/github/get_repo.md"
required_host_ports = ["host.runtime.http_egress"]

