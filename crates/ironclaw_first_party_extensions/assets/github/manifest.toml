description = "Get a GitHub repository."
effects = ["network", "use_secret"]
default_permission = "allow"
visibility = "model"
input_schema_ref = "schemas/github/get_repo.input.v1.json"
prompt_doc_ref = "prompts/github/get_repo.md"

[[tools.credentials]]
handle = "github_runtime_token"
vendor = "github"
audience = { scheme = "https", host = "api.github.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

