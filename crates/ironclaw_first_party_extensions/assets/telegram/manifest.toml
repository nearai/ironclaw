# The Telegram messaging channel — the extension runtime's second production
# channel (the "addition test", DEL-10): a pure channel extension whose entire
# vendor surface is one manifest plus the channel adapter crate. No tools, no
# WASM module, no bespoke host code.
schema_version = "reborn.extension_manifest.v3"
id = "telegram"
name = "Telegram"
version = "0.1.0"
description = "Telegram messaging channel via the Bot API"
trust = "first_party_requested"

[runtime]
kind = "first_party"
service = "telegram.extension/v1"

[admin_configuration]
group_id = "extension.telegram"
display_name = "Telegram deployment configuration"
description = "Deployment credentials and public account metadata for the Telegram channel."
fields = [
  { handle = "telegram_bot_token", label = "Bot token", secret = true, required = true },
  { handle = "telegram_webhook_secret", label = "Webhook secret token", secret = true, required = true },
  { handle = "telegram_webhook_url", label = "Public webhook URL", secret = false, required = true },
  { handle = "bot_username", label = "Bot username", secret = false, required = true },
]

# ---- channel surface -------------------------------------------------------

[channel]
id = "messages"
display_name = "Telegram messages"
inbound = true
outbound = true
conversation_model = "continuous"

[channel.connection]
provider = "telegram"
strategy = "web_generated_code"
instructions = "Pair your Telegram account from the IronClaw pairing panel by opening its link, scanning its QR code, or sending /start followed by the displayed code to the bot."
input_placeholder = ""
submit_label = "Open pairing"
error_message = "Telegram pairing failed. Get a fresh code and try again."
connection_success_message = "Telegram is installed as an inbound entrypoint. If WebChat shows a Telegram pairing panel, tell the user to pair via the link, the QR code, or by sending the shown code to the bot in Telegram — nothing is pasted into normal chat. Once paired the user can DM the bot directly. Telegram exposes no tools and cannot read messages or send on the user's behalf."
deep_link_template = "https://t.me/{bot_username}?start={code}"
inbound_code_prefixes = ["/start"]

[channel.connection.notices]
connect_required = "👋 Pair your Telegram account in the IronClaw web app, then message me here again."
paired = "✅ Telegram is paired. You can talk to IronClaw right here."
already_paired_same_user = "✅ This Telegram account is already paired to you. You can talk to IronClaw right here."
already_bound_to_other_user = "This Telegram account is already paired to another IronClaw user."
expired_or_unknown = "That Telegram pairing code is invalid or expired. Get a fresh link or code from IronClaw and try again."

[channel.ingress]
route_suffix = "updates"
method = "post"
body_limit_bytes = 1048576

[channel.ingress.verification]
kind = "shared_secret_header"
secret_handle = "telegram_webhook_secret"
header = "X-Telegram-Bot-Api-Secret-Token"

[[channel.egress]]
scheme = "https"
host = "api.telegram.org"
methods = ["post"]
credential_handle = "telegram_bot_token"
# The Bot API carries the token in the URL path (`/bot<token>/method`); the
# adapter writes the `{telegram_bot_token}` placeholder and the host
# substitutes the secret — token bytes never reach the adapter.
injection = { type = "path_placeholder", placeholder = "telegram_bot_token" }
# `setWebhook` takes the webhook shared secret as the `secret_token` JSON
# body field (the value Telegram echoes on every delivery, verified by the
# `shared_secret_header` ingress recipe above). The adapter opts in by
# naming the handle; the host resolves it and inserts the VALUE at the
# declared pointer — secret bytes never reach the adapter.
body_credentials = [
  { handle = "telegram_webhook_secret", pointer = "/secret_token" },
]

[channel.presentation]
supports_markdown = false
supports_threads = true
max_message_chars = 4096
