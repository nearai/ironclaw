schema_version = "reborn.extension_manifest.v3"
id = "google-drive"
name = "Google Drive"
version = "0.1.0"
description = "Google Drive capabilities for searching, accessing, uploading, sharing, and organizing files and folders, including finding Google Sheets/spreadsheets, Docs, and Slides by name or title."
trust = "first_party_requested"

[runtime]
kind = "wasm"
module = "wasm/google_drive_tool.wasm"

[admin_configuration]
group_id = "vendor.google"
display_name = "Google OAuth client credentials"
description = "Deployment OAuth client credentials shared by Google extensions."
fields = [
  { handle = "google_oauth_client_id", label = "Google OAuth client ID", secret = false, required = true },
  { handle = "google_oauth_client_secret", label = "Google OAuth client secret", secret = true, required = true },
]

[[tools]]
id = "google-drive.list_files"
description = "Search or list files and folders, including Google Sheets/spreadsheets by name or title."
effects = ["network", "use_secret"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-drive/list_files.input.v1.json"
prompt_doc_ref = "prompts/google-drive/list_files.md"

[[tools.credentials]]
handle = "google_runtime_token"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/drive.readonly"]
audience = { scheme = "https", host = "www.googleapis.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "google-drive.get_file"
description = "Get file metadata."
effects = ["network", "use_secret"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-drive/get_file.input.v1.json"
prompt_doc_ref = "prompts/google-drive/get_file.md"

[[tools.credentials]]
handle = "google_runtime_token"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/drive.readonly"]
audience = { scheme = "https", host = "www.googleapis.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "google-drive.download_file"
description = "Download a file's content as text — including binary documents (PDF, PPTX, DOCX, XLSX), which are converted to extracted text automatically — or export a Google Workspace file. No shell or separate downloader needed."
effects = ["network", "use_secret"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-drive/download_file.input.v1.json"
prompt_doc_ref = "prompts/google-drive/download_file.md"

[[tools.credentials]]
handle = "google_runtime_token"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/drive.readonly"]
audience = { scheme = "https", host = "www.googleapis.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "google-drive.upload_file"
description = "Upload a new text file."
effects = ["network", "use_secret", "external_write"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-drive/upload_file.input.v1.json"
prompt_doc_ref = "prompts/google-drive/upload_file.md"

[[tools.credentials]]
handle = "google_runtime_token"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/drive"]
audience = { scheme = "https", host = "www.googleapis.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "google-drive.update_file"
description = "Update file metadata or move/star a file."
effects = ["network", "use_secret", "external_write"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-drive/update_file.input.v1.json"
prompt_doc_ref = "prompts/google-drive/update_file.md"

[[tools.credentials]]
handle = "google_runtime_token"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/drive"]
audience = { scheme = "https", host = "www.googleapis.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "google-drive.create_folder"
description = "Create a folder."
effects = ["network", "use_secret", "external_write"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-drive/create_folder.input.v1.json"
prompt_doc_ref = "prompts/google-drive/create_folder.md"

[[tools.credentials]]
handle = "google_runtime_token"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/drive"]
audience = { scheme = "https", host = "www.googleapis.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "google-drive.delete_file"
description = "Permanently delete a file or folder."
effects = ["network", "use_secret", "external_write"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-drive/delete_file.input.v1.json"
prompt_doc_ref = "prompts/google-drive/delete_file.md"

[[tools.credentials]]
handle = "google_runtime_token"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/drive"]
audience = { scheme = "https", host = "www.googleapis.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "google-drive.trash_file"
description = "Move a file or folder to trash."
effects = ["network", "use_secret", "external_write"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-drive/trash_file.input.v1.json"
prompt_doc_ref = "prompts/google-drive/trash_file.md"

[[tools.credentials]]
handle = "google_runtime_token"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/drive"]
audience = { scheme = "https", host = "www.googleapis.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "google-drive.share_file"
description = "Share a file or folder with someone."
effects = ["network", "use_secret", "external_write"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-drive/share_file.input.v1.json"
prompt_doc_ref = "prompts/google-drive/share_file.md"

[[tools.credentials]]
handle = "google_runtime_token"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/drive"]
audience = { scheme = "https", host = "www.googleapis.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "google-drive.list_permissions"
description = "List file permissions."
effects = ["network", "use_secret"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-drive/list_permissions.input.v1.json"
prompt_doc_ref = "prompts/google-drive/list_permissions.md"

[[tools.credentials]]
handle = "google_runtime_token"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/drive.readonly"]
audience = { scheme = "https", host = "www.googleapis.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "google-drive.remove_permission"
description = "Revoke a file permission."
effects = ["network", "use_secret", "external_write"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-drive/remove_permission.input.v1.json"
prompt_doc_ref = "prompts/google-drive/remove_permission.md"

[[tools.credentials]]
handle = "google_runtime_token"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/drive"]
audience = { scheme = "https", host = "www.googleapis.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[[tools]]
id = "google-drive.list_shared_drives"
description = "List shared drives."
effects = ["network", "use_secret"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/google-drive/list_shared_drives.input.v1.json"
prompt_doc_ref = "prompts/google-drive/list_shared_drives.md"

[[tools.credentials]]
handle = "google_runtime_token"
vendor = "google"
scopes = ["https://www.googleapis.com/auth/drive.readonly"]
audience = { scheme = "https", host = "www.googleapis.com" }
injection = { type = "header", name = "authorization", prefix = "Bearer " }

[auth.google]
method = "oauth2_code"
display_name = "Google account"
authorization_endpoint = "https://accounts.google.com/o/oauth2/v2/auth"
token_endpoint = "https://oauth2.googleapis.com/token"
pkce = "s256"
scopes = ["https://www.googleapis.com/auth/drive.readonly", "https://www.googleapis.com/auth/drive"]
extra_authorize_params = { access_type = "offline", include_granted_scopes = "true", prompt = "consent" }
client_credentials = { client_id_handle = "google_oauth_client_id", client_secret_handle = "google_oauth_client_secret" }

[auth.google.refresh]
# Google refresh tokens for apps in "testing" publishing status expire after
# 7 days of inactivity; the host auth engine's keepalive sweep proactively
# refreshes idle accounts well before this vendor lifetime.
keepalive_idle_seconds = 604800

[auth.google.token_response]
access_token = "/access_token"
refresh_token = "/refresh_token"
expires_in = "/expires_in"
scope = { path = "/scope" }
