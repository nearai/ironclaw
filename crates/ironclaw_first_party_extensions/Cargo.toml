[package]
name = "ironclaw_first_party_extensions"
version = "0.1.0"
edition = "2024"
rust-version.workspace = true
description = "First-party userland extension implementations for IronClaw"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"
publish = false

[package.metadata.ironclaw]
layer = "loops"

[dependencies]
async-trait = "0.1"
base64 = "0.23.0"
blake3 = "1"
chrono = { version = "0.4", features = ["serde"] }
futures-util = "0.3"
glob = "0.3"
ironclaw_auth = { path = "../ironclaw_auth" }
ironclaw_extractors = { path = "../ironclaw_extractors" }
ironclaw_filesystem = { path = "../ironclaw_filesystem" }
ironclaw_host_api = { path = "../ironclaw_host_api" }
ironclaw_observability = { path = "../ironclaw_observability" }
ironclaw_safety = { path = "../ironclaw_safety" }
ironclaw_skills = { path = "../ironclaw_skills" }
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
similar = "3"
thiserror = "2"
tokio = { version = "1", features = ["rt", "sync"] }
tracing = "0.1"
unicode-normalization = "0.1"
url = "2"

[dev-dependencies]
# Dev-only: coding-tool tests re-run the loop-boundary safe-summary validator
# (`LoopSafeSummary`) to pin that dispatch failure reasons survive it.
ironclaw_turns = { path = "../ironclaw_turns" }
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt", "time"] }
