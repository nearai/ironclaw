      rel="stylesheet"
    />
    <script nonce="__IRONCLAW_CSP_NONCE__">
      (() => {
        try {
          const stored = localStorage.getItem("ironclaw:v2-theme");
          const theme =
            stored === "light" || stored === "dark"
              ? stored
              : matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          document.documentElement.dataset.theme = theme;
          window.__IRONCLAW_INITIAL_THEME__ = theme;
        } catch (_) {
          document.documentElement.dataset.theme = "light";
          window.__IRONCLAW_INITIAL_THEME__ = "light";
        }
      })();
    </script>
    <script type="importmap" nonce="__IRONCLAW_CSP_NONCE__">
      {
        "imports": {
          "@tanstack/react-query": "https://esm.sh/@tanstack/react-query@5.87.4?external=react,react-dom",
          "htm": "https://esm.sh/htm@3.1.1",
          "react": "https://esm.sh/react@19.1.0",
          "react/jsx-runtime": "https://esm.sh/react@19.1.0/jsx-runtime",
          "react-dom": "https://esm.sh/react-dom@19.1.0?external=react",
          "react-dom/client": "https://esm.sh/react-dom@19.1.0/client?external=react",
          "react-router": "https://esm.sh/react-router@7?external=react,react-dom",
          "react-hook-form": "https://esm.sh/react-hook-form@7.62.0?external=react,react-dom"
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        /* ── Fonts ─────────────────────────────────────────────────── */
        --font-sans: "Geist", "Inter", "SF Pro Display", "Helvetica Neue",
          ui-sans-serif, system-ui, sans-serif;
        --font-serif: "Newsreader", "Lyon Text", "Instrument Serif", Georgia,
          serif;
        --font-mono: "Geist Mono", "SF Mono", "JetBrains Mono", ui-monospace,
          monospace;

        /* ── Colour palette (iron-* / signal / copper utilities) ─── */
        /* Backed by CSS vars in app.css — switches automatically on theme. */
        --color-iron-950: var(--v2-canvas-strong);
        --color-iron-900: var(--v2-surface);
        --color-iron-800: var(--v2-surface-soft);
        --color-iron-700: var(--v2-panel-border);
        --color-iron-400: var(--v2-text-faint);
        --color-iron-300: var(--v2-text-muted);
        --color-iron-200: var(--v2-text);
        --color-iron-100: var(--v2-text-strong);
        --color-signal: var(--v2-accent-text);
        --color-copper: var(--v2-warning-text);
        --color-mint: var(--v2-accent-text);
      }
    </style>
    <link
      rel="stylesheet"
      href="/v2/design-tokens---359cf424-84bf-4efd-80c0-eacafcc103fe.css"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  </head>
