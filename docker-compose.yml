# Local development stack.
#
# Default (no profile): starts Postgres only — use when running `cargo run` locally.
#
# Full stack (app profile):
#   cp .env.example .env
#   # Set GATEWAY_AUTH_TOKEN, SECRETS_MASTER_KEY, and your LLM key in .env
#   docker compose --profile app up --build
#
# Gateway: http://127.0.0.1:3000
# For production put Caddy/nginx in front for TLS; Postgres is never exposed externally.

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: bastionclaw
      POSTGRES_USER: bastionclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bastionclaw}  # dev-only; set POSTGRES_PASSWORD in .env for any real deployment
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bastionclaw"]
      interval: 5s
      timeout: 3s
      retries: 5

  bastionclaw:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    # The bastionclaw process (uid 1000) needs read-write access to the Docker
    # socket.  The socket is owned by the group whose GID matches the host's
    # docker group.  We add that GID to the container's supplementary groups so
    # the process can connect without running as root.
    #
    # macOS Docker Desktop:  socket is root:root (gid 0) — DOCKER_GID defaults to 0.
    # Linux VPS:             socket is root:docker (gid varies, typically 998-999).
    #   Find it with: stat -c %g /var/run/docker.sock
    #   Then add DOCKER_GID=<that number> to your .env before starting.
    group_add:
      - "${DOCKER_GID:-0}"
    env_file:
      - .env
    environment:
      # Overrides: these take precedence over anything in .env
      DATABASE_URL: postgres://bastionclaw:${POSTGRES_PASSWORD:-bastionclaw}@postgres:5432/bastionclaw
      GATEWAY_ENABLED: "true"
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "3000"
      CLI_ENABLED: "false"
      ONBOARD_COMPLETED: "true"
      BASTIONCLAW_IN_DOCKER: "true"
      # Multi-tenancy: set AGENT_MULTI_TENANT=true in .env to enable per-user isolation
      AGENT_MULTI_TENANT: ${AGENT_MULTI_TENANT:-false}
      # Sandbox: containers for full_job routines, Claude Code bridge, ACP agents.
      # ReadOnly is the safe default — agents can fetch docs and call allowlisted
      # APIs but cannot modify the workspace filesystem.  Upgrade to
      # workspace_write in .env when routines need to build or produce artefacts.
      # full_access bypasses Docker entirely and requires a second opt-in via
      # SANDBOX_ALLOW_FULL_ACCESS=true — do not enable on shared/multi-tenant hosts.
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-true}
      SANDBOX_POLICY: ${SANDBOX_POLICY:-readonly}
      SANDBOX_ALLOW_FULL_ACCESS: "false"
      # Auto-register the t3n-mcp sidecar as a unix-transport MCP server on
      # first boot. The path must match the MCP_SOCKET_PATH below so both
      # containers agree on where the socket lives.
      T3N_MCP_SOCKET_PATH: /var/run/t3n-mcp/t3n-mcp.sock
      # TODO(security): When the docker-socket-proxy TODO above is resolved,
      #   point DOCKER_HOST here at the proxy socket instead of the raw daemon,
      #   e.g. DOCKER_HOST: "unix:///var/run/docker-proxy.sock"
    volumes:
      - bastionclaw_data:/home/bastionclaw/.bastionclaw
      - t3n_mcp_socket:/var/run/t3n-mcp
      # Grants the container access to the host Docker daemon so sandbox jobs
      # can spawn ephemeral worker containers (full_job routines, Claude Code
      # bridge, ACP agents).  Without this mount, SANDBOX_ENABLED=true has no
      # effect and a warning fires to every connected channel on startup.
      #
      # TODO(security): Replace this raw socket mount with a docker-socket-proxy
      #   (e.g. Tecnativa/docker-socket-proxy) that allowlists only the API
      #   calls BastionClaw actually needs (containers/create, start, stop,
      #   inspect, logs — at minimum).  The raw socket gives any process inside
      #   the container full Docker daemon access, which is a privilege-
      #   escalation path if the container is ever compromised.
      #   See: https://github.com/Tecnativa/docker-socket-proxy
      - /var/run/docker.sock:/var/run/docker.sock

  t3n-mcp-sidecar:
    profiles: ["app"]
    user: "0:0"
    build:
      # The main context is bastion-claw (for the bridge script). Trinity
      # sources come in as named additional contexts so we can `COPY
      # --from=<name> ...` in the Dockerfile. Check out ../trinity to
      # whichever commit you want — that's the version that gets built.
      #
      # We point directly at the two leaf subdirectories we need instead of
      # the trinity root because trinity's top-level .dockerignore has a
      # blanket `**/config/` exclusion that silently strips
      # src/shared/config/ from the context (Docker does not descend into
      # excluded directories, so the later `!**/src/` cannot re-include
      # it). By rooting each context inside client/ we bypass that
      # .dockerignore entirely.
      context: .
      dockerfile: docker/t3n-mcp-sidecar.Dockerfile
      additional_contexts:
        trinity_mcp: ../trinity/client/mcp/t3n-mcp
        trinity_shared: ../trinity/client/shared
    restart: unless-stopped
    environment:
      # Defaults to Trinity staging; override in .env when you need a different
      # environment or a custom live RPC endpoint.
      T3N_SDK_ENV: ${T3N_MCP_ENV:-staging}
      T3N_MCP_RPC_URL: ${T3N_MCP_RPC_URL:-}
      T3N_MCP_DASHBOARD_URL: ${T3N_MCP_DASHBOARD_URL:-}
      PRIVATE_KEY: ${T3N_MCP_PRIVATE_KEY:-}
      MCP_SOCKET_PATH: /var/run/t3n-mcp/t3n-mcp.sock
      # Source build from Trinity puts everything at /app (see Dockerfile).
      # The npm-install layout at /app/node_modules/@terminal-3/t3n-mcp was only
      # valid with the ccefae18 "from npm" approach.
      T3N_PROJECT_DIR: /app
    volumes:
      - t3n_mcp_socket:/var/run/t3n-mcp

volumes:
  pgdata:
  bastionclaw_data:
  t3n_mcp_socket:
