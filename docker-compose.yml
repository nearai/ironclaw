# Local development only — do NOT use these credentials in production.
services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ironclaw
      POSTGRES_USER: ironclaw
      POSTGRES_PASSWORD: ironclaw  # dev-only, change for any non-local deployment
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironclaw"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: ironclaw:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3231:3000"
      - "8281:8080"
    env_file:
      - .env
    environment:
      # Override DB connection to use service name (DNS resolution)
      DATABASE_URL: postgres://ironclaw:ironclaw@postgres:5432/ironclaw
    volumes:
      - ./extensions/ironclaw-home:/home/ironclaw/.ironclaw
      - ./tools-src:/app/tools-src:ro
      - ./channels-src:/app/channels-src:ro
    networks:
      - default

volumes:
  pgdata:
