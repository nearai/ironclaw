[package]
name = "gws-bridge"
version = "0.1.0"
edition = "2021"
description = "Standalone MCP stdio bridge around a local gws binary"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
anyhow = "1"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "process", "rt-multi-thread", "io-std", "io-util", "time"] }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"

[workspace]
