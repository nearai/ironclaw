[package]
name = "nostr-tool"
version = "0.1.0"
edition = "2021"
description = "Nostr integration tool for IronClaw (WASM component)"
license = "MIT OR Apache-2.0"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen = "=0.36"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"
# Pure-Rust secp256k1 with Schnorr signatures (no C deps -- compiles to WASM)
k256 = { version = "0.13", features = ["schnorr", "arithmetic", "ecdh"] }
# SHA-256 for event ID computation (pure Rust)
sha2 = "0.10"
# Bech32 for npub/nsec encoding (NIP-19)
bech32 = "0.11"
# Hex encoding/decoding
hex = "0.4"
# Elliptic curve traits
elliptic-curve = { version = "0.13", features = ["sec1"] }
# AES-256-CBC for NIP-04 DM encryption
aes = "0.8"
cbc = "0.1"
# Base64 for NIP-04 encrypted message encoding
base64 = "0.22"
# Random IV generation for NIP-04 (uses WASI random_get on wasm32-wasip2)
getrandom = "0.2"

[profile.release]
opt-level = "s"
lto = true
strip = true
codegen-units = 1

[workspace]
