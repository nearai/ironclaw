[package]
name = "nostr-integration-test"
version = "0.1.0"
edition = "2021"
publish = false

[workspace]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
k256 = { version = "0.13", features = ["schnorr", "arithmetic", "ecdh"] }
sha2 = "0.10"
bech32 = "0.11"
hex = "0.4"
elliptic-curve = { version = "0.13", features = ["sec1"] }
ureq = { version = "2", features = ["json"] }
tungstenite = { version = "0.21", features = ["native-tls"] }
native-tls = "0.2"
url = "2"
