api_version = "ironclaw.runtime/v1"

[boot]
profile = "local-dev"

[identity]
default_owner = "reborn-cli"
tenant = "reborn-cli"
default_agent = "reborn-cli-agent"

[runner]
heartbeat_interval_secs = 5
poll_interval_ms = 200
# Number of concurrent turn-runner worker tasks (default 4; clamped to 32).
# worker_count = 4
# Max concurrent runs in TurnStatus::Running per (tenant_id, owner user_id); 0 or absent = unlimited.
# max_concurrent_runs_per_user = 0
# Max concurrent ScheduledTrigger runs; 0 or absent = unlimited.
# max_concurrent_trigger_runs = 0
# Max concurrent Inbound/WebUi (conversation) runs; 0 or absent = unlimited.
# max_concurrent_conversation_runs = 0

[skills]
regex_activation_enabled = true

[webui]
env_token_var = "IRONCLAW_REBORN_WEBUI_TOKEN"
env_user_id_var = "IRONCLAW_REBORN_WEBUI_USER_ID"

# No [llm.default] slot shipped (intentional):
# - config.toml is sole source of truth for [llm.default], set only explicitly
# - Railway env (NEARAI_API_KEY et al) is complete, so env-fallback
#   (resolve_reborn_runtime_llm) resolves the LLM with no slot needed
# - existing volumes with the old baked-in stub: see entrypoint.sh migration
