api_version = "ironclaw.runtime/v1"

[boot]
profile = "hosted-single-tenant"

[identity]
default_owner = "reborn-cli"
tenant = "reborn-cli"
default_agent = "reborn-cli-agent"

[runner]
heartbeat_interval_secs = 5
poll_interval_ms = 200
# Hosted single-tenant has one elected process as the turn-runner authority.
# Do not cap global runner slots here: the LLM/provider and storage pool should
# be the bottlenecks, not an artificial in-process semaphore. Per-user and
# trigger caps still use the compiled safety defaults unless explicitly
# overridden.
worker_count = 0

[skills]
regex_activation_enabled = true

[storage]
backend = "postgres"
url_env = "IRONCLAW_REBORN_POSTGRES_URL"
secret_master_key_env = "IRONCLAW_REBORN_SECRET_MASTER_KEY"
# All Postgres-backed subsystems (turns, threads, messages, events, secrets)
# share this single pool, and each filesystem op checks out a connection. Size
# for runtime concurrency while leaving room for migrations and admin sessions.
# Override at runtime without a redeploy via
# IRONCLAW_REBORN_POSTGRES_POOL_MAX_SIZE (env wins over this file).
pool_max_size = 32
# Remote Postgres defaults to TLS. For trusted private-network deployments
# where the provider cannot complete TLS, set both DATABASE_SSLMODE=disable
# and IRONCLAW_REBORN_ALLOW_REMOTE_POSTGRES_CLEAR_TEXT=true.

[webui]
env_token_var = "IRONCLAW_REBORN_WEBUI_TOKEN"
env_user_id_var = "IRONCLAW_REBORN_WEBUI_USER_ID"

[llm.default]
provider_id = "nearai"
model = "deepseek-ai/DeepSeek-V4-Flash"
api_key_env = "NEARAI_API_KEY"
