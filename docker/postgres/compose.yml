services:
  postgres:
    # Pin a digest after first successful pull (see operator note below).
    image: pgvector/pgvector:pg16@sha256:<REPLACE_WITH_FIRST_PULL_DIGEST>
    container_name: flask-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flask_db
      POSTGRES_USER: flask_user
      # Password is injected as an environment variable by the shell that runs
      # `docker compose up`. It NEVER persists on disk. See Step 6.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be exported from ironclaw keychain before compose up}
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - flask_pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flask_user -d flask_db"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  flask_pgdata:
