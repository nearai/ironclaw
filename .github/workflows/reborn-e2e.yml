name: Reborn E2E

on:
  workflow_call:
    inputs:
      ref:
        description: Commit SHA or ref to test
        required: false
        type: string
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "crates/ironclaw_*/**"
      - "docs/reborn/**"
      - "scripts/reborn-e2e-rust.sh"
      - "tests/e2e/**"
      - "build.rs"
      - "providers.json"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/reborn-e2e.yml"
  push:
    branches:
      - main
    paths:
      - "crates/ironclaw_*/**"
      - "docs/reborn/**"
      - "scripts/reborn-e2e-rust.sh"
      - "tests/e2e/**"
      - "build.rs"
      - "providers.json"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/reborn-e2e.yml"

permissions:
  contents: read

concurrency:
  group: reborn-e2e-${{ github.event_name }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  rust-reborn:
    name: Rust Reborn (${{ matrix.group }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        group:
          - architecture
          - runtimes
          - substrates
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: reborn-e2e-${{ matrix.group }}
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Run deterministic Reborn Rust gate
        env:
          CARGO_TEST_ARGS: "-- --nocapture"
        run: scripts/reborn-e2e-rust.sh ${{ matrix.group }}

  gateway-smoke:
    name: Reborn gateway smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: reborn-e2e-gateway-smoke
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build ironclaw with libSQL
        run: cargo build --no-default-features --features libsql

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/e2e/pyproject.toml

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/e2e/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-playwright-
      - name: Install E2E dependencies
        run: |
          cd tests/e2e
          pip install -e .
          playwright install --with-deps chromium

      - name: Run Reborn gateway smoke
        run: pytest tests/e2e/scenarios/test_reborn_gateway_smoke.py -v --timeout=120

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reborn-e2e-screenshots
          path: tests/e2e/screenshots/
          if-no-files-found: ignore

  webui-v2-smoke:
    name: Reborn WebUI v2 smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install Node.js for WebUI bundle build
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: crates/ironclaw_webui_v2_static/frontend/package-lock.json

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: reborn-e2e-webui-v2-smoke
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build ironclaw-reborn with WebChat v2 surface
        run: cargo build -p ironclaw_reborn_cli --features webui-v2-beta

      - name: Install Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/e2e/pyproject.toml

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/e2e/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-playwright-
      - name: Install E2E dependencies
        run: |
          cd tests/e2e
          pip install -e .
          playwright install --with-deps chromium

      - name: Run Reborn WebUI v2 smoke
        run: pytest tests/e2e/scenarios/test_reborn_webui_v2_smoke.py -v --timeout=120

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: reborn-webui-v2-screenshots
          path: tests/e2e/screenshots/
          if-no-files-found: ignore

  reborn-e2e:
    name: Reborn E2E
    runs-on: ubuntu-latest
    if: always()
    needs:
      - rust-reborn
      - gateway-smoke
      - webui-v2-smoke
    steps:
      - name: Check Reborn E2E jobs
        run: |
          if [[ "${{ needs.rust-reborn.result }}" != "success" ]]; then
            echo "Rust Reborn E2E failed"
            exit 1
          fi
          if [[ "${{ needs.gateway-smoke.result }}" != "success" ]]; then
            echo "Reborn gateway smoke failed"
            exit 1
          fi
          if [[ "${{ needs.webui-v2-smoke.result }}" != "success" ]]; then
            echo "Reborn WebUI v2 smoke failed"
            exit 1
          fi
