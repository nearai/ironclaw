name: Reborn E2E

on:
  workflow_call:
    inputs:
      ref:
        description: Commit SHA or ref to test
        required: false
        type: string
  workflow_dispatch:
  # Scope gating for pull_request and merge_group happens in the `changes`
  # job below (via scripts/ci/classify-test-scope.sh) instead of workflow-level
  # `paths:` filters: merge_group events ignore path filters entirely, and a
  # path-filtered workflow never reports a status on non-matching PRs, which
  # breaks required-check protection. The `reborn-e2e` roll-up job always
  # reports, passing fast when the change is out of scope.
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
    types:
      - checks_requested
  push:
    branches:
      - main
    paths:
      - "crates/ironclaw_*/**"
      - "docs/reborn/**"
      - "scripts/reborn-e2e-rust.sh"
      - "tests/e2e/**"
      - "build.rs"
      - "providers.json"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/reborn-e2e.yml"

permissions:
  contents: read

concurrency:
  group: reborn-e2e-${{ github.event_name }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Reborn E2E scope
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.non_diff.outputs.docs_only || steps.diff.outputs.docs_only }}
      has_reborn_tests: ${{ steps.non_diff.outputs.has_reborn_tests || steps.diff.outputs.has_reborn_tests }}
      has_e2e_harness: ${{ steps.non_diff.outputs.has_e2e_harness || steps.diff.outputs.has_e2e_harness }}
    steps:
      - id: non_diff
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
        run: |
          echo "docs_only=false" >> "$GITHUB_OUTPUT"
          echo "has_reborn_tests=true" >> "$GITHUB_OUTPUT"
          echo "has_e2e_harness=true" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: diff
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          CHANGED_FILES="$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA")"

          echo "Changed files:"
          if [ -n "$CHANGED_FILES" ]; then
            printf '%s\n' "$CHANGED_FILES"
          else
            echo "<none>"
          fi

          printf '%s\n' "$CHANGED_FILES" | scripts/ci/classify-test-scope.sh >> "$GITHUB_OUTPUT"

          # The gateway and WebUI v2 smoke jobs run on the Python E2E harness,
          # so harness changes outside the reborn-specific scenario files must
          # still trigger this workflow.
          if printf '%s\n' "$CHANGED_FILES" | grep -q '^tests/e2e/'; then
            echo "has_e2e_harness=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_e2e_harness=false" >> "$GITHUB_OUTPUT"
          fi

  rust-reborn:
    name: Rust Reborn (${{ matrix.group }})
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && (needs.changes.outputs.has_reborn_tests == 'true' || needs.changes.outputs.has_e2e_harness == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: true
      matrix:
        group:
          - architecture
          - runtimes
          - substrates
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: reborn-e2e-${{ matrix.group }}
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Run deterministic Reborn Rust gate
        env:
          CARGO_TEST_ARGS: "-- --nocapture"
        run: scripts/reborn-e2e-rust.sh ${{ matrix.group }}

  gateway-smoke:
    name: Reborn gateway smoke
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && (needs.changes.outputs.has_reborn_tests == 'true' || needs.changes.outputs.has_e2e_harness == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: reborn-e2e-gateway-smoke
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build ironclaw with libSQL
        run: cargo build --no-default-features --features libsql

      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install E2E dependencies
        run: |
          cd tests/e2e
          pip install -e .
          playwright install --with-deps chromium

      - name: Run Reborn gateway smoke
        run: pytest tests/e2e/scenarios/test_reborn_gateway_smoke.py -v --timeout=120

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: reborn-e2e-screenshots
          path: tests/e2e/screenshots/
          if-no-files-found: ignore

  webui-v2-smoke:
    name: Reborn WebUI v2 smoke
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && (needs.changes.outputs.has_reborn_tests == 'true' || needs.changes.outputs.has_e2e_harness == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: reborn-e2e-webui-v2-smoke
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build ironclaw-reborn with WebChat v2 surface
        run: cargo build -p ironclaw_reborn_cli --features webui-v2-beta

      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install E2E dependencies
        run: |
          cd tests/e2e
          pip install -e .
          playwright install --with-deps chromium

      - name: Run Reborn WebUI v2 smoke
        run: pytest tests/e2e/scenarios/test_reborn_webui_v2_smoke.py -v --timeout=120

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: reborn-webui-v2-screenshots
          path: tests/e2e/screenshots/
          if-no-files-found: ignore

  reborn-e2e:
    name: Reborn E2E
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - rust-reborn
      - gateway-smoke
      - webui-v2-smoke
    steps:
      - name: Check Reborn E2E jobs
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "Scope detection failed: ${{ needs.changes.result }}"
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.docs_only }}" == "true" ]]; then
            echo "Docs-only change detected — Reborn E2E roll-up passes fast"
            exit 0
          fi

          if [[ "${{ needs.changes.outputs.has_reborn_tests }}" != "true" && "${{ needs.changes.outputs.has_e2e_harness }}" != "true" ]]; then
            echo "No Reborn E2E scope detected — Reborn E2E roll-up passes fast"
            exit 0
          fi

          if [[ "${{ needs.rust-reborn.result }}" != "success" ]]; then
            echo "Rust Reborn E2E failed"
            exit 1
          fi
          if [[ "${{ needs.gateway-smoke.result }}" != "success" ]]; then
            echo "Reborn gateway smoke failed"
            exit 1
          fi
          if [[ "${{ needs.webui-v2-smoke.result }}" != "success" ]]; then
            echo "Reborn WebUI v2 smoke failed"
            exit 1
          fi
