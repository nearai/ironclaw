name: Tests (Reborn)

on:
  workflow_call:
    inputs:
      ref:
        description: Commit SHA or ref to test
        required: false
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA or ref to test
        required: false
        type: string
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
    types:
      - checks_requested
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: reborn-tests-${{ github.event_name }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  # Tests must never touch the real OS keychain (macOS Keychain auth dialog /
  # Linux Secret Service). Guarded by src/secrets/keychain.rs::os_keychain_suppressed:
  # cfg!(test) covers unit tests; this covers integration/e2e that link the
  # non-cfg(test) library.
  IRONCLAW_DISABLE_OS_KEYCHAIN: "1"
  # PR #5086 measured mold linking the heaviest Reborn build in parallel with
  # no OOM, so keep Cargo's default parallelism. If runner OOMs recur, restore
  # the previous one-job Cargo build serialization as the one-line fallback.
  RUSTFLAGS: "-C linker=clang -C link-arg=--ld-path=/usr/bin/mold"
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  # Cargo network resilience (retries, HTTP/2 multiplexing off, git-CLI fetch)
  # lives in the repo-wide .cargo/config.toml so it applies to every workflow.

jobs:
  changes:
    name: Detect Reborn test scope
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.non_diff.outputs.docs_only || steps.diff.outputs.docs_only }}
      has_reborn_tests: ${{ steps.non_diff.outputs.has_reborn_tests || steps.diff.outputs.has_reborn_tests }}
    steps:
      - id: non_diff
        if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
        run: |
          echo "docs_only=false" >> "$GITHUB_OUTPUT"
          echo "has_reborn_tests=true" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: diff
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          CHANGED_FILES="$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA")"

          echo "Changed files:"
          if [ -n "$CHANGED_FILES" ]; then
            printf '%s\n' "$CHANGED_FILES"
          else
            echo "<none>"
          fi

          printf '%s\n' "$CHANGED_FILES" | scripts/ci/classify-test-scope.sh >> "$GITHUB_OUTPUT"

          # Guard the tests/integration/ <-> tests/support/reborn_parity_qa/
          # one-way boundary on every PR/merge_group run, in the same step as
          # the scope classifier above (both are cheap, checkout-only checks).
          scripts/ci/check-test-suite-boundaries.sh

  package-matrix:
    name: Discover Reborn package crates
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.has_reborn_tests == 'true'
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
      buckets: ${{ steps.packages.outputs.buckets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - id: packages
        name: Build package matrix from Reborn crate families
        run: |
          # Reborn/product crate families that are always tested, including
          # crates the shipped binary does not link (channel adapters, webui_v2).
          allowlist_packages="$(
            cargo metadata --no-deps --format-version 1 \
              | jq -c '
                  [
                    .packages[]
                    | select(
                        (.name == "ironclaw_runner")
                        or (.name | startswith("ironclaw_reborn"))
                        or (.name | startswith("ironclaw_product"))
                        or (.name == "ironclaw_architecture")
                        or (.name == "ironclaw_slack_v2_adapter")
                        or (.name == "ironclaw_telegram_v2_adapter")
                        or (.name == "ironclaw_wasm_product_adapters")
                        or (.name | startswith("ironclaw_webui"))
                      )
                    | .name
                  ]
                  | unique
                '
          )"

          # The full ironclaw_reborn_cli dependency closure: every workspace
          # crate the shipped Reborn binary links (normal + build deps). Running
          # each crate's own suite on every PR is the "run everything on every
          # PR" gate -- a green reborn-tests run means the whole closure is
          # green, so the ~43 shared crates (auth, host_runtime, skills,
          # extensions, ...) can no longer regress unnoticed.
          closure_packages="$(
            comm -12 \
              <(cargo tree -p ironclaw_reborn_cli -e normal,build --prefix none \
                | grep -oE 'ironclaw_[a-z0-9_]+' \
                | sort -u) \
              <(cargo metadata --no-deps --format-version 1 \
                | jq -r '.packages[].name' \
                | sort -u) \
              | jq -R -s -c 'split("\n") | map(select(length > 0))'
          )"

          if [ -z "${closure_packages}" ] || [ "${closure_packages}" = "[]" ]; then
            echo "No Reborn CLI workspace dependency closure crates discovered" >&2
            exit 1
          fi

          # Union so closure coverage never drops the non-closure allowlist crates.
          packages="$(
            jq -n -c \
              --argjson allowlist "${allowlist_packages}" \
              --argjson closure "${closure_packages}" \
              '$allowlist + $closure | unique'
          )"

          if [ -z "${packages}" ] || [ "${packages}" = "[]" ]; then
            echo "No Reborn workspace crates discovered" >&2
            exit 1
          fi

          echo "packages=${packages}" >> "$GITHUB_OUTPUT"
          buckets="$(scripts/ci/reborn-crate-test-buckets.sh "${packages}")"
          echo "buckets=${buckets}" >> "$GITHUB_OUTPUT"

          echo "Testing Reborn package crates:"
          printf '%s\n' "${packages}" | jq -r '.[] | "- " + .'
          echo "Testing Reborn package buckets:"
          printf '%s\n' "${buckets}" | jq -r '.[] | "- \(.name): \(.packages | join(", "))"'

  crate-tests:
    name: Test Reborn crate bucket (${{ matrix.bucket.name }})
    needs: [changes, package-matrix]
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.has_reborn_tests == 'true'
    runs-on: ubuntu-latest
    # 60->90 for llvm-cov instrumentation overhead; watch `composition-core` first (single-package bucket, most feature-loaded, zero headroom).
    timeout-minutes: 90
    env:
      ANTHROPIC_API_KEY: ""
      LLM_BACKEND: ""
      LLM_USE_CODEX_AUTH: "false"
      OLLAMA_BASE_URL: ""
      OPENAI_API_KEY: ""
    strategy:
      fail-fast: false
      matrix:
        bucket: ${{ fromJSON(needs.package-matrix.outputs.buckets) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h /

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - name: Resolve bucket settings
        id: bucket-settings
        env:
          BUCKET_PACKAGES: ${{ toJSON(matrix.bucket.packages) }}
        run: |
          needs_webui_node=false
          sccache_dist_enabled=true

          while IFS= read -r package; do
            feature_flags="$(scripts/ci/package-feature-flags.sh "$package")"
            if [[ "${feature_flags}" == *"webui-v2-beta"* ]]; then
              needs_webui_node=true
            fi

            case "${package}" in
              ironclaw_first_party_extension_ports|ironclaw_host_runtime|ironclaw_loop_host|ironclaw_product_workflow|ironclaw_runner|ironclaw_reborn_cli|ironclaw_reborn_composition|ironclaw_webui|ironclaw_wasm|ironclaw_wasm_product_adapters|ironclaw_wasm_sandbox_core)
                sccache_dist_enabled=false
                ;;
            esac
          done < <(printf '%s\n' "${BUCKET_PACKAGES}" | jq -r '.[]')

          echo "needs_webui_node=${needs_webui_node}" >> "${GITHUB_OUTPUT}"
          echo "sccache_dist_enabled=${sccache_dist_enabled}" >> "${GITHUB_OUTPUT}"

      - name: Enable pnpm for setup-node cache
        if: ${{ steps.bucket-settings.outputs.needs_webui_node == 'true' }}
        run: corepack enable pnpm

      - name: Install Node.js for WebUI bundle builds
        if: ${{ steps.bucket-settings.outputs.needs_webui_node == 'true' }}
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: crates/ironclaw_webui/frontend/pnpm-lock.yaml

      - name: Enable pnpm
        if: ${{ steps.bucket-settings.outputs.needs_webui_node == 'true' }}
        run: corepack enable pnpm

      - name: Install WebUI frontend dependencies
        if: ${{ steps.bucket-settings.outputs.needs_webui_node == 'true' }}
        run: |
          cd crates/ironclaw_webui/frontend
          pnpm install --frozen-lockfile

      - name: Install mold and clang
        run: |
          scripts/ci/install-ci-apt-packages.sh clang mold
          test -x /usr/bin/mold

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # ONE shared cache for all ~60 crate-test jobs instead of a per-crate
          # key. Per-crate keys produced ~60 caches (registry + target each,
          # ~0.4-0.7 GB), which blew far past GitHub's ~10 GB repo cache LRU and
          # evicted each other — so most jobs hit "No cache found", re-downloaded
          # the crates.io registry from cold, and were exposed to transient
          # download flakes (mitigated separately by .cargo/config.toml). A single
          # shared key keeps the registry + shared-dep build in one small,
          # always-resident entry, so the registry is downloaded once, not ~60x.
          #
          # `-cov` suffix: instrumented llvm-cov build is a different artifact than plain `reborn-tests-crates`; separate lineage avoids corrupting whichever restores second (same as `reborn-integration-cov` below).
          shared-key: reborn-tests-crates-cov
          # Keep saves to protected-branch and merge_group runs so the ~10 GB
          # repo cache LRU is seeded by shared states, not arbitrary PR branches.
          save-if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'merge_group' }}

      - name: Setup OVH sccache
        uses: ./.github/actions/setup-sccache-dist
        with:
          scheduler-url: ${{ steps.bucket-settings.outputs.sccache_dist_enabled == 'true' && vars.SCCACHE_DIST_SCHEDULER_URL || '' }}
          auth-token: ${{ steps.bucket-settings.outputs.sccache_dist_enabled == 'true' && secrets.SCCACHE_DIST_AUTH_TOKEN || '' }}
          cache-ssh-host: ${{ vars.SCCACHE_CACHE_SSH_HOST }}
          cache-ssh-user: ${{ vars.SCCACHE_CACHE_SSH_USER }}
          cache-ssh-port: ${{ vars.SCCACHE_CACHE_SSH_PORT }}
          cache-ssh-private-key: ${{ secrets.SCCACHE_CACHE_SSH_PRIVATE_KEY }}
          cache-ssh-known-hosts: ${{ secrets.SCCACHE_CACHE_SSH_KNOWN_HOSTS }}
          redis-password: ${{ secrets.SCCACHE_REDIS_PASSWORD }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@62b0f2dec647a8e604c6a0fda0e38530180dce20 # cargo-llvm-cov

      - name: Run crate tests
        env:
          BUCKET_NAME: ${{ matrix.bucket.name }}
          BUCKET_PACKAGES: ${{ toJSON(matrix.bucket.packages) }}
        run: |
          echo "Running Reborn crate bucket: ${BUCKET_NAME}"
          printf '%s\n' "${BUCKET_PACKAGES}" | jq -r '.[] | "- " + .'

          mkdir -p coverage

          while IFS= read -r package; do
            feature_flags="$(scripts/ci/package-feature-flags.sh "$package")"
            echo "::group::cargo llvm-cov -p ${package} ${feature_flags} test"

            # Scoped to this invocation only (never `export`) so it can't leak
            # onto later packages in the same bucket iteration if
            # composition-core ever stops being single-package.
            incremental_env=()
            if [ "$package" = "ironclaw_reborn_composition" ]; then
              echo "Disabling incremental compilation for ironclaw_reborn_composition to keep runner disk usage bounded."
              incremental_env=(env CARGO_INCREMENTAL=0)
            fi

            # One combined test+lcov invocation, not the two-step `--no-report test` + `report` shape (report has no --workspace/-p, only reports the root package).
            # shellcheck disable=SC2086 # feature_flags intentionally expands to zero or more Cargo args.
            timeout --signal=INT --kill-after=30s 40m \
              "${incremental_env[@]}" cargo llvm-cov -p "$package" ${feature_flags} --all-targets \
                --lcov --output-path "coverage/${package}.lcov" \
                test -- --nocapture
            echo "::endgroup::"
          done < <(printf '%s\n' "${BUCKET_PACKAGES}" | jq -r '.[]')

          # Concat per-package lcov into one artifact per bucket (keeps artifact count at ~12, not ~60); merge script parses end_of_record blocks per file already, so `cat` is sufficient.
          cat coverage/*.lcov > "bucket-${BUCKET_NAME}.lcov"

      - name: Upload bucket lcov artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: reborn-crate-cov-bucket-${{ matrix.bucket.name }}
          path: bucket-${{ matrix.bucket.name }}.lcov
          if-no-files-found: error

  root-reborn-parity-tests:
    name: Reborn root tests (${{ matrix.partition }})
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.has_reborn_tests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANTHROPIC_API_KEY: ""
      LLM_BACKEND: ""
      LLM_USE_CODEX_AUTH: "false"
      OLLAMA_BASE_URL: ""
      OPENAI_API_KEY: ""
      REBORN_ROOT_TEST_PARTITIONS: 4
      REBORN_ROOT_TEST_PARTITION: ${{ matrix.partition }}
      REBORN_ROOT_TEST_TIMEOUT: 28m
      CARGO_INCREMENTAL: "0"
    strategy:
      fail-fast: false
      matrix:
        partition: [0, 1, 2, 3]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h /

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install mold and clang
        run: |
          scripts/ci/install-ci-apt-packages.sh clang mold
          test -x /usr/bin/mold

      - name: Verify mold linker is active
        run: |
          clang_output="$(
            printf 'int main(void) { return 0; }\n' \
              | clang --ld-path=/usr/bin/mold -Wl,--version -x c - -o /tmp/clang-mold-check 2>&1
          )"
          printf '%s\n' "$clang_output"
          grep -qi mold <<< "$clang_output"

          printf 'fn main() { println!("mold-link-ok"); }\n' > /tmp/mold-link-check.rs
          rustc /tmp/mold-link-check.rs \
            -C linker=clang \
            -C link-arg=--ld-path=/usr/bin/mold \
            -o /tmp/mold-link-check
          test "$(/tmp/mold-link-check)" = "mold-link-ok"

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # All 4 root partitions compile the *same* root-package build (they
          # only run different test partitions), so one shared cache is strictly
          # better than 4 per-partition copies (~1 GB each) — the cached target
          # is fully valid for every partition, and it stops the 4 copies from
          # crowding the shared LRU.
          shared-key: reborn-tests-root
          # Keep saves to protected-branch and merge_group runs so the ~10 GB
          # repo cache LRU is seeded by shared states, not arbitrary PR branches.
          save-if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'merge_group' }}

      - name: Setup OVH sccache cache
        uses: ./.github/actions/setup-sccache-dist
        with:
          cache-ssh-host: ${{ vars.SCCACHE_CACHE_SSH_HOST }}
          cache-ssh-user: ${{ vars.SCCACHE_CACHE_SSH_USER }}
          cache-ssh-port: ${{ vars.SCCACHE_CACHE_SSH_PORT }}
          cache-ssh-private-key: ${{ secrets.SCCACHE_CACHE_SSH_PRIVATE_KEY }}
          cache-ssh-known-hosts: ${{ secrets.SCCACHE_CACHE_SSH_KNOWN_HOSTS }}
          redis-password: ${{ secrets.SCCACHE_REDIS_PASSWORD }}

      - name: Run Reborn root tests
        run: scripts/ci/run-reborn-root-partition.sh

  reborn-group-tests:
    name: Reborn group tests
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.has_reborn_tests == 'true'
    runs-on: ubuntu-latest
    # Group tests run sequentially in ONE job (build once, reuse artifacts), so
    # the budget must cover N suites at REBORN_GROUP_TEST_TIMEOUT each plus setup
    # — otherwise GitHub hard-kills the job before a hung suite reaches its own
    # per-test timeout and reports which one hung. 3 suites x 28m + setup < 110m.
    # If group suites grow past ~4, migrate to a package-matrix-style discovery
    # job (one suite per matrix runner) instead of bumping this number.
    timeout-minutes: 110
    env:
      ANTHROPIC_API_KEY: ""
      LLM_BACKEND: ""
      LLM_USE_CODEX_AUTH: "false"
      OLLAMA_BASE_URL: ""
      OPENAI_API_KEY: ""
      REBORN_GROUP_TEST_TIMEOUT: 28m
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h /

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install mold and clang
        run: |
          scripts/ci/install-ci-apt-packages.sh clang mold
          test -x /usr/bin/mold

      - name: Verify mold linker is active
        run: |
          clang_output="$(
            printf 'int main(void) { return 0; }\n' \
              | clang --ld-path=/usr/bin/mold -Wl,--version -x c - -o /tmp/clang-mold-check 2>&1
          )"
          printf '%s\n' "$clang_output"
          grep -qi mold <<< "$clang_output"

          printf 'fn main() { println!("mold-link-ok"); }\n' > /tmp/mold-link-check.rs
          rustc /tmp/mold-link-check.rs \
            -C linker=clang \
            -C link-arg=--ld-path=/usr/bin/mold \
            -o /tmp/mold-link-check
          test "$(/tmp/mold-link-check)" = "mold-link-ok"

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # REUSE the root partitions' cache key: the group `[[test]]` binaries
          # are part of the same root package build as the reborn_*.rs root tests,
          # so they hit the already-warm target rather than a cold cache. Minting a
          # new key would add another ~1 GB entry to the ~10 GB repo cache LRU and
          # evict the root/crate states instead of sharing them.
          shared-key: reborn-tests-root
          # Keep saves to protected-branch and merge_group runs so the ~10 GB
          # repo cache LRU is seeded by shared states, not arbitrary PR branches.
          save-if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'merge_group' }}

      - name: Setup OVH sccache cache
        uses: ./.github/actions/setup-sccache-dist
        with:
          cache-ssh-host: ${{ vars.SCCACHE_CACHE_SSH_HOST }}
          cache-ssh-user: ${{ vars.SCCACHE_CACHE_SSH_USER }}
          cache-ssh-port: ${{ vars.SCCACHE_CACHE_SSH_PORT }}
          cache-ssh-private-key: ${{ secrets.SCCACHE_CACHE_SSH_PRIVATE_KEY }}
          cache-ssh-known-hosts: ${{ secrets.SCCACHE_CACHE_SSH_KNOWN_HOSTS }}
          redis-password: ${{ secrets.SCCACHE_REDIS_PASSWORD }}

      - name: Run Reborn group tests
        run: scripts/ci/run-reborn-group-tests.sh

  reborn-integration-coverage:
    name: Reborn integration coverage (${{ matrix.lane }})
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.has_reborn_tests == 'true'
    runs-on: ubuntu-latest
    # This is the ONLY execution of the 27 flat reborn_integration_* suites
    # (there is no separate uninstrumented pass/fail run of them — `cargo
    # llvm-cov ... test` has the same pass/fail semantics as `cargo test`, just
    # instrumented) plus one more, instrumented, run of the 7 reborn_group_*
    # suites already covered uninstrumented by reborn-group-tests above.
    # Generous backstop: a cold-cache instrumented build of the Reborn closure
    # is heavier than a plain build (see the retired reborn-coverage.yml's
    # 180m budget for the same closure, run as a single job); each of these 5
    # lanes only carries a slice of the 34 int-tier suites, so 120m is ample.
    timeout-minutes: 120
    env:
      ANTHROPIC_API_KEY: ""
      LLM_BACKEND: ""
      LLM_USE_CODEX_AUTH: "false"
      OLLAMA_BASE_URL: ""
      OPENAI_API_KEY: ""
      CARGO_INCREMENTAL: "0"
    strategy:
      fail-fast: false
      matrix:
        lane: ["0", "1", "2", "3", "groups"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h /

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview

      - name: Install mold and clang
        run: |
          scripts/ci/install-ci-apt-packages.sh clang mold
          test -x /usr/bin/mold

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # ONE shared key across all 5 instrumented lanes: they all
          # instrument the same workspace build, so a per-lane key would just
          # mint 5 near-identical multi-GB entries that crowd the ~10 GB repo
          # cache LRU. A dedicated key (never the plain `reborn-tests-*` keys
          # above) keeps an instrumented (llvm-cov) build from ever evicting
          # or being evicted by a plain one — the artifacts are incompatible.
          shared-key: reborn-integration-cov
          # Keep saves to protected-branch and merge_group runs so the ~10 GB
          # repo cache LRU is seeded by shared states, not arbitrary PR branches.
          save-if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'merge_group' }}

      - name: Setup OVH sccache cache
        uses: ./.github/actions/setup-sccache-dist
        with:
          cache-ssh-host: ${{ vars.SCCACHE_CACHE_SSH_HOST }}
          cache-ssh-user: ${{ vars.SCCACHE_CACHE_SSH_USER }}
          cache-ssh-port: ${{ vars.SCCACHE_CACHE_SSH_PORT }}
          cache-ssh-private-key: ${{ secrets.SCCACHE_CACHE_SSH_PRIVATE_KEY }}
          cache-ssh-known-hosts: ${{ secrets.SCCACHE_CACHE_SSH_KNOWN_HOSTS }}
          redis-password: ${{ secrets.SCCACHE_REDIS_PASSWORD }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@62b0f2dec647a8e604c6a0fda0e38530180dce20 # cargo-llvm-cov

      - name: Run this lane's Reborn integration-tier suites (instrumented) and produce its lcov
        env:
          REBORN_COV_LANE_MODE: ${{ matrix.lane == 'groups' && 'group' || 'flat-partition' }}
          REBORN_COV_LANE_PARTITIONS: 4
          REBORN_COV_LANE_INDEX: ${{ matrix.lane }}
          REBORN_COV_LANE_TEST_TIMEOUT: 45m
        run: |
          # profraw-only (not --workspace): the shared reborn-integration-cov
          # cache key is restored by whichever of the 5 matrix legs saved last
          # (same shared-key-across-a-matrix pattern as crate-tests' single
          # reborn-tests-crates key), so a stale *.profraw left over from a
          # different lane's previous run could otherwise leak into this
          # lane's report. Clearing just the profraw data (not the compiled
          # instrumented binaries) keeps the build-cache speed win while
          # guaranteeing this lane's lcov reflects only its own test run.
          cargo llvm-cov clean --profraw-only
          scripts/ci/reborn-coverage-lane-run.sh part-${{ matrix.lane }}.lcov

      - name: Upload lane lcov artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: reborn-integration-cov-part-${{ matrix.lane }}
          path: part-${{ matrix.lane }}.lcov
          if-no-files-found: error

  coverage-report:
    name: Reborn integration-tier coverage report
    # Also needs crate-tests now: merges lane + bucket lcov, still pure text processing (no test execution), so the 10-min SLA below still holds.
    needs: [changes, reborn-integration-coverage, crate-tests]
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.has_reborn_tests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # The sticky coverage comment upserts a PR comment via the issues API.
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Download lane lcov artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: reborn-integration-cov-part-*
          path: coverage-parts
          merge-multiple: true

      - name: Download crate bucket lcov artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: reborn-crate-cov-bucket-*
          path: coverage-parts
          merge-multiple: true

      - name: Merge lane and bucket lcov reports
        run: |
          set -euo pipefail
          shopt -s nullglob
          parts=(coverage-parts/*.lcov)
          if [ "${#parts[@]}" -eq 0 ]; then
            echo "No Reborn coverage artifacts found (neither integration-tier lanes nor crate-tier buckets)" >&2
            exit 1
          fi
          scripts/ci/reborn-coverage-merge-lcov.sh reborn-integration-merged.lcov "${parts[@]}"

      - name: Render Reborn integration-tier coverage summary
        run: |
          set -euo pipefail
          scripts/ci/reborn-coverage-summary.sh \
            reborn-integration-merged.lcov \
            tests/integration/coverage-exemptions.toml \
            | tee -a "$GITHUB_STEP_SUMMARY"

      # Coverage ratchet gate: compares the merged lcov above against the
      # committed floor (tests/integration/coverage-floor.toml). Still pure
      # post-processing, no test execution — stays inside this job's 10-min
      # budget. While [global].enforce = false in the floor file this always
      # exits 0 (dry-run soak period); it prints every violation regardless,
      # prefixed "[dry-run, would FAIL]", plus an unconditional mode banner.
      - name: Render Reborn coverage ratchet
        run: |
          set -euo pipefail
          scripts/ci/reborn-coverage-ratchet.sh \
            reborn-integration-merged.lcov \
            tests/integration/coverage-exemptions.toml \
            tests/integration/coverage-floor.toml \
            | tee -a "$GITHUB_STEP_SUMMARY"

      # Surface the same %/hole-list as a sticky PR comment so it lives in the
      # conversation, not just the job summary. PR-only, and non-fatal by
      # design: fork PRs get a read-only GITHUB_TOKEN and the comment API
      # 403s, which must never red the check. The comment itself never gates
      # regardless of the ratchet's enforce bit (mirrors the retired
      # reborn-coverage.yml workflow's comment step) — enforcement happens in
      # the "Render Reborn coverage ratchet" step above, not here.
      - name: Post sticky coverage comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: >
          scripts/ci/reborn-coverage-comment.sh
          reborn-integration-merged.lcov
          tests/integration/coverage-exemptions.toml
          tests/integration/coverage-floor.toml

      # The merged lcov is the full per-file detail behind the summary table —
      # the "real hole list" — kept as an artifact for offline inspection.
      - name: Upload merged coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: reborn-integration-coverage-merged
          path: reborn-integration-merged.lcov
          if-no-files-found: warn

  webui-v2-js-tests:
    name: Reborn WebUI v2 JS tests
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.has_reborn_tests == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Run Reborn WebUI frontend tests
        run: |
          cd crates/ironclaw_webui/frontend
          pnpm install --frozen-lockfile
          pnpm test

  qa-recorded-fixtures:
    name: Reborn QA recorded fixtures
    needs: changes
    if: needs.changes.outputs.docs_only != 'true' && needs.changes.outputs.has_reborn_tests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: ""
      LLM_BACKEND: ""
      LLM_USE_CODEX_AUTH: "false"
      OLLAMA_BASE_URL: ""
      OPENAI_API_KEY: ""
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install mold
        run: |
          scripts/ci/install-ci-apt-packages.sh mold
          test -x /usr/bin/mold

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: reborn-qa-recorded-fixtures
          save-if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'merge_group' }}

      - name: Setup OVH sccache cache
        uses: ./.github/actions/setup-sccache-dist
        with:
          cache-ssh-host: ${{ vars.SCCACHE_CACHE_SSH_HOST }}
          cache-ssh-user: ${{ vars.SCCACHE_CACHE_SSH_USER }}
          cache-ssh-port: ${{ vars.SCCACHE_CACHE_SSH_PORT }}
          cache-ssh-private-key: ${{ secrets.SCCACHE_CACHE_SSH_PRIVATE_KEY }}
          cache-ssh-known-hosts: ${{ secrets.SCCACHE_CACHE_SSH_KNOWN_HOSTS }}
          redis-password: ${{ secrets.SCCACHE_REDIS_PASSWORD }}

      - name: Scrub Reborn QA fixtures
        run: scripts/ci/check-reborn-qa-fixtures.sh

      - name: Run Reborn QA fixture contracts and replay
        run: cargo test --test reborn_qa_recorded_behavior --features libsql -- --nocapture

  reborn-tests:
    name: Tests (Reborn)
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - package-matrix
      - crate-tests
      - root-reborn-parity-tests
      - reborn-group-tests
      - reborn-integration-coverage
      - coverage-report
      - webui-v2-js-tests
      - qa-recorded-fixtures
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Check Reborn test result
        run: |
          # shellcheck disable=SC1091
          if ! source .github/scripts/ci-job-result-ok.sh; then
            echo "Unable to source .github/scripts/ci-job-result-ok.sh"
            exit 1
          fi

          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes failed: ${{ needs.changes.result }}"
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.docs_only }}" == "true" ]]; then
            echo "Docs-only change detected — Reborn test roll-up passes fast"
            exit 0
          fi

          if [[ "${{ needs.changes.outputs.has_reborn_tests }}" != "true" ]]; then
            echo "No Reborn test scope detected — Reborn test roll-up passes fast"
            exit 0
          fi

          if ! job_result_ok "package-matrix" "${{ needs.package-matrix.result }}" false "allow"; then
            echo "Reborn package matrix discovery failed: ${{ needs.package-matrix.result }}"
            exit 1
          fi

          if ! job_result_ok "crate-tests" "${{ needs.crate-tests.result }}" false "allow"; then
            echo "One or more Reborn binary crate tests failed: ${{ needs.crate-tests.result }}"
            exit 1
          fi

          if ! job_result_ok "root-reborn-parity-tests" "${{ needs.root-reborn-parity-tests.result }}" false "allow"; then
            echo "One or more Reborn root tests failed: ${{ needs.root-reborn-parity-tests.result }}"
            exit 1
          fi

          if ! job_result_ok "reborn-group-tests" "${{ needs.reborn-group-tests.result }}" false "allow"; then
            echo "One or more Reborn group tests failed: ${{ needs.reborn-group-tests.result }}"
            exit 1
          fi

          # This is the ONLY execution of the 27 flat reborn_integration_*
          # suites (see the reborn-integration-coverage job), so it gates like
          # every other test job above — real pass/fail, not the coverage
          # percentage (that's coverage-report below).
          if ! job_result_ok "reborn-integration-coverage" "${{ needs.reborn-integration-coverage.result }}" false "allow"; then
            echo "One or more Reborn integration-tier coverage lanes failed: ${{ needs.reborn-integration-coverage.result }}"
            exit 1
          fi

          # coverage-report merges lane + crate-bucket lcov, renders/posts the
          # summary, AND runs the coverage ratchet (committed floor file,
          # tests/integration/coverage-floor.toml) — a ratchet violation is a
          # real regression, not a reporting-pipeline bug, so this now gates
          # like every other job above. (While [global].enforce = false in the
          # floor file, the ratchet step always exits 0, so this stays green
          # during the dry-run soak period — see the floor file's own header.)
          if ! job_result_ok "coverage-report" "${{ needs.coverage-report.result }}" false "allow"; then
            echo "Reborn coverage-report job failed (merge/summary error, or a coverage ratchet violation): ${{ needs.coverage-report.result }}"
            exit 1
          fi

          if ! job_result_ok "webui-v2-js-tests" "${{ needs.webui-v2-js-tests.result }}" false "allow"; then
            echo "Reborn WebUI v2 JS tests failed: ${{ needs.webui-v2-js-tests.result }}"
            exit 1
          fi

          if ! job_result_ok "qa-recorded-fixtures" "${{ needs.qa-recorded-fixtures.result }}" false "allow"; then
            echo "Reborn QA recorded fixture tests failed: ${{ needs.qa-recorded-fixtures.result }}"
            exit 1
          fi
