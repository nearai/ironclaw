name: Build t3n MCP Sidecar

# Builds the t3n-mcp-sidecar Docker image and pushes it to GitHub Container
# Registry (ghcr.io/terminal-3/t3n-mcp-sidecar).  The VPS then pulls this
# pre-built image — no GITHUB_TOKEN required on the host at deploy time.
#
# Image visibility: by default GHCR inherits the repo's visibility (private).
# To allow unauthenticated pulls on a VPS, make the package public:
#   github.com/orgs/Terminal-3/packages → t3n-mcp-sidecar → Package settings → Change visibility
# Otherwise, VPS hosts need a one-time login:
#   echo $GHCR_TOKEN | docker login ghcr.io -u <github-username> --password-stdin
# (A classic PAT with read:packages scope is sufficient — no write access needed.)

on:
  # Disabled: push trigger removed until sidecar CI is re-enabled.
  # Allow manual re-builds from the Actions UI.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/t3n-mcp-sidecar.Dockerfile
          push: true
          tags: |
            ghcr.io/terminal-3/t3n-mcp-sidecar:latest
            ghcr.io/terminal-3/t3n-mcp-sidecar:sha-${{ github.sha }}
          # Pass the Actions GITHUB_TOKEN as a build secret so it is never
          # baked into an image layer.  It has read:packages on the org, which
          # is all that npm install @terminal-3/t3n-mcp requires.
          secrets: |
            npm_github_token=${{ secrets.NPM_GITHUB_TOKEN }}
          cache-from: type=gha,scope=sidecar
          cache-to: type=gha,mode=max,scope=sidecar
