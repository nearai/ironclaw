name: Release-plz

on:
  push:
    branches:
      - main

env:
  RELEASE_CACHE_ROOT: /mnt/static-runner-cache/ironclaw/release-plz

jobs:

  # Release unpublished packages.
  release-plz-release:
    if: ${{ github.repository_owner == 'nearai' }}
    name: Release-plz release
    runs-on: [self-hosted, ci-release]
    permissions:
      contents: write
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - &require-release-cache
        name: Require ci-release mounted cache
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d /mnt/static-runner-cache || ! -w /mnt/static-runner-cache ]]; then
            echo "::error::ci-release runner must provide writable /mnt/static-runner-cache"
            exit 1
          fi
          mkdir -p \
            "${RELEASE_CACHE_ROOT}/cargo-home" \
            "${RELEASE_CACHE_ROOT}/cargo-target" \
            "${RELEASE_CACHE_ROOT}/rustup-home"
          {
            echo "CARGO_HOME=${RELEASE_CACHE_ROOT}/cargo-home"
            echo "CARGO_TARGET_DIR=${RELEASE_CACHE_ROOT}/cargo-target"
            echo "RUSTUP_HOME=${RELEASE_CACHE_ROOT}/rustup-home"
          } >> "$GITHUB_ENV"
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      # Generating a GitHub token, so that PRs and tags created by
      # the release-plz-action can trigger actions workflows.
      - name: Generate GitHub token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: generate-token
        with:
          # GitHub App ID secret name
          app-id: ${{ secrets.GH_RELEASES_MANAGER_APP_ID }}
          # GitHub App private key secret name
          private-key: ${{ secrets.GH_RELEASES_MANAGER_APP_PRIVATE_KEY }}
      - name: Run release-plz
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    if: ${{ github.repository_owner == 'nearai' }}
    name: Release-plz PR
    runs-on: [self-hosted, ci-release]
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *require-release-cache
      - *install-rust
      - name: Generate GitHub token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: generate-token
        with:
          app-id: ${{ secrets.GH_RELEASES_MANAGER_APP_ID }}
          private-key: ${{ secrets.GH_RELEASES_MANAGER_APP_PRIVATE_KEY }}
      - name: Run release-plz
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
