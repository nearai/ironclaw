name: Nightly E2E

# Scheduled wrapper around the reusable E2E workflow. Failures are reported
# by nightly-watchdog.yml, which checks every nightly's latest scheduled run
# from outside and posts failures to Slack.
on:
  schedule:
    - cron: "0 3 * * *" # Nightly full E2E at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    name: Full E2E
    uses: ./.github/workflows/e2e.yml
    with:
      ref: ${{ github.sha }}
      mode: full
