name: Mirror to enjimi

on:
  push:
    branches:
      - main
      - native-matrix-channel-pilot

jobs:
  mirror:
    if: github.repository == 'theredspoon/ironclaw'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to enjimi
        env:
          ENJIMI_PAT: ${{ secrets.ENJIMI_PAT }}
        run: |
          git remote add enjimi https://x-access-token:${ENJIMI_PAT}@github.com/enjimi/ironclaw.git
          git push enjimi "$GITHUB_REF" --tags --force
