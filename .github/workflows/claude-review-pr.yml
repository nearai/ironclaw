name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [staging]

permissions:
  contents: read
  pull-requests: write
  id-token: write  # required by claude-code-action for OIDC auth

# NOTE: This workflow uses `pull_request` (not `pull_request_target`), so it
# intentionally has no access to secrets on fork PRs. Fork PRs will skip the
# Claude review step silently since ANTHROPIC_API_KEY is unavailable.

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude PR Review
    if: >
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ai-review') &&
      !contains(github.event.pull_request.labels.*.name, 'staging-promotion')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check if code changed
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILES=$(gh pr diff ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} --name-only)
          CODE_FILES=$(echo "$FILES" | grep -v -E '(\.(md|json|txt)$|^docs/|^\.github/scripts/)' | grep . || true)
          if [ -z "$CODE_FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No code files changed — skipping review"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Code files changed: $(echo "$CODE_FILES" | wc -l | tr -d ' ') files"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: steps.filter.outputs.skip != 'true'
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read prompt
        if: steps.filter.outputs.skip != 'true'
        id: prompt
        run: |
          {
            echo 'content<<PROMPT_EOF'
            cat .github/prompts/review-pr.md
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code review
        if: steps.filter.outputs.skip != 'true'
        uses: anthropics/claude-code-action@1eddb334cfa79fdb21ecbe2180ca1a016e8e7d47 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "ironclaw-ci[bot]"
          claude_args: "--max-turns 20 --model claude-haiku-4-5 --allowedTools 'Read,Glob,Grep,Agent,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git blame:*),Bash(git log:*),Bash(git diff:*)'"
          prompt: ${{ steps.prompt.outputs.content }}
