name: Nightly Watchdog

# Dead-man's switch for Nightly Deep CI. The in-run nightly-alert job cannot
# report a startup_failure — a run that fails workflow validation executes
# zero jobs, alert included — which is how the deep tier went dark silently
# (startup_failure every night from 2026-06-20 to 2026-07-08). This watchdog
# inspects the latest scheduled Nightly Deep CI run from OUTSIDE that run and
# drives the same alert issue via .github/scripts/nightly-alert-issue.sh.
#
# It alarms when the latest scheduled run is missing, older than 26 hours
# (cron never fired), or concluded anything other than success. On success it
# lets the script close any open alert issue, same as the in-run alert.

on:
  schedule:
    - cron: "0 8 * * *" # 4h after nightly-deep-ci's 04:00 UTC trigger
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  check-nightly:
    name: Check Nightly Deep CI ran and passed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Evaluate latest scheduled Nightly Deep CI run
        id: evaluate
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          WATCHED_WORKFLOW: Nightly Deep CI
          MAX_AGE_SECONDS: "93600" # 26h — one cron period plus slack
        run: |
          run_json="$(gh run list \
            --repo "$REPO" \
            --workflow "$WATCHED_WORKFLOW" \
            --event schedule \
            --limit 1 \
            --json databaseId,conclusion,createdAt,headSha,url)"
          echo "Latest scheduled run: ${run_json}"

          run_id="$(printf '%s' "$run_json" | jq -r '.[0].databaseId // empty')"
          conclusion="$(printf '%s' "$run_json" | jq -r '.[0].conclusion // "missing"')"
          created_at="$(printf '%s' "$run_json" | jq -r '.[0].createdAt // empty')"
          head_sha="$(printf '%s' "$run_json" | jq -r '.[0].headSha // "unknown"')"
          run_url="$(printf '%s' "$run_json" | jq -r '.[0].url // empty')"

          result=failure
          if [ -n "$created_at" ] && [ "$conclusion" = "success" ]; then
            age_seconds=$(( $(date -u +%s) - $(date -u -d "$created_at" +%s) ))
            if [ "$age_seconds" -lt "$MAX_AGE_SECONDS" ]; then
              result=success
            else
              echo "Latest successful run is ${age_seconds}s old (> ${MAX_AGE_SECONDS}s) — nightly did not fire since."
            fi
          else
            echo "Latest scheduled run conclusion: ${conclusion:-<none>}"
          fi

          {
            echo "result=${result}"
            echo "run_id=${run_id:-${GITHUB_RUN_ID}}"
            echo "run_url=${run_url:-${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}}"
            echo "head_sha=${head_sha}"
          } >> "$GITHUB_OUTPUT"
      - name: Drive the nightly alert issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ALERT_WORKFLOW_NAME: Nightly Deep CI
          ALERT_ISSUE_TITLE: Nightly Deep CI failed
          ALERT_RESULT: ${{ steps.evaluate.outputs.result }}
          ALERT_RUN_ID: ${{ steps.evaluate.outputs.run_id }}
          ALERT_RUN_URL: ${{ steps.evaluate.outputs.run_url }}
          ALERT_SHA: ${{ steps.evaluate.outputs.head_sha }}
        run: .github/scripts/nightly-alert-issue.sh
