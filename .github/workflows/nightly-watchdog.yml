name: Nightly Watchdog

# Dead-man's switch for the scheduled nightlies. An in-run alert job cannot
# report a startup_failure — a run that fails workflow validation executes
# zero jobs, alert included — which is how Nightly Deep CI stayed dark from
# its creation (2026-05-06) through 2026-07-08 without a single successful
# run. This watchdog inspects each nightly's latest scheduled run from
# OUTSIDE it and drives the same per-workflow alert issue (plus the optional
# Slack mirror) via .github/scripts/nightly-alert-issue.sh.
#
# Each matrix entry alarms when that workflow's latest scheduled run is
# missing, older than 26 hours (cron never fired), or concluded anything
# other than success. On success it lets the script close any open alert
# issue, same as the in-run alerts.

on:
  schedule:
    - cron: "0 8 * * *" # after the 03:00-04:00 UTC nightly batch settles
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  check-nightly:
    name: Check ${{ matrix.workflow }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workflow: Nightly Deep CI
            issue_title: Nightly Deep CI failed
          - workflow: Nightly E2E
            issue_title: Nightly E2E failed
          - workflow: Reborn Playwright
            issue_title: Reborn Playwright nightly failed
          - workflow: IronClaw Stress
            issue_title: IronClaw Stress nightly failed
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Evaluate latest scheduled run
        id: evaluate
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          WATCHED_WORKFLOW: ${{ matrix.workflow }}
          MAX_AGE_SECONDS: "93600" # 26h — one cron period plus slack
        run: |
          run_json="$(gh run list \
            --repo "$REPO" \
            --workflow "$WATCHED_WORKFLOW" \
            --event schedule \
            --limit 1 \
            --json databaseId,conclusion,createdAt,headSha,url)"
          echo "Latest scheduled run: ${run_json}"

          run_id="$(printf '%s' "$run_json" | jq -r '.[0].databaseId // empty')"
          conclusion="$(printf '%s' "$run_json" | jq -r '.[0].conclusion // "missing"')"
          created_at="$(printf '%s' "$run_json" | jq -r '.[0].createdAt // empty')"
          head_sha="$(printf '%s' "$run_json" | jq -r '.[0].headSha // "unknown"')"
          run_url="$(printf '%s' "$run_json" | jq -r '.[0].url // empty')"

          result=failure
          if [ -n "$created_at" ] && [ "$conclusion" = "success" ]; then
            age_seconds=$(( $(date -u +%s) - $(date -u -d "$created_at" +%s) ))
            if [ "$age_seconds" -lt "$MAX_AGE_SECONDS" ]; then
              result=success
            else
              echo "Latest successful run is ${age_seconds}s old (> ${MAX_AGE_SECONDS}s) — the cron did not fire since."
            fi
          else
            echo "Latest scheduled run conclusion: ${conclusion:-<none>}"
          fi

          {
            echo "result=${result}"
            echo "run_id=${run_id:-${GITHUB_RUN_ID}}"
            echo "run_url=${run_url:-${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}}"
            echo "head_sha=${head_sha}"
          } >> "$GITHUB_OUTPUT"
      - name: Drive the nightly alert issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ALERT_WORKFLOW_NAME: ${{ matrix.workflow }}
          ALERT_ISSUE_TITLE: ${{ matrix.issue_title }}
          ALERT_RESULT: ${{ steps.evaluate.outputs.result }}
          ALERT_RUN_ID: ${{ steps.evaluate.outputs.run_id }}
          ALERT_RUN_URL: ${{ steps.evaluate.outputs.run_url }}
          ALERT_SHA: ${{ steps.evaluate.outputs.head_sha }}
          ALERT_SLACK_WEBHOOK_URL: ${{ secrets.SLACK_CI_ALERTS_WEBHOOK_URL }}
        run: .github/scripts/nightly-alert-issue.sh
