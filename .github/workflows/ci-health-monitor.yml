name: CI Health Monitor

on:
  schedule:
    - cron: "0 8 * * *"  # Daily at 8 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  health-check:
    name: CI Health Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Collect CI run outcomes (last 7 days)
        id: ci-runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          SINCE=$(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null \
            || date -u -v-7d '+%Y-%m-%dT%H:%M:%SZ')

          gh run list --repo "$REPO" --limit 200 \
            --json 'status,conclusion,name,updatedAt,headSha,event,databaseId' \
            --jq "[.[] | select(.updatedAt >= \"$SINCE\")]" > /tmp/ci-runs.json

          TOTAL=$(jq length /tmp/ci-runs.json)
          FAILED=$(jq '[.[] | select(.conclusion == "failure")] | length' /tmp/ci-runs.json)
          SUCCESS=$(jq '[.[] | select(.conclusion == "success")] | length' /tmp/ci-runs.json)
          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"
          echo "success=${SUCCESS}" >> "$GITHUB_OUTPUT"
          echo "CI runs in last 7 days: ${TOTAL} total, ${SUCCESS} success, ${FAILED} failed"

      - name: Detect flaky tests
        id: flaky
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          # Find SHAs that have both success and failure for the same workflow
          jq -r '[group_by(.headSha, .name)[]
            | select(length > 1)
            | select(any(.conclusion == "success") and any(.conclusion == "failure"))
            | {sha: .[0].headSha, workflow: .[0].name, runs: length,
               failures: [.[] | select(.conclusion == "failure")] | length}]' \
            /tmp/ci-runs.json > /tmp/flaky-tests.json

          FLAKY_COUNT=$(jq length /tmp/flaky-tests.json)
          echo "flaky_count=${FLAKY_COUNT}" >> "$GITHUB_OUTPUT"
          echo "Flaky test groups: ${FLAKY_COUNT}"

          # Get failure logs for up to 3 flaky runs
          jq -r '.[0:3][] | "\(.workflow) \(.sha)"' /tmp/flaky-tests.json | \
          while read -r workflow sha; do
            RUN_ID=$(jq -r --arg w "$workflow" --arg s "$sha" \
              '[.[] | select(.name == $w and .headSha == $s and .conclusion == "failure")] | first | .databaseId // empty' \
              /tmp/ci-runs.json)
            if [ -n "$RUN_ID" ]; then
              echo "--- Failure log for ${workflow} @ ${sha::8} (run ${RUN_ID}) ---" >> /tmp/flaky-logs.txt
              gh run view "$RUN_ID" --repo "$REPO" --log-failed 2>/dev/null \
                | tail -50 >> /tmp/flaky-logs.txt || echo "(log unavailable)" >> /tmp/flaky-logs.txt
            fi
          done
          touch /tmp/flaky-logs.txt

      - name: Collect open bug issues
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh issue list --repo "$REPO" --label bug --state open --limit 100 \
            --json 'title,number,createdAt,labels,assignees,updatedAt' \
            > /tmp/open-bugs.json
          echo "Open bugs: $(jq length /tmp/open-bugs.json)"

      - name: Collect dependabot alerts
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/${REPO}/dependabot/alerts?state=open&per_page=50" \
            --jq '[.[] | {package: .security_advisory.summary,
                          severity: .security_vulnerability.severity,
                          created: .created_at,
                          url: .html_url}]' \
            > /tmp/dependabot-alerts.json 2>/dev/null || echo "[]" > /tmp/dependabot-alerts.json
          echo "Open dependabot alerts: $(jq length /tmp/dependabot-alerts.json)"

      - name: Run Claude health analysis
        uses: anthropics/claude-code-action@1eddb334cfa79fdb21ecbe2180ca1a016e8e7d47 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "ironclaw-ci[bot]"
          claude_args: "--max-turns 10 --model claude-opus-4-6 --allowedTools 'Read,Bash(gh issue create:*),Bash(gh issue list:*),Bash(gh issue comment:*),Bash(gh issue edit:*),Bash(gh issue view:*),Bash(cat:*)'"
          prompt: |
            You are the CI Health Monitor for the IronClaw project. Analyze these signals
            and produce a health report.

            Read the data files with `cat`:
            - `cat /tmp/ci-runs.json` — CI run outcomes (last 7 days)
            - `cat /tmp/flaky-tests.json` — detected flaky test groups
            - `cat /tmp/flaky-logs.txt` — failure logs from flaky runs
            - `cat /tmp/open-bugs.json` — open bug issues
            - `cat /tmp/dependabot-alerts.json` — open security alerts

            Produce a structured health report. For each finding, tag it:
            - [ACTION_REQUIRED] — needs human attention today
            - [FLAKY] — intermittently failing test with pattern analysis
            - [SECURITY] — unresolved dependency vulnerability
            - [STALE] — issue with no activity in 30+ days
            - [INFORMATIONAL] — useful context, no action needed

            For each ACTION_REQUIRED item, suggest a specific next step.
            Cluster related items. Be concise.

            Then manage the health report issue:

            1. Search for an existing open issue labeled `ci-health-report`:
               `gh issue list --label ci-health-report --state open --json number,body --limit 1`

            2. If one exists, update it with the new report. Preserve previous reports
               in a collapsed <details> section at the bottom. Use:
               `gh issue edit NUMBER --body "NEW_BODY"`

            3. If none exists, create one:
               `gh issue create --title "CI Health Report" --label ci-health-report,automated --body "BODY"`

            4. For each [ACTION_REQUIRED] finding, check if a matching issue already exists
               (search by keyword). If not, create a new issue with appropriate labels
               (automated, and risk: high/medium/low based on severity). If it exists,
               add a comment noting it's still active.

            Format the report body as:

            ## CI Health Report — YYYY-MM-DD

            ### Summary
            - CI success rate: X% (N/M runs)
            - Flaky tests: N detected
            - Open security alerts: N
            - Stale bugs (>30 days): N

            ### Action Required
            - [ ] [TAG] Description — suggested next step

            ### Informational
            - Bullet points of context

            ### Previous Reports
            <details><summary>YYYY-MM-DD</summary>previous report content</details>

            IMPORTANT: Post exactly the report to the issue. Do not post PR comments.

      - name: Summary
        if: always()
        env:
          TOTAL: ${{ steps.ci-runs.outputs.total }}
          FAILED: ${{ steps.ci-runs.outputs.failed }}
          SUCCESS: ${{ steps.ci-runs.outputs.success }}
          FLAKY: ${{ steps.flaky.outputs.flaky_count }}
        run: |
          {
            echo "## CI Health Monitor Results"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| CI runs (7 days) | ${TOTAL} |"
            echo "| Succeeded | ${SUCCESS} |"
            echo "| Failed | ${FAILED} |"
            echo "| Flaky test groups | ${FLAKY} |"
          } >> "$GITHUB_STEP_SUMMARY"
