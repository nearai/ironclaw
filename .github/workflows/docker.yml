name: Docker Image

on:
  # Called by release.yml or other workflows
  workflow_call:
    inputs:
      release:
        description: "Set true when called from release.yml to publish version/latest tags"
        required: false
        type: boolean
        default: false
      tag:
        description: "Image tag override (leave empty for auto-detect)"
        required: false
        type: string
        default: ""
  # On-demand builds
  workflow_dispatch:
    inputs:
      release:
        description: "Set true to force release-style tags (:version, :latest, :sha-xxx)"
        required: false
        type: boolean
        default: false
      tag:
        description: "Image tag override (leave empty for auto-detect)"
        required: false
        type: string
        default: ""
  # Rolling :staging image tags from main branch (hourly)
  schedule:
    - cron: '0 * * * *'

env:
  IMAGE_NAME: nearaidev/ironclaw

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          ref: ${{ github.event_name == 'schedule' && 'main' || '' }}
          persist-credentials: false

      - name: Resolve source git commit
        id: source_sha
        run: |
          SOURCE_SHA="$(git rev-parse HEAD)"
          echo "sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "Source commit: ${SOURCE_SHA}"

      - name: Extract version from the ironclaw CLI Cargo.toml
        id: version
        run: |
          # The shipped image is the Reborn CLI (`ironclaw`), so the release
          # version is that package's version — NOT the root workspace manifest,
          # which is the test-only `ironclaw_reborn_integration_tests` package
          # pinned at 0.1.0 since Tier B deleted the v1 monolith.
          VERSION=$(grep '^version' crates/ironclaw_reborn_cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Extracted version '${VERSION}' must match MAJOR.MINOR.PATCH[-prerelease] (Docker tags forbid '+')"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Determine tags
        id: tags
        env:
          VERSION: ${{ steps.version.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          IS_RELEASE_BUILD: ${{ inputs.release && 'true' || 'false' }}
          INPUT_TAG: ${{ inputs.tag }}
          SOURCE_SHA: ${{ steps.source_sha.outputs.sha }}
        run: |
          if [[ -n "${INPUT_TAG}" && ! "${INPUT_TAG}" =~ ^[A-Za-z0-9_][A-Za-z0-9._-]{0,127}$ ]]; then
            echo "::error::Input tag '${INPUT_TAG}' does not match Docker tag grammar"
            exit 1
          fi

          SHA="sha-${SOURCE_SHA::7}"
          echo "sha_tag=${SHA}" >> "$GITHUB_OUTPUT"

          if [[ "${IS_RELEASE_BUILD}" == "true" ]]; then
            # Release: :version + :latest + :sha-xxx
            TAGS="${IMAGE_NAME}:${VERSION}"
            TAGS="${TAGS},${IMAGE_NAME}:latest"
            TAGS="${TAGS},${IMAGE_NAME}:${SHA}"
          elif [[ "${EVENT_NAME}" == "schedule" ]]; then
            # Hourly staging: :staging + :sha-xxx
            TAGS="${IMAGE_NAME}:staging"
            TAGS="${TAGS},${IMAGE_NAME}:${SHA}"
          else
            # Manual dispatch: :sha-xxx only
            TAGS="${IMAGE_NAME}:${SHA}"
          fi

          # Manual override adds an extra tag (e.g. "staging")
          if [[ -n "${INPUT_TAG}" ]]; then
            TAGS="${TAGS},${IMAGE_NAME}:${INPUT_TAG}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

          # The Reborn Dockerfile has a single `runtime` stage — WASM
          # extensions are compiled into the binary via
          # `ironclaw_first_party_extensions`, so there is no separate
          # pre-bundled staging image target.
          echo "target=runtime" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          username: ${{ vars.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Check if current git commit is already built
        id: check
        if: github.event_name == 'schedule' || inputs.tag == 'staging'
        env:
          SOURCE_SHA: ${{ steps.source_sha.outputs.sha }}
        run: |
          CURRENT_BUILT_SHA=""

          if docker pull "${IMAGE_NAME}:staging" > /dev/null 2>&1; then
            CURRENT_BUILT_SHA=$(docker inspect --format='{{index .Config.Labels "ironclaw.git.sha"}}' "${IMAGE_NAME}:staging" 2>/dev/null || echo "")
          fi

          echo "Current built commit (ironclaw): ${CURRENT_BUILT_SHA:-<none>}"
          echo "Current source commit: ${SOURCE_SHA}"

          if [[ -n "${CURRENT_BUILT_SHA}" && "${CURRENT_BUILT_SHA}" == "${SOURCE_SHA}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Current commit already built — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Image is missing or out of date — proceeding."
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push (ironclaw)
        if: steps.check.outputs.skip != 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          target: ${{ steps.tags.outputs.target }}
          labels: |
            ironclaw.git.sha=${{ steps.source_sha.outputs.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create releases-manager app token
        id: app-token
        if: steps.check.outputs.skip != 'true'
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.GH_RELEASES_MANAGER_APP_ID }}
          private-key: ${{ secrets.GH_RELEASES_MANAGER_APP_PRIVATE_KEY }}
          owner: nearai
          repositories: ironclaw-dind

      - name: Trigger ironclaw-dind Build & Push
        if: steps.app-token.outcome == 'success' && steps.check.outputs.skip != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          EVENT_NAME: ${{ github.event_name }}
          IS_RELEASE_BUILD: ${{ inputs.release && 'true' || 'false' }}
          INPUT_TAG: ${{ inputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ "${IS_RELEASE_BUILD}" == "true" && -n "${VERSION}" ]]; then
            gh api repos/nearai/ironclaw-dind/dispatches \
              --method POST \
              -f event_type="ironclaw_image_published" \
              -f client_payload[version]="${VERSION}"
          elif [[ "${EVENT_NAME}" == "schedule" ]] || [[ "${INPUT_TAG}" == "staging" ]]; then
            gh api repos/nearai/ironclaw-dind/dispatches \
              --method POST \
              -f event_type="ironclaw_image_published"
          fi

      - name: Summary
        if: steps.check.outputs.skip != 'true'
        env:
          TAGS: ${{ steps.tags.outputs.tags }}
          VERSION: ${{ steps.version.outputs.version }}
          SOURCE_SHA: ${{ steps.source_sha.outputs.sha }}
        run: |
          {
            echo "## Docker Images"
            echo ""
            echo "**ironclaw:**"
            echo '```'
            echo "${TAGS}" | tr ',' '\n'
            echo '```'
            echo ""
            echo "- version: \`${VERSION}\`"
            echo "- sha: \`${SOURCE_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summary (skipped)
        if: steps.check.outputs.skip == 'true'
        env:
          SOURCE_SHA: ${{ steps.source_sha.outputs.sha }}
        run: |
          {
            echo "## Docker Images — skipped"
            echo ""
            echo "Current commit already built for \`${IMAGE_NAME}:staging\`."
            echo "- sha: \`${SOURCE_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"
