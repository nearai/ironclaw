name: Docker Image

on:
  push:
    branches: [main]
    tags: ["ironclaw-v*", "v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (leave empty for auto-detect)"
        required: false
        type: string
        default: ""

env:
  IMAGE_NAME: nearaidev/ironclaw

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # On main branch: latest + version
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }},enable={{is_default_branch}}
            # On version tags: extract semver
            type=match,pattern=(?:ironclaw-)?v(.*),group=1
            # Manual override
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            # Short SHA for all builds
            type=sha,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## Docker Image"
            echo ""
            echo "**Tags pushed:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "- version: \`${{ steps.version.outputs.version }}\`"
            echo "- sha: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
