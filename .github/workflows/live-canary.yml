name: Live Canary
run-name: ${{ inputs.trigger_context || github.workflow }}

on:
  # Scheduled runs are intentionally limited to Reborn WebUI v2 live QA.
  # Legacy canary lanes remain available through workflow_dispatch for
  # manual diagnosis, but do not run on cron.
  schedule:
    # Every 3 hours. Only reborn-webui-v2-live-qa has a matching guard.
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      lane:
        description: "Lane to run"
        type: choice
        required: true
        default: reborn-webui-v2-live-qa
        options:
          - all
          - deterministic-replay
          - public-smoke
          - persona-rotating
          - private-oauth
          - provider-matrix
          - release-public-full
          - upgrade-canary
          - auth-smoke
          - auth-full
          - auth-channels
          - auth-live-seeded
          - auth-browser-consent
          - workflow-canary
          - reborn-webui-v2-live-qa
      scenario:
        description: "Optional scenario/test filter. Use auto for rotating persona."
        type: string
        required: false
        default: ""
      cases:
        description: "Optional comma-separated case/provider list for Python live canary lanes. Use all for the full Reborn WebUI v2 QA suite."
        required: false
        default: ""
        type: string
      previous_ref:
        description: "Previous release/tag for upgrade-canary"
        type: string
        required: false
        default: ""
      target_ref:
        description: "Optional ref/SHA for the Reborn WebUI v2 live QA checkout. Used by /canary PR comments."
        type: string
        required: false
        default: ""
      target_branch:
        description: "Optional branch name for the Reborn WebUI v2 live QA checkout. Used by /canary PR comments."
        type: string
        required: false
        default: ""
      target_pr:
        description: "Optional pull request number for validating target_ref before running Reborn WebUI v2 live QA with secrets."
        type: string
        required: false
        default: ""
      trigger_context:
        description: "Optional run label supplied by ChatOps dispatchers."
        type: string
        required: false
        default: ""
      trigger_actor:
        description: "Optional GitHub login of the maintainer who authorized a ChatOps PR live-QA run."
        type: string
        required: false
        default: ""
      use_target_harness:
        description: "Use target_ref's Reborn WebUI v2 live QA harness instead of restoring the canonical main harness."
        type: boolean
        required: false
        default: false

permissions:
  contents: read

concurrency:
  group: live-canary-${{ github.event_name }}-${{ inputs.lane || github.event.schedule }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  DATABASE_BACKEND: libsql
  ALLOW_LOCAL_TOOLS: "true"
  AGENT_AUTO_APPROVE_TOOLS: "true"
  RUST_LOG: ironclaw=info

jobs:
  auth-smoke:
    name: Auth Smoke
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.lane == 'all' || inputs.lane == 'auth-smoke')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      LANE: auth-smoke
      PROVIDER: mock
      PLAYWRIGHT_INSTALL: with-deps
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Run auth smoke lane
        run: scripts/live-canary/run.sh
      - name: Scrub artifacts
        if: always()
        run: scripts/live-canary/scrub-artifacts.sh artifacts/live-canary
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-canary-auth-smoke
          path: artifacts/live-canary/
          if-no-files-found: ignore

  auth-full:
    name: Auth Full
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.lane == 'all' || inputs.lane == 'auth-full')
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      LANE: auth-full
      PROVIDER: mock
      PLAYWRIGHT_INSTALL: with-deps
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Run auth full lane
        run: scripts/live-canary/run.sh
      - name: Scrub artifacts
        if: always()
        run: scripts/live-canary/scrub-artifacts.sh artifacts/live-canary
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-canary-auth-full
          path: artifacts/live-canary/
          if-no-files-found: ignore

  auth-channels:
    name: Auth Channels
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.lane == 'all' || inputs.lane == 'auth-channels')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      LANE: auth-channels
      PROVIDER: mock
      PLAYWRIGHT_INSTALL: with-deps
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Run auth channel lane
        run: scripts/live-canary/run.sh
      - name: Scrub artifacts
        if: always()
        run: scripts/live-canary/scrub-artifacts.sh artifacts/live-canary
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-canary-auth-channels
          path: artifacts/live-canary/
          if-no-files-found: ignore

  auth-live-seeded:
    name: Auth Live Seeded
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.lane == 'all' || inputs.lane == 'auth-live-seeded')
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      LANE: auth-live-seeded
      PROVIDER: seeded
      PLAYWRIGHT_INSTALL: with-deps
      CASES: ${{ inputs.cases }}
      STRICT_ARTIFACT_SCRUB: "true"
      # Non-sensitive values stay in job env. Sensitive secrets (access /
      # refresh tokens, client secrets) are materialised to per-file
      # paths by the Materialize step below so they never appear in the
      # job's `env:` block — see `scripts/auth_live_canary/run_live_canary.py`
      # → `_hydrate_secrets`.
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      AUTH_LIVE_GITHUB_OWNER: ${{ vars.AUTH_LIVE_GITHUB_OWNER }}
      AUTH_LIVE_GITHUB_REPO: ${{ vars.AUTH_LIVE_GITHUB_REPO }}
      AUTH_LIVE_GITHUB_ISSUE_NUMBER: ${{ vars.AUTH_LIVE_GITHUB_ISSUE_NUMBER }}
      AUTH_LIVE_NOTION_CLIENT_ID: ${{ secrets.AUTH_LIVE_NOTION_CLIENT_ID }}
      AUTH_LIVE_NOTION_QUERY: ${{ vars.AUTH_LIVE_NOTION_QUERY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Materialize sensitive secrets to files
        shell: bash
        # These env entries are scoped to *this step only* — they never
        # appear in the job-wide `env:` block, so they aren't inherited
        # by later steps' shell contexts and can't leak via an
        # accidental `set -x` or `printenv`. Each value is written to a
        # mode-0600 file under `$RUNNER_TEMP/auth-secrets/`, and we
        # export the corresponding `<NAME>_PATH` to `$GITHUB_ENV` so
        # `scripts/live_canary/common.py::env_secret` can find them.
        # `set +x` is explicit so a future edit adding `-x` won't
        # interpolate the secret value into the log.
        env:
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          AUTH_LIVE_GOOGLE_ACCESS_TOKEN: ${{ secrets.AUTH_LIVE_GOOGLE_ACCESS_TOKEN }}
          AUTH_LIVE_GOOGLE_REFRESH_TOKEN: ${{ secrets.AUTH_LIVE_GOOGLE_REFRESH_TOKEN }}
          AUTH_LIVE_GITHUB_TOKEN: ${{ secrets.AUTH_LIVE_GITHUB_TOKEN }}
          AUTH_LIVE_NOTION_ACCESS_TOKEN: ${{ secrets.AUTH_LIVE_NOTION_ACCESS_TOKEN }}
          AUTH_LIVE_NOTION_REFRESH_TOKEN: ${{ secrets.AUTH_LIVE_NOTION_REFRESH_TOKEN }}
          AUTH_LIVE_NOTION_CLIENT_SECRET: ${{ secrets.AUTH_LIVE_NOTION_CLIENT_SECRET }}
        run: |
          set +x
          set -euo pipefail
          secret_dir="${RUNNER_TEMP}/auth-secrets"
          mkdir -p "${secret_dir}"
          chmod 700 "${secret_dir}"
          write_secret() {
            local name="$1"
            local value="$2"
            if [[ -z "${value}" ]]; then
              return 0
            fi
            local path="${secret_dir}/${name}"
            printf '%s' "${value}" > "${path}"
            chmod 600 "${path}"
            echo "${name}_PATH=${path}" >> "${GITHUB_ENV}"
          }
          write_secret "GOOGLE_OAUTH_CLIENT_SECRET" "${GOOGLE_OAUTH_CLIENT_SECRET:-}"
          write_secret "AUTH_LIVE_GOOGLE_ACCESS_TOKEN" "${AUTH_LIVE_GOOGLE_ACCESS_TOKEN:-}"
          write_secret "AUTH_LIVE_GOOGLE_REFRESH_TOKEN" "${AUTH_LIVE_GOOGLE_REFRESH_TOKEN:-}"
          write_secret "AUTH_LIVE_GITHUB_TOKEN" "${AUTH_LIVE_GITHUB_TOKEN:-}"
          write_secret "AUTH_LIVE_NOTION_ACCESS_TOKEN" "${AUTH_LIVE_NOTION_ACCESS_TOKEN:-}"
          write_secret "AUTH_LIVE_NOTION_REFRESH_TOKEN" "${AUTH_LIVE_NOTION_REFRESH_TOKEN:-}"
          write_secret "AUTH_LIVE_NOTION_CLIENT_SECRET" "${AUTH_LIVE_NOTION_CLIENT_SECRET:-}"
      - name: Run seeded auth live lane
        run: |
          set +x
          scripts/live-canary/run.sh
      - name: Scrub artifacts
        if: always()
        run: scripts/live-canary/scrub-artifacts.sh artifacts/live-canary
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-canary-auth-live-seeded
          path: artifacts/live-canary/
          if-no-files-found: ignore

  auth-browser-consent:
    name: Auth Browser Consent
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.lane == 'all' || inputs.lane == 'auth-browser-consent')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      LANE: auth-browser-consent
      PROVIDER: browser
      PLAYWRIGHT_INSTALL: with-deps
      CASES: ${{ inputs.cases }}
      STRICT_ARTIFACT_SCRUB: "true"
      # Non-sensitive values stay in job env. OAuth client secrets and
      # provider passwords move to the Materialize step below —
      # declaring them here would register their values as job-level
      # masks and ship them in every step's env, which is exactly the
      # surface the reviewer flagged.
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      AUTH_BROWSER_GOOGLE_USERNAME: ${{ secrets.AUTH_BROWSER_GOOGLE_USERNAME }}
      AUTH_BROWSER_NOTION_USERNAME: ${{ secrets.AUTH_BROWSER_NOTION_USERNAME }}
      # GitHub-related secrets are intentionally NOT exported here.
      # The browser-consent lane only drives Google + Notion (see
      # `BROWSER_CASES` in scripts/live_canary/auth_registry.py); the
      # github WASM tool registers as `auth_summary.method = "manual"`
      # (PAT paste, not OAuth) so this lane has no consumer for any of
      # AUTH_BROWSER_GITHUB_* / GITHUB_OAUTH_CLIENT_*. Re-add the
      # secrets only when the github tool ships an OAuth flow and the
      # entry comes back into `BROWSER_CASES`. Coverage for github
      # lives in `SEEDED_CASES` (auth-live-seeded) instead.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Materialize provider storage state
        shell: bash
        env:
          AUTH_BROWSER_GOOGLE_STORAGE_STATE_B64: ${{ secrets.AUTH_BROWSER_GOOGLE_STORAGE_STATE_B64 }}
          AUTH_BROWSER_NOTION_STORAGE_STATE_B64: ${{ secrets.AUTH_BROWSER_NOTION_STORAGE_STATE_B64 }}
        run: |
          set +x
          set -euo pipefail
          mkdir -p .tmp/auth-browser-state
          if [[ -n "${AUTH_BROWSER_GOOGLE_STORAGE_STATE_B64:-}" ]]; then
            printf '%s' "$AUTH_BROWSER_GOOGLE_STORAGE_STATE_B64" | base64 -d > .tmp/auth-browser-state/google.json
            echo "AUTH_BROWSER_GOOGLE_STORAGE_STATE_PATH=$PWD/.tmp/auth-browser-state/google.json" >> "$GITHUB_ENV"
          fi
          if [[ -n "${AUTH_BROWSER_NOTION_STORAGE_STATE_B64:-}" ]]; then
            printf '%s' "$AUTH_BROWSER_NOTION_STORAGE_STATE_B64" | base64 -d > .tmp/auth-browser-state/notion.json
            echo "AUTH_BROWSER_NOTION_STORAGE_STATE_PATH=$PWD/.tmp/auth-browser-state/notion.json" >> "$GITHUB_ENV"
          fi
      - name: Materialize sensitive secrets to files
        shell: bash
        # Scoped `env:` on this step only — see the auth-live-seeded
        # Materialize step for the rationale.
        env:
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          AUTH_BROWSER_GOOGLE_PASSWORD: ${{ secrets.AUTH_BROWSER_GOOGLE_PASSWORD }}
          AUTH_BROWSER_NOTION_PASSWORD: ${{ secrets.AUTH_BROWSER_NOTION_PASSWORD }}
          # Github-OAuth and -password secrets removed: this lane no
          # longer drives a GitHub OAuth flow (see env: block above for
          # the BROWSER_CASES context). Re-add the secrets only when
          # the github tool ships an OAuth flow.
        run: |
          set +x
          set -euo pipefail
          secret_dir="${RUNNER_TEMP}/auth-secrets"
          mkdir -p "${secret_dir}"
          chmod 700 "${secret_dir}"
          write_secret() {
            local name="$1"
            local value="$2"
            if [[ -z "${value}" ]]; then
              return 0
            fi
            local path="${secret_dir}/${name}"
            printf '%s' "${value}" > "${path}"
            chmod 600 "${path}"
            echo "${name}_PATH=${path}" >> "${GITHUB_ENV}"
          }
          write_secret "GOOGLE_OAUTH_CLIENT_SECRET" "${GOOGLE_OAUTH_CLIENT_SECRET:-}"
          write_secret "AUTH_BROWSER_GOOGLE_PASSWORD" "${AUTH_BROWSER_GOOGLE_PASSWORD:-}"
          write_secret "AUTH_BROWSER_NOTION_PASSWORD" "${AUTH_BROWSER_NOTION_PASSWORD:-}"
      - name: Run browser-consent auth lane
        run: |
          set +x
          scripts/live-canary/run.sh
      - name: Scrub artifacts
        if: always()
        run: scripts/live-canary/scrub-artifacts.sh artifacts/live-canary
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-canary-auth-browser-consent
          path: artifacts/live-canary/
          if-no-files-found: ignore

  workflow-canary:
    name: Workflow Canary
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.lane == 'all' || inputs.lane == 'workflow-canary')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LANE: workflow-canary
      PROVIDER: mock
      PLAYWRIGHT_INSTALL: skip
      # Forwarded into run.sh's SCENARIO; translated to one or more
      # --scenario flags on run_workflow_canary.py. Empty = full suite.
      SCENARIO: ${{ inputs.scenario }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      # wasm32-wasip2 + cargo-component + the channels build are all
      # required: the lane's telegram_channel_install /
      # telegram_round_trip / routine_visibility_from_telegram /
      # manual_trigger_from_telegram scenarios call
      # `/api/extensions/install` for the bundled telegram WASM
      # channel, which only succeeds when channels-src/telegram has a
      # built telegram.wasm artifact. Other live-canary lanes that
      # exercise WASM extensions follow the same pattern.
      # `--channels` skips the WASM tools build (~5 tools that
      # workflow-canary doesn't exercise) to keep the lane under
      # ~6 min on a fresh runner.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: live-canary-workflow-canary
      - name: Setup OVH sccache
        uses: ./.github/actions/setup-sccache-dist
        with:
          scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
          cache-ssh-host: ${{ vars.SCCACHE_CACHE_SSH_HOST }}
          cache-ssh-user: ${{ vars.SCCACHE_CACHE_SSH_USER }}
          cache-ssh-port: ${{ vars.SCCACHE_CACHE_SSH_PORT }}
          cache-ssh-private-key: ${{ secrets.SCCACHE_CACHE_SSH_PRIVATE_KEY }}
          cache-ssh-known-hosts: ${{ secrets.SCCACHE_CACHE_SSH_KNOWN_HOSTS }}
          redis-password: ${{ secrets.SCCACHE_REDIS_PASSWORD }}
      - name: Install cargo-component
        run: cargo install cargo-component --locked || true
      - name: Build WASM channels
        run: ./scripts/build-wasm-extensions.sh --channels
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Run workflow canary lane
        run: scripts/live-canary/run.sh
      - name: Scrub artifacts
        if: always()
        run: scripts/live-canary/scrub-artifacts.sh artifacts/live-canary
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-canary-workflow-canary
          path: artifacts/live-canary/
          if-no-files-found: ignore

  deterministic-replay:
    name: Deterministic Replay
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.lane == 'all' || inputs.lane == 'deterministic-replay')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: live-canary-deterministic-replay
      - name: Setup OVH sccache
        uses: ./.github/actions/setup-sccache-dist
        with:
          scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
          cache-ssh-host: ${{ vars.SCCACHE_CACHE_SSH_HOST }}
          cache-ssh-user: ${{ vars.SCCACHE_CACHE_SSH_USER }}
          cache-ssh-port: ${{ vars.SCCACHE_CACHE_SSH_PORT }}
          cache-ssh-private-key: ${{ secrets.SCCACHE_CACHE_SSH_PRIVATE_KEY }}
          cache-ssh-known-hosts: ${{ secrets.SCCACHE_CACHE_SSH_KNOWN_HOSTS }}
          redis-password: ${{ secrets.SCCACHE_REDIS_PASSWORD }}
      - name: Install cargo-component
        run: cargo install cargo-component --locked || true
      - name: Build WASM extensions
        run: ./scripts/build-wasm-extensions.sh
      - name: Run deterministic replay lane
        env:
          LANE: deterministic-replay
          SCENARIO: ${{ inputs.scenario }}
          PROVIDER: replay
          COMMAND_TIMEOUT: 90m
          LIBSQL_PATH: ${{ runner.temp }}/ironclaw-live-replay.db
        run: scripts/live-canary/run.sh
      - name: Scrub artifacts
        if: always()
        run: scripts/live-canary/scrub-artifacts.sh artifacts/live-canary
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-canary-deterministic-replay
          path: artifacts/live-canary/
          retention-days: 14

  public-smoke:
    name: Public Live Smoke
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.lane == 'all' || inputs.lane == 'public-smoke')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      LLM_BACKEND: anthropic
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.LIVE_ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: live-canary-public-smoke
      - name: Setup OVH sccache
        uses: ./.github/actions/setup-sccache-dist
        with:
          scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
          cache-ssh-host: ${{ vars.SCCACHE_CACHE_SSH_HOST }}
          cache-ssh-user: ${{ vars.SCCACHE_CACHE_SSH_USER }}
          cache-ssh-port: ${{ vars.SCCACHE_CACHE_SSH_PORT }}
          cache-ssh-private-key: ${{ secrets.SCCACHE_CACHE_SSH_PRIVATE_KEY }}
          cache-ssh-known-hosts: ${{ secrets.SCCACHE_CACHE_SSH_KNOWN_HOSTS }}
          redis-password: ${{ secrets.SCCACHE_REDIS_PASSWORD }}
      - name: Install cargo-component
        run: cargo install cargo-component --locked || true
      - name: Build WASM extensions
        run: ./scripts/build-wasm-extensions.sh
      - name: Pre-install zizmor
        run: pip install zizmor || true
      - name: Run public smoke lane
        env:
          LANE: public-smoke
          SCENARIO: ${{ inputs.scenario }}
          PROVIDER: anthropic
          COMMAND_TIMEOUT: 90m
          LIBSQL_PATH: ${{ runner.temp }}/ironclaw-live-public-smoke.db
        run: scripts/live-canary/run.sh
      - name: Scrub artifacts
        if: always()
        run: scripts/live-canary/scrub-artifacts.sh artifacts/live-canary
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-canary-public-smoke
          path: artifacts/live-canary/
          retention-days: 14

  approve-reborn-webui-v2-pr-live-qa:
    name: Approve PR code for Reborn WebUI v2 live QA
    if: >
      github.event_name == 'workflow_dispatch' &&
      inputs.target_ref != '' &&
      (inputs.lane == 'all' || inputs.lane == 'reborn-webui-v2-live-qa')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: reborn-live-canary-pr
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Require trusted approval or maintainer-triggered PR live QA
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_PR: ${{ inputs.target_pr }}
          TARGET_REF: ${{ inputs.target_ref }}
          # A workflow_dispatch created by Live Canary Command is attributed to
          # github-actions[bot]. The command verifies this original actor has
          # repository write access before dispatching; direct dispatches use
          # GitHub's real triggering actor instead.
          TRIGGER_ACTOR: ${{ inputs.trigger_actor || github.triggering_actor }}
        run: |
          set -euo pipefail
          if ! [[ "${TARGET_PR}" =~ ^[0-9]+$ && "${TARGET_REF}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::A valid target_pr and full target_ref are required for PR live QA."
            exit 1
          fi

          pr_json="$(gh pr view "${TARGET_PR}" --repo "${REPO}" --json isCrossRepository,headRefOid)"
          if [[ "$(jq -r '.isCrossRepository' <<< "${pr_json}")" == "true" ]]; then
            echo "::error::Refusing to run live QA with secrets on a forked PR."
            exit 1
          fi
          if [[ "$(jq -r '.headRefOid' <<< "${pr_json}")" != "${TARGET_REF}" ]]; then
            echo "::error::target_ref does not match PR #${TARGET_PR} head SHA."
            exit 1
          fi

          trusted_approval=""
          while IFS=$'\t' read -r reviewer commit_id; do
            [[ "${commit_id}" == "${TARGET_REF}" ]] || continue
            permission="$(gh api "repos/${REPO}/collaborators/${reviewer}/permission" --jq '.permission')"
            if [[ "${permission}" == "admin" || "${permission}" == "maintain" || "${permission}" == "write" ]]; then
              trusted_approval="${reviewer}"
              break
            fi
          done < <(
            gh api --paginate "repos/${REPO}/pulls/${TARGET_PR}/reviews" \
              --jq 'sort_by(.submitted_at) | group_by(.user.login) | map(last) | .[] | select(.state == "APPROVED") | [.user.login, .commit_id] | @tsv'
          )

          if [[ -z "${trusted_approval}" && "${TRIGGER_ACTOR}" =~ ^[A-Za-z0-9-]+$ ]]; then
            permission="$(gh api "repos/${REPO}/collaborators/${TRIGGER_ACTOR}/permission" --jq '.permission')"
            if [[ "${permission}" == "admin" || "${permission}" == "maintain" || "${permission}" == "write" ]]; then
              trusted_approval="${TRIGGER_ACTOR} (authorized trigger)"
            fi
          fi

          if [[ -z "${trusted_approval}" ]]; then
            echo "::error::PR #${TARGET_PR} head ${TARGET_REF} requires either an approving review from a collaborator with write access or a trigger by a collaborator with write access before live secrets can be used."
            exit 1
          fi
          echo "Trusted authorization for ${TARGET_REF} was provided by ${trusted_approval}."

  preflight-reborn-webui-v2-google-oauth:
    name: Preflight Reborn WebUI v2 Google OAuth
    needs: approve-reborn-webui-v2-pr-live-qa
    if: >
      always() &&
      (
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && (inputs.lane == 'all' || inputs.lane == 'reborn-webui-v2-live-qa'))
      ) &&
      (inputs.target_ref == '' || needs.approve-reborn-webui-v2-pr-live-qa.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      status: ${{ steps.refresh.outputs.status }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Refresh Google OAuth access token
        id: refresh
        continue-on-error: true
        env:
          IRONCLAW_REBORN_GOOGLE_CLIENT_ID: ${{ secrets.IRONCLAW_REBORN_GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID || secrets.GOOGLE_OAUTH_CLIENT_ID }}
          IRONCLAW_REBORN_GOOGLE_CLIENT_SECRET: ${{ secrets.IRONCLAW_REBORN_GOOGLE_CLIENT_SECRET || secrets.GOOGLE_CLIENT_SECRET || secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          AUTH_LIVE_GOOGLE_REFRESH_TOKEN: ${{ secrets.AUTH_LIVE_GOOGLE_REFRESH_TOKEN }}
        run: >-
          python3 scripts/reborn_webui_v2_live_qa/refresh_google_oauth.py
          --github-output "${GITHUB_OUTPUT}"
      - name: Report Google OAuth infrastructure failure
        if: steps.refresh.outcome != 'success'
        env:
          GOOGLE_OAUTH_STATUS: ${{ steps.refresh.outputs.status }}
        run: |
          echo "::error::Reborn WebUI v2 Google OAuth preflight failed: ${GOOGLE_OAUTH_STATUS:-unknown}. Google-dependent cases will be skipped; non-Google cases will continue."
          exit 1

  prepare-reborn-webui-v2-live-qa:
    name: Prepare Reborn WebUI v2 live QA binary
    if: >
      always() &&
      (
        (github.event_name == 'schedule' && github.event.schedule == '0 */3 * * *') ||
        (
          github.event_name == 'workflow_dispatch' &&
          (inputs.lane == 'all' || inputs.lane == 'reborn-webui-v2-live-qa') &&
          (inputs.target_ref == '' || needs.approve-reborn-webui-v2-pr-live-qa.result == 'success')
        )
      )
    needs: approve-reborn-webui-v2-pr-live-qa
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      pull-requests: read
    outputs:
      checkout_ref: ${{ steps.target.outputs.checkout_ref }}
      build_source: ${{ steps.lookup.outputs.source || steps.fallback.outputs.source }}
    steps:
      - name: Resolve and validate Reborn WebUI v2 target
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_PR: ${{ inputs.target_pr }}
          TARGET_REF: ${{ inputs.target_ref }}
        run: |
          set -euo pipefail
          if [[ -z "${TARGET_REF}" ]]; then
            echo "checkout_ref=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if ! [[ "${TARGET_REF}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::target_ref must be a full commit SHA for reborn-webui-v2-live-qa."
            exit 1
          fi
          if ! [[ "${TARGET_PR}" =~ ^[0-9]+$ ]]; then
            echo "::error::target_pr is required when target_ref is supplied for reborn-webui-v2-live-qa."
            exit 1
          fi
          pr_json="$(gh pr view "${TARGET_PR}" --repo "${REPO}" --json isCrossRepository,headRefOid)"
          if [[ "$(jq -r '.isCrossRepository' <<< "${pr_json}")" == "true" ]]; then
            echo "::error::Refusing to run reborn-webui-v2-live-qa with live secrets on a forked PR."
            exit 1
          fi
          if [[ "$(jq -r '.headRefOid' <<< "${pr_json}")" != "${TARGET_REF}" ]]; then
            echo "::error::target_ref does not match PR #${TARGET_PR} head SHA."
            exit 1
          fi
          echo "checkout_ref=${TARGET_REF}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ steps.target.outputs.checkout_ref }}

      - name: Find successful Reborn E2E binary for target SHA
        id: lookup
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TARGET_REF: ${{ steps.target.outputs.checkout_ref }}
        run: |
          set -euo pipefail
          artifact_name="reborn-webui-v2-binary-${TARGET_REF}"
          workflow_id="$(gh api "repos/${REPO}/actions/workflows/reborn-e2e.yml" --jq '.id')"
          mkdir -p artifacts/prepared-reborn-webui-v2-binary
          echo "found=0" >> "${GITHUB_OUTPUT}"

          for attempt in $(seq 1 20); do
            runs="$(gh api --method GET "repos/${REPO}/actions/workflows/${workflow_id}/runs" \
              -f head_sha="${TARGET_REF}" -f per_page=10)"
            run="$(jq -c '[.workflow_runs[] | select(.head_sha == $sha)] | sort_by(.created_at) | reverse | .[0] // empty' \
              --arg sha "${TARGET_REF}" <<< "${runs}")"
            if [[ -z "${run}" ]]; then
              if [[ ${attempt} -le 2 ]]; then
                echo "No Reborn E2E run exists for ${TARGET_REF} yet; waiting for CI to start (${attempt}/2)."
                sleep 15
                continue
              fi
              echo "No Reborn E2E run exists for ${TARGET_REF}; using the canary fallback build."
              exit 0
            fi

            status="$(jq -r '.status' <<< "${run}")"
            conclusion="$(jq -r '.conclusion // ""' <<< "${run}")"
            run_id="$(jq -r '.id' <<< "${run}")"
            if [[ "${status}" != "completed" ]]; then
              echo "Reborn E2E run ${run_id} is ${status}; waiting for its tested binary (${attempt}/20)."
              sleep 15
              continue
            fi
            if [[ "${conclusion}" != "success" ]]; then
              echo "Reborn E2E run ${run_id} concluded ${conclusion}; using the canary fallback build."
              exit 0
            fi

            artifacts="$(gh api --method GET "repos/${REPO}/actions/runs/${run_id}/artifacts" -f per_page=100)"
            artifact_id="$(jq -r '[.artifacts[] | select(.expired == false and .name == $name)] | .[0].id // empty' \
              --arg name "${artifact_name}" <<< "${artifacts}")"
            if [[ -z "${artifact_id}" ]]; then
              echo "Successful Reborn E2E run ${run_id} has no ${artifact_name}; using the canary fallback build."
              exit 0
            fi

            if ! (
              set -e
              rm -rf artifacts/prepared-reborn-webui-v2-binary
              mkdir -p artifacts/prepared-reborn-webui-v2-binary
              gh api "repos/${REPO}/actions/artifacts/${artifact_id}/zip" > "${RUNNER_TEMP}/reborn-webui-v2-binary.zip"
              unzip -q "${RUNNER_TEMP}/reborn-webui-v2-binary.zip" -d artifacts/prepared-reborn-webui-v2-binary
              python3 scripts/live-canary/validate_reborn_binary_artifact.py \
                artifacts/prepared-reborn-webui-v2-binary \
                "${TARGET_REF}" \
                "webui-v2-beta,slack-v2-host-beta"
            ); then
              echo "::warning::The Reborn E2E artifact could not be downloaded or validated; using the canary fallback build."
              rm -rf artifacts/prepared-reborn-webui-v2-binary
              mkdir -p artifacts/prepared-reborn-webui-v2-binary
              exit 0
            fi
            echo "found=1" >> "${GITHUB_OUTPUT}"
            echo "source=reborn-e2e" >> "${GITHUB_OUTPUT}"
            echo "Using tested Reborn E2E binary from run ${run_id}."
            exit 0
          done

          echo "Reborn E2E did not finish within five minutes; using the canary fallback build."

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: steps.lookup.outputs.found != '1'

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: steps.lookup.outputs.found != '1'
        with:
          key: live-canary-reborn-webui-v2-live-qa

      - name: Setup OVH sccache
        if: steps.lookup.outputs.found != '1'
        uses: ./.github/actions/setup-sccache-dist
        with:
          scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
          cache-ssh-host: ${{ vars.SCCACHE_CACHE_SSH_HOST }}
          cache-ssh-user: ${{ vars.SCCACHE_CACHE_SSH_USER }}
          cache-ssh-port: ${{ vars.SCCACHE_CACHE_SSH_PORT }}
          cache-ssh-private-key: ${{ secrets.SCCACHE_CACHE_SSH_PRIVATE_KEY }}
          cache-ssh-known-hosts: ${{ secrets.SCCACHE_CACHE_SSH_KNOWN_HOSTS }}
          redis-password: ${{ secrets.SCCACHE_REDIS_PASSWORD }}

      - name: Build fallback Reborn WebUI v2 binary once
        if: steps.lookup.outputs.found != '1'
        env:
          CARGO_INCREMENTAL: "0"
          CARGO_PROFILE_DEV_DEBUG: "0"
        run: >-
          cargo build
          -p ironclaw_reborn_cli
          --features webui-v2-beta,slack-v2-host-beta
          --bin ironclaw

      - name: Package fallback Reborn WebUI v2 binary
        id: fallback
        if: steps.lookup.outputs.found != '1'
        env:
          TARGET_REF: ${{ steps.target.outputs.checkout_ref }}
        run: |
          set -euo pipefail
          rm -rf artifacts/prepared-reborn-webui-v2-binary
          mkdir -p artifacts/prepared-reborn-webui-v2-binary
          # Temporary compatibility member for downstream QA consumers; remove
          # after every consumer invokes the canonical ironclaw binary.
          cp target/debug/ironclaw target/debug/ironclaw-reborn
          tar -C target/debug -czf artifacts/prepared-reborn-webui-v2-binary/ironclaw-reborn.tar.gz ironclaw ironclaw-reborn
          (
            cd artifacts/prepared-reborn-webui-v2-binary
            sha256sum ironclaw-reborn.tar.gz > ironclaw-reborn.tar.gz.sha256
          )
          jq -n \
            --arg product_ref "${TARGET_REF}" \
            --argjson features '["slack-v2-host-beta","webui-v2-beta"]' \
            '{format_version: 1, product_ref: $product_ref, features: $features}' \
            > artifacts/prepared-reborn-webui-v2-binary/manifest.json
          echo "source=canary-fallback" >> "${GITHUB_OUTPUT}"

      - name: Upload prepared Reborn WebUI v2 binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: prepared-reborn-webui-v2-binary-${{ steps.target.outputs.checkout_ref }}
          path: artifacts/prepared-reborn-webui-v2-binary/
          if-no-files-found: error
          retention-days: 1

  reborn-webui-v2-live-qa:
    name: Reborn WebUI v2 Live QA (${{ matrix.shard_name }})
    needs:
      - prepare-reborn-webui-v2-live-qa
      - preflight-reborn-webui-v2-google-oauth
    if: >
      always() &&
      needs.prepare-reborn-webui-v2-live-qa.result == 'success' &&
      (
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && (inputs.lane == 'all' || inputs.lane == 'reborn-webui-v2-live-qa'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard_id: qa-2-connect
            shard_name: QA 2A-2C
            cases: qa_2a_gmail_connect,qa_2b_calendar_connect,qa_2c_drive_connect
          - shard_id: qa-2-workflow
            shard_name: QA 2D-2F
            cases: qa_2d_calendar_prep_live_chat,qa_2e_calendar_prep_email_routine,qa_2f_calendar_prep_email_delivery
          - shard_id: qa-3
            shard_name: QA 3
            cases: qa_3a_slack_connect,qa_3b_endpoint_status_live_chat,qa_3c_endpoint_status_slack_routine,qa_3d_endpoint_status_slack_delivery
          - shard_id: qa-4
            shard_name: QA 4
            cases: qa_4a_gmail_connect,qa_4b_github_connect,qa_4c_github_release_live_chat,qa_4d_github_release_slack_routine,qa_4e_github_release_email_delivery
          - shard_id: qa-5
            shard_name: QA 5
            cases: qa_5a_slack_connect,qa_5b_drive_connect,qa_5c_strategy_doc_knowledge_base,qa_5d_slack_strategy_doc_answer
          - shard_id: qa-6-connect
            shard_name: QA 6A-6C
            cases: qa_6a_gmail_connect,qa_6b_sheets_connect,qa_6c_gmail_to_sheet_live_chat
          - shard_id: qa-6-workflow
            shard_name: QA 6D-6E
            cases: qa_6d_gmail_to_sheet_routine,qa_6e_gmail_to_sheet_delivery
          - shard_id: qa-7
            shard_name: QA 7
            cases: qa_7a_slack_product_channel_connect,qa_7b_sheets_connect,qa_7c_slack_bug_logger_routine,qa_7d_slack_bug_message_trigger,qa_7e_slack_bug_sheet_delivery
          - shard_id: qa-8-monitor
            shard_name: QA 8A-8C
            cases: qa_8a_slack_connect,qa_8b_hn_keyword_live_chat,qa_8c_hn_keyword_slack_routine
          - shard_id: qa-8-delivery
            shard_name: QA 8D
            cases: qa_8d_hn_keyword_slack_delivery
          # Automation delivery probes, in the 3-hourly cron rotation (the
          # delivery-routing fixes from #5898 are merged and live-verified
          # green). Guards regressions in: wrong-channel routine delivery,
          # duplicate DM delivery, raw Slack user ids leaking into digests,
          # and per-trigger delivery-target routing.
          - shard_id: qa-9
            shard_name: QA 9
            cases: qa_9a_slack_connect,qa_9b_routine_dm_delivery_exactly_once,qa_9c_slack_digest_names_not_ids,qa_9d_routine_per_trigger_delivery_target
          # Slack tool-correctness probes, in the 3-hourly cron rotation (the
          # tool-surface fixes from #5898 are merged and live-verified green).
          # Guards regressions in: self-attribution, status readback, thread
          # replies, membership honesty, error honesty, mention encoding,
          # last-sent recall, email hallucination, and raw-entity hygiene.
          - shard_id: qa-10
            shard_name: QA 10
            cases: qa_10a_slack_self_attribution,qa_10b_slack_ooo_status,qa_10c_slack_thread_replies,qa_10d_slack_channel_membership,qa_10e_slack_error_honesty,qa_10f_slack_mention_encoding,qa_10g_slack_last_message_sent,qa_10g_slack_last_message_sent_global,qa_10h_slack_email_hallucination_guard,qa_10i_slack_raw_entity_hygiene
    env:
      REBORN_WEBUI_V2_GOOGLE_CASES: >-
        qa_2a_gmail_connect,qa_2b_calendar_connect,qa_2c_drive_connect,qa_2d_calendar_prep_live_chat,qa_2e_calendar_prep_email_routine,qa_2f_calendar_prep_email_delivery,
        qa_4a_gmail_connect,qa_4e_github_release_email_delivery,
        qa_5b_drive_connect,qa_5c_strategy_doc_knowledge_base,qa_5d_slack_strategy_doc_answer,
        qa_6a_gmail_connect,qa_6b_sheets_connect,qa_6c_gmail_to_sheet_live_chat,qa_6d_gmail_to_sheet_routine,qa_6e_gmail_to_sheet_delivery,
        qa_7b_sheets_connect,qa_7c_slack_bug_logger_routine,qa_7e_slack_bug_sheet_delivery
      REBORN_WEBUI_V2_LIVE_QA_LLM_API_KEY_ENV: NEARAI_API_KEY
      REBORN_WEBUI_V2_LIVE_QA_LLM_PROVIDER_ID: nearai
      REBORN_WEBUI_V2_LIVE_QA_LLM_MODEL: ${{ vars.REBORN_WEBUI_V2_LIVE_QA_LLM_MODEL || 'deepseek-ai/DeepSeek-V4-Flash' }}
      REBORN_WEBUI_V2_LIVE_QA_LLM_JUDGE: ${{ vars.REBORN_WEBUI_V2_LIVE_QA_LLM_JUDGE || '1' }}
      REBORN_WEBUI_V2_LIVE_QA_LLM_JUDGE_MODEL: ${{ vars.REBORN_WEBUI_V2_LIVE_QA_LLM_JUDGE_MODEL || vars.REBORN_WEBUI_V2_LIVE_QA_LLM_MODEL || 'deepseek-ai/DeepSeek-V4-Flash' }}
      IRONCLAW_REBORN_GOOGLE_CLIENT_ID: ${{ secrets.IRONCLAW_REBORN_GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID || secrets.GOOGLE_OAUTH_CLIENT_ID }}
      IRONCLAW_REBORN_GOOGLE_OAUTH_REDIRECT_URI: ${{ vars.IRONCLAW_REBORN_GOOGLE_OAUTH_REDIRECT_URI || vars.GOOGLE_OAUTH_REDIRECT_URI }}
      IRONCLAW_REBORN_GOOGLE_HOSTED_DOMAIN_HINT: ${{ vars.IRONCLAW_REBORN_GOOGLE_HOSTED_DOMAIN_HINT || vars.GOOGLE_ALLOWED_HD }}
      REBORN_WEBUI_V2_LIVE_QA_SLACK_INSTALLATION_ID: ${{ vars.REBORN_WEBUI_V2_LIVE_QA_SLACK_INSTALLATION_ID }}
      REBORN_WEBUI_V2_LIVE_QA_SLACK_TEAM_ID: ${{ vars.REBORN_WEBUI_V2_LIVE_QA_SLACK_TEAM_ID }}
      REBORN_WEBUI_V2_LIVE_QA_SLACK_API_APP_ID: ${{ vars.REBORN_WEBUI_V2_LIVE_QA_SLACK_API_APP_ID }}
      REBORN_WEBUI_V2_LIVE_QA_SLACK_ROUTE_USER_ID: ${{ vars.REBORN_WEBUI_V2_LIVE_QA_SLACK_ROUTE_USER_ID }}
      REBORN_WEBUI_V2_LIVE_QA_SLACK_ROUTE_SUBJECT_USER_ID: ${{ vars.REBORN_WEBUI_V2_LIVE_QA_SLACK_ROUTE_SUBJECT_USER_ID }}
      REBORN_WEBUI_V2_LIVE_QA_SLACK_OAUTH_CLIENT_ID: ${{ vars.REBORN_WEBUI_V2_LIVE_QA_SLACK_OAUTH_CLIENT_ID }}
      LIVE_OPENAI_COMPATIBLE_BASE_URL: ${{ vars.LIVE_OPENAI_COMPATIBLE_BASE_URL || 'https://cloud-api.near.ai/v1' }}
      LIVE_OPENAI_COMPATIBLE_MODEL: ${{ vars.LIVE_OPENAI_COMPATIBLE_MODEL || 'Qwen/Qwen3.5-122B-A10B' }}
    steps:
      - name: Resolve Reborn WebUI v2 live QA cases
        id: resolve_reborn_webui_v2_cases
        shell: bash
        env:
          REQUESTED_CASES: ${{ github.event_name == 'schedule' && 'all' || inputs.cases || vars.REBORN_WEBUI_V2_LIVE_QA_CASES || 'all' }}
          DISPATCH_ONLY_SHARD: ${{ matrix.dispatch_only || false }}
          SHARD_CASES: ${{ matrix.cases }}
          ALL_SHARD_CASES: >-
            qa_2a_gmail_connect,qa_2b_calendar_connect,qa_2c_drive_connect,qa_2d_calendar_prep_live_chat,qa_2e_calendar_prep_email_routine,qa_2f_calendar_prep_email_delivery,
            qa_3a_slack_connect,qa_3b_endpoint_status_live_chat,qa_3c_endpoint_status_slack_routine,qa_3d_endpoint_status_slack_delivery,
            qa_4a_gmail_connect,qa_4b_github_connect,qa_4c_github_release_live_chat,qa_4d_github_release_slack_routine,qa_4e_github_release_email_delivery,
            qa_5a_slack_connect,qa_5b_drive_connect,qa_5c_strategy_doc_knowledge_base,qa_5d_slack_strategy_doc_answer,
            qa_6a_gmail_connect,qa_6b_sheets_connect,qa_6c_gmail_to_sheet_live_chat,qa_6d_gmail_to_sheet_routine,qa_6e_gmail_to_sheet_delivery,
            qa_7a_slack_product_channel_connect,qa_7b_sheets_connect,qa_7c_slack_bug_logger_routine,qa_7d_slack_bug_message_trigger,qa_7e_slack_bug_sheet_delivery,
            qa_8a_slack_connect,qa_8b_hn_keyword_live_chat,qa_8c_hn_keyword_slack_routine,qa_8d_hn_keyword_slack_delivery,
            qa_9a_slack_connect,qa_9b_routine_dm_delivery_exactly_once,qa_9c_slack_digest_names_not_ids,qa_9d_routine_per_trigger_delivery_target,
            qa_10a_slack_self_attribution,qa_10b_slack_ooo_status,qa_10c_slack_thread_replies,qa_10d_slack_channel_membership,qa_10e_slack_error_honesty,qa_10f_slack_mention_encoding,qa_10g_slack_last_message_sent,qa_10g_slack_last_message_sent_global,qa_10h_slack_email_hallucination_guard,qa_10i_slack_raw_entity_hygiene
        run: |
          set -euo pipefail
          if [[ "${DISPATCH_ONLY_SHARD}" == "true" && "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            echo "REBORN_WEBUI_V2_LIVE_QA_SKIP_SHARD=1" >> "${GITHUB_ENV}"
            echo "REBORN_WEBUI_V2_LIVE_QA_CASES_RESOLUTION=dispatch-only-shard" >> "${GITHUB_ENV}"
            echo "skip_shard=1" >> "${GITHUB_OUTPUT}"
            echo "Shard is dispatch_only; skipping on schedule."
            exit 0
          fi
          cases="$(echo "${REQUESTED_CASES:-}" | xargs)"
          if [[ -z "${cases}" || "${cases}" == "all" || "${cases}" == "ALL" || "${cases}" == "*" ]]; then
            if [[ "${DISPATCH_ONLY_SHARD}" == "true" ]]; then
              # dispatch_only shards run ONLY when one of their cases is
              # explicitly requested — a bare /canary or default dispatch
              # (cases=all) must not run an expected-red shard on an
              # unrelated PR.
              echo "REBORN_WEBUI_V2_LIVE_QA_SKIP_SHARD=1" >> "${GITHUB_ENV}"
              echo "REBORN_WEBUI_V2_LIVE_QA_CASES_RESOLUTION=dispatch-only-shard-default-cases" >> "${GITHUB_ENV}"
              echo "skip_shard=1" >> "${GITHUB_OUTPUT}"
              echo "Shard is dispatch_only and no shard case was explicitly requested; skipping."
              exit 0
            fi
            echo "CASES=${SHARD_CASES}" >> "${GITHUB_ENV}"
            echo "REBORN_WEBUI_V2_LIVE_QA_CASES_RESOLUTION=matrix-shard" >> "${GITHUB_ENV}"
            echo "skip_shard=0" >> "${GITHUB_OUTPUT}"
            echo "CASES=${cases:-<default>} requested; running shard cases: ${SHARD_CASES}"
          else
            selected=()
            IFS=',' read -ra requested_cases <<< "${cases}"
            IFS=',' read -ra shard_cases <<< "${SHARD_CASES}"
            IFS=',' read -ra all_cases <<< "${ALL_SHARD_CASES}"
            for requested in "${requested_cases[@]}"; do
              requested="$(echo "${requested}" | xargs)"
              [[ -n "${requested}" ]] || continue
              known=0
              for known_case in "${all_cases[@]}"; do
                known_case="$(echo "${known_case}" | xargs)"
                if [[ "${requested}" == "${known_case}" ]]; then
                  known=1
                  break
                fi
              done
              if [[ ${known} -ne 1 ]]; then
                echo "::error::Unknown Reborn WebUI v2 live QA case: ${requested}"
                exit 1
              fi
              for shard_case in "${shard_cases[@]}"; do
                if [[ "${requested}" == "${shard_case}" ]]; then
                  selected+=("${requested}")
                  break
                fi
              done
            done
            if [[ ${#selected[@]} -eq 0 ]]; then
              echo "REBORN_WEBUI_V2_LIVE_QA_SKIP_SHARD=1" >> "${GITHUB_ENV}"
              echo "REBORN_WEBUI_V2_LIVE_QA_CASES_RESOLUTION=requested-not-in-shard" >> "${GITHUB_ENV}"
              echo "skip_shard=1" >> "${GITHUB_OUTPUT}"
              echo "Requested cases do not belong to this shard; skipping."
            else
              joined="$(IFS=,; echo "${selected[*]}")"
              echo "CASES=${joined}" >> "${GITHUB_ENV}"
              echo "REBORN_WEBUI_V2_LIVE_QA_CASES_RESOLUTION=requested-filtered" >> "${GITHUB_ENV}"
              echo "skip_shard=0" >> "${GITHUB_OUTPUT}"
              echo "Running requested cases in this shard: ${joined}"
            fi
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: steps.resolve_reborn_webui_v2_cases.outputs.skip_shard != '1'
        with:
          persist-credentials: false
          ref: ${{ needs.prepare-reborn-webui-v2-live-qa.outputs.checkout_ref }}
      - name: Suppress Google cases after OAuth preflight failure
        id: filter_reborn_webui_v2_google_cases
        shell: bash
        env:
          RESOLVE_SKIP_SHARD: ${{ steps.resolve_reborn_webui_v2_cases.outputs.skip_shard }}
          GOOGLE_OAUTH_STATUS: ${{ needs.preflight-reborn-webui-v2-google-oauth.outputs.status }}
        run: |
          set -euo pipefail
          if [[ "${RESOLVE_SKIP_SHARD}" == "1" ]]; then
            echo "skip_shard=1" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [[ "${GOOGLE_OAUTH_STATUS}" == "healthy" ]]; then
            echo "skip_shard=0" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          python3 .github/scripts/google_oauth_cases.py \
            --mode suppress \
            --cases "${CASES:-}" \
            --google-cases "${REBORN_WEBUI_V2_GOOGLE_CASES}" \
            --status "${GOOGLE_OAUTH_STATUS:-unknown}" \
            --github-env "${GITHUB_ENV}" \
            --github-output "${GITHUB_OUTPUT}"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: >
          steps.filter_reborn_webui_v2_google_cases.outputs.skip_shard != '1' &&
          github.event_name == 'workflow_dispatch' &&
          inputs.target_ref != '' &&
          inputs.use_target_harness != true
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
          path: .canonical-live-qa-harness
      - name: Restore canonical Reborn WebUI v2 live QA harness
        if: >
          steps.filter_reborn_webui_v2_google_cases.outputs.skip_shard != '1' &&
          github.event_name == 'workflow_dispatch' &&
          inputs.target_ref != '' &&
          inputs.use_target_harness != true
        run: |
          set -euo pipefail
          harness_ref="$(git -C .canonical-live-qa-harness rev-parse HEAD)"
          rm -rf scripts/reborn_webui_v2_live_qa scripts/live-canary
          cp -a .canonical-live-qa-harness/scripts/reborn_webui_v2_live_qa scripts/
          cp -a .canonical-live-qa-harness/scripts/live-canary scripts/
          cp .canonical-live-qa-harness/tests/e2e/pyproject.toml tests/e2e/pyproject.toml
          mkdir -p tests/e2e/ironclaw_e2e.egg-info
          cp .canonical-live-qa-harness/tests/e2e/ironclaw_e2e.egg-info/PKG-INFO tests/e2e/ironclaw_e2e.egg-info/PKG-INFO
          cp .canonical-live-qa-harness/tests/e2e/ironclaw_e2e.egg-info/requires.txt tests/e2e/ironclaw_e2e.egg-info/requires.txt
          rm -rf .canonical-live-qa-harness
          echo "REBORN_WEBUI_V2_LIVE_QA_HARNESS_REF=${harness_ref}" >> "${GITHUB_ENV}"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        if: steps.filter_reborn_webui_v2_google_cases.outputs.skip_shard != '1'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/e2e/pyproject.toml

      - name: Cache Playwright browsers
        if: steps.filter_reborn_webui_v2_google_cases.outputs.skip_shard != '1'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests/e2e/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Download prepared Reborn WebUI v2 binary
        if: steps.filter_reborn_webui_v2_google_cases.outputs.skip_shard != '1'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: prepared-reborn-webui-v2-binary-${{ needs.prepare-reborn-webui-v2-live-qa.outputs.checkout_ref }}
          path: .live-qa-binary

      - name: Verify and install prepared Reborn WebUI v2 binary
        if: steps.filter_reborn_webui_v2_google_cases.outputs.skip_shard != '1'
        env:
          TARGET_REF: ${{ needs.prepare-reborn-webui-v2-live-qa.outputs.checkout_ref }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${TARGET_REF}"
          python3 scripts/live-canary/validate_reborn_binary_artifact.py \
            .live-qa-binary \
            "${TARGET_REF}" \
            "webui-v2-beta,slack-v2-host-beta"
          mkdir -p target/debug
          tar -C target/debug -xzf .live-qa-binary/ironclaw-reborn.tar.gz
          chmod 755 target/debug/ironclaw target/debug/ironclaw-reborn
      - name: Materialize Reborn WebUI v2 live QA sensitive secrets to files
        if: steps.filter_reborn_webui_v2_google_cases.outputs.skip_shard != '1'
        shell: bash
        env:
          NEARAI_API_KEY: ${{ secrets.NEARAI_API_KEY || secrets.LIVE_OPENAI_COMPATIBLE_API_KEY }}
          LIVE_OPENAI_COMPATIBLE_API_KEY: ${{ secrets.LIVE_OPENAI_COMPATIBLE_API_KEY }}
          IRONCLAW_REBORN_SLACK_SIGNING_SECRET: ${{ secrets.IRONCLAW_REBORN_SLACK_SIGNING_SECRET }}
          IRONCLAW_REBORN_SLACK_BOT_TOKEN: ${{ secrets.IRONCLAW_REBORN_SLACK_BOT_TOKEN }}
          REBORN_WEBUI_V2_LIVE_QA_SLACK_OAUTH_CLIENT_SECRET: ${{ secrets.REBORN_WEBUI_V2_LIVE_QA_SLACK_OAUTH_CLIENT_SECRET }}
          AUTH_LIVE_SLACK_ACCESS_TOKEN: ${{ secrets.AUTH_LIVE_SLACK_ACCESS_TOKEN || secrets.AUTH_LIVE_SLACK_USER_TOKEN || secrets.REBORN_WEBUI_V2_LIVE_QA_SLACK_USER_TOKEN }}
          # Optional second HUMAN Slack identity for the QA 10 shard (future
          # dedicated canary user). Arms that strictly need it assert and go
          # red with a distinct precondition message when it is absent.
          AUTH_LIVE_SLACK_SECOND_USER_TOKEN: ${{ secrets.AUTH_LIVE_SLACK_SECOND_USER_TOKEN || '' }}
          IRONCLAW_REBORN_GOOGLE_CLIENT_SECRET: ${{ secrets.IRONCLAW_REBORN_GOOGLE_CLIENT_SECRET || secrets.GOOGLE_CLIENT_SECRET || secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          AUTH_LIVE_GOOGLE_ACCESS_TOKEN: ${{ secrets.AUTH_LIVE_GOOGLE_ACCESS_TOKEN }}
          AUTH_LIVE_GOOGLE_REFRESH_TOKEN: ${{ secrets.AUTH_LIVE_GOOGLE_REFRESH_TOKEN }}
          AUTH_LIVE_GITHUB_TOKEN: ${{ secrets.AUTH_LIVE_GITHUB_TOKEN || secrets.LIVE_CANARY_GITHUB_TOKEN || github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.LIVE_CANARY_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET || secrets.LIVE_CANARY_TELEGRAM_WEBHOOK_SECRET }}
        run: |
          set +x
          set -euo pipefail
          secret_dir="${RUNNER_TEMP}/reborn-webui-v2-live-qa-secrets"
          mkdir -p "${secret_dir}"
          chmod 700 "${secret_dir}"
          write_secret() {
            local name="$1"
            local value="$2"
            if [[ -z "${value}" ]]; then
              return 0
            fi
            local path="${secret_dir}/${name}"
            printf '%s' "${value}" > "${path}"
            chmod 600 "${path}"
            echo "${name}_PATH=${path}" >> "${GITHUB_ENV}"
          }
          write_secret "NEARAI_API_KEY" "${NEARAI_API_KEY:-}"
          write_secret "LIVE_OPENAI_COMPATIBLE_API_KEY" "${LIVE_OPENAI_COMPATIBLE_API_KEY:-}"
          write_secret "IRONCLAW_REBORN_SLACK_SIGNING_SECRET" "${IRONCLAW_REBORN_SLACK_SIGNING_SECRET:-}"
          write_secret "IRONCLAW_REBORN_SLACK_BOT_TOKEN" "${IRONCLAW_REBORN_SLACK_BOT_TOKEN:-}"
          write_secret "REBORN_WEBUI_V2_LIVE_QA_SLACK_OAUTH_CLIENT_SECRET" "${REBORN_WEBUI_V2_LIVE_QA_SLACK_OAUTH_CLIENT_SECRET:-}"
          write_secret "AUTH_LIVE_SLACK_ACCESS_TOKEN" "${AUTH_LIVE_SLACK_ACCESS_TOKEN:-}"
          write_secret "AUTH_LIVE_SLACK_SECOND_USER_TOKEN" "${AUTH_LIVE_SLACK_SECOND_USER_TOKEN:-}"
          write_secret "IRONCLAW_REBORN_GOOGLE_CLIENT_SECRET" "${IRONCLAW_REBORN_GOOGLE_CLIENT_SECRET:-}"
          write_secret "AUTH_LIVE_GOOGLE_ACCESS_TOKEN" "${AUTH_LIVE_GOOGLE_ACCESS_TOKEN:-}"
          write_secret "AUTH_LIVE_GOOGLE_REFRESH_TOKEN" "${AUTH_LIVE_GOOGLE_REFRESH_TOKEN:-}"
          write_secret "AUTH_LIVE_GITHUB_TOKEN" "${AUTH_LIVE_GITHUB_TOKEN:-}"
          write_secret "TELEGRAM_BOT_TOKEN" "${TELEGRAM_BOT_TOKEN:-}"
          write_secret "TELEGRAM_WEBHOOK_SECRET" "${TELEGRAM_WEBHOOK_SECRET:-}"
      - name: Mint fresh Google OAuth access token for selected cases
        id: mint_reborn_webui_v2_google_token
        if: steps.filter_reborn_webui_v2_google_cases.outputs.skip_shard != '1'
        shell: bash
        run: |
          set +x
          set -euo pipefail
          if ! python3 .github/scripts/google_oauth_cases.py \
            --mode needs-google --cases "${CASES}" \
            --google-cases "${REBORN_WEBUI_V2_GOOGLE_CASES}"; then
            echo "skip_shard=0" >> "${GITHUB_OUTPUT}"
            echo "Selected cases do not require Google OAuth."
            exit 0
          fi
          access_token_path="${RUNNER_TEMP}/reborn-webui-v2-live-qa-secrets/AUTH_LIVE_GOOGLE_ACCESS_TOKEN"
          refresh_status_path="${RUNNER_TEMP}/reborn-webui-v2-google-refresh-output"
          if python3 scripts/reborn_webui_v2_live_qa/refresh_google_oauth.py \
            --access-token-path "${access_token_path}" \
            --github-output "${refresh_status_path}"; then
            echo "AUTH_LIVE_GOOGLE_ACCESS_TOKEN_PATH=${access_token_path}" >> "${GITHUB_ENV}"
            echo "skip_shard=0" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          refresh_status="$(sed -n 's/^status=//p' "${refresh_status_path}" | tail -1)"
          python3 .github/scripts/google_oauth_cases.py \
            --mode suppress \
            --cases "${CASES}" \
            --google-cases "${REBORN_WEBUI_V2_GOOGLE_CASES}" \
            --status "${refresh_status:-unknown}" \
            --github-env "${GITHUB_ENV}" \
            --github-output "${GITHUB_OUTPUT}"
      - name: Run Reborn WebUI v2 live QA lane
        if: >
          steps.filter_reborn_webui_v2_google_cases.outputs.skip_shard != '1' &&
          steps.mint_reborn_webui_v2_google_token.outputs.skip_shard != '1'
        env:
          LANE: reborn-webui-v2-live-qa
          PROVIDER: reborn-webui-v2-${{ matrix.shard_id }}
          COMMAND_TIMEOUT: 90m
          PLAYWRIGHT_INSTALL: with-deps
          REBORN_WEBUI_V2_LIVE_QA_BUILD_SOURCE: ${{ needs.prepare-reborn-webui-v2-live-qa.outputs.build_source }}
          SKIP_BUILD: "1"
        run: scripts/live-canary/run.sh
      - name: Scrub artifacts
        if: always() && steps.filter_reborn_webui_v2_google_cases.outputs.skip_shard != '1'
        run: scripts/live-canary/scrub-artifacts.sh artifacts/live-canary
      - name: Upload artifacts
        if: always() && steps.filter_reborn_webui_v2_google_cases.outputs.skip_shard != '1'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-canary-reborn-webui-v2-live-qa-${{ matrix.shard_id }}
          path: artifacts/live-canary/
          if-no-files-found: ignore
          retention-days: 14

  persona-rotating:
    name: Rotating Persona Live
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.lane == 'all' || inputs.lane == 'persona-rotating')
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      LLM_BACKEND: anthropic
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.LIVE_ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
      # Real third-party credentials forwarded into the persona harness.
      # The harness reads these env vars per
      # tests/e2e_live_personas.rs::PERSONA_CREDENTIALS — present →
      # real API call lands; absent → dummy fallback satisfies the
      # auth pre-flight and the agent recovers via workspace tools.
      # Add each secret in repo settings (Settings → Secrets and
      # variables → Actions) if you want the lane to exercise that
      # integration end-to-end.
      LIVE_CANARY_GITHUB_TOKEN: ${{ secrets.LIVE_CANARY_GITHUB_TOKEN }}
      LIVE_CANARY_GOOGLE_OAUTH_TOKEN: ${{ secrets.LIVE_CANARY_GOOGLE_OAUTH_TOKEN }}
      LIVE_CANARY_SLACK_BOT_TOKEN: ${{ secrets.LIVE_CANARY_SLACK_BOT_TOKEN }}
      LIVE_CANARY_TELEGRAM_BOT_TOKEN: ${{ secrets.LIVE_CANARY_TELEGRAM_BOT_TOKEN }}
      LIVE_CANARY_COMPOSIO_API_KEY: ${{ secrets.LIVE_CANARY_COMPOSIO_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: live-canary-persona-rotating
      - name: Setup OVH sccache
        uses: ./.github/actions/setup-sccache-dist
        with:
          scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
          cache-ssh-host: ${{ vars.SCCACHE_CACHE_SSH_HOST }}
          cache-ssh-user: ${{ vars.SCCACHE_CACHE_SSH_USER }}
          cache-ssh-port: ${{ vars.SCCACHE_CACHE_SSH_PORT }}
          cache-ssh-private-key: ${{ secrets.SCCACHE_CACHE_SSH_PRIVATE_KEY }}
          cache-ssh-known-hosts: ${{ secrets.SCCACHE_CACHE_SSH_KNOWN_HOSTS }}
          redis-password: ${{ secrets.SCCACHE_REDIS_PASSWORD }}
      - name: Install cargo-component
        run: cargo install cargo-component --locked || true
      - name: Build WASM extensions
        run: ./scripts/build-wasm-extensions.sh
      - name: Run rotating persona lane
        env:
          LANE: persona-rotating
          SCENARIO: ${{ inputs.scenario || 'auto' }}
          PROVIDER: anthropic
          COMMAND_TIMEOUT: 150m
          LIBSQL_PATH: ${{ runner.temp }}/ironclaw-live-persona.db
        run: scripts/live-canary/run.sh
      - name: Scrub artifacts
        if: always()
        run: scripts/live-canary/scrub-artifacts.sh artifacts/live-canary
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-canary-persona-rotating
          path: artifacts/live-canary/
          retention-days: 14

  private-oauth:
    name: Private OAuth Live
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.lane == 'all' || inputs.lane == 'private-oauth')
    runs-on: [self-hosted, ironclaw-live]
    timeout-minutes: 120
    env:
      LANE: private-oauth
      PROVIDER: dedicated-runner
      COMMAND_TIMEOUT: 60m
      STRICT_ARTIFACT_SCRUB: "true"
    steps:
      - name: Preflight disk space
        # The only self-hosted runner the canary uses. Nothing in this
        # workflow cleans ~/.cargo, ~/.rustup, or runner _diag between
        # jobs, so a wedged disk shows up as opaque mid-build failures
        # we can't see (test-output.log isn't uploaded). Fail loudly
        # with a clear marker instead — at least 10 GiB free on /.
        run: |
          df -h /
          avail_kb=$(df --output=avail / | tail -1 | tr -d ' ')
          min_kb=$((10 * 1024 * 1024))
          if [ "$avail_kb" -lt "$min_kb" ]; then
            echo "::error::Self-hosted runner low on disk: ${avail_kb} KiB available, need ${min_kb} KiB (~10 GiB)."
            exit 1
          fi
          echo "Disk OK: ${avail_kb} KiB available on /."
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip2
      - name: Install cargo-component
        run: cargo install cargo-component --locked || true
      - name: Build WASM extensions
        run: ./scripts/build-wasm-extensions.sh
      - name: Run private OAuth lane
        run: scripts/live-canary/run.sh
      - name: Scrub artifacts
        if: always()
        run: scripts/live-canary/scrub-artifacts.sh artifacts/live-canary
      - name: Upload summaries only
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-canary-private-oauth-summary
          # results.json is emitted by scripts/live-canary/emit_results_json.py
          # and contains only test names + outcomes + bounded panic messages
          # — no URLs, tokens, or payloads — so it is scrub-safe to upload
          # even under STRICT_ARTIFACT_SCRUB=true.
          path: |
            artifacts/live-canary/**/summary.md
            artifacts/live-canary/**/env-summary.txt
            artifacts/live-canary/**/trace-fixture-status.txt
            artifacts/live-canary/**/scrub-matches.txt
            artifacts/live-canary/**/results.json
          retention-days: 7

  provider-matrix:
    name: Provider Matrix (${{ matrix.provider }})
    if: >
      github.event_name == 'workflow_dispatch' && (inputs.lane == 'all' || inputs.lane == 'provider-matrix')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: anthropic
            test_target: e2e_live
            scenario: zizmor_scan
          - provider: openai-compatible
            test_target: e2e_live_mission
            scenario: mission_daily_news_digest_with_followup
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: live-canary-provider-${{ matrix.provider }}
      - name: Setup OVH sccache
        uses: ./.github/actions/setup-sccache-dist
        with:
          scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
          cache-ssh-host: ${{ vars.SCCACHE_CACHE_SSH_HOST }}
          cache-ssh-user: ${{ vars.SCCACHE_CACHE_SSH_USER }}
          cache-ssh-port: ${{ vars.SCCACHE_CACHE_SSH_PORT }}
          cache-ssh-private-key: ${{ secrets.SCCACHE_CACHE_SSH_PRIVATE_KEY }}
          cache-ssh-known-hosts: ${{ secrets.SCCACHE_CACHE_SSH_KNOWN_HOSTS }}
          redis-password: ${{ secrets.SCCACHE_REDIS_PASSWORD }}
      - name: Install cargo-component
        run: cargo install cargo-component --locked || true
      - name: Build WASM extensions
        run: ./scripts/build-wasm-extensions.sh
      - name: Configure Anthropic provider
        if: matrix.provider == 'anthropic'
        env:
          LIVE_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LIVE_ANTHROPIC_MODEL: ${{ vars.LIVE_ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
        run: |
          echo "LLM_BACKEND=anthropic" >> "${GITHUB_ENV}"
          echo "ANTHROPIC_MODEL=${LIVE_ANTHROPIC_MODEL}" >> "${GITHUB_ENV}"
          echo "ANTHROPIC_API_KEY=${LIVE_ANTHROPIC_API_KEY}" >> "${GITHUB_ENV}"
      - name: Configure OpenAI-compatible provider
        if: matrix.provider == 'openai-compatible'
        env:
          LIVE_OPENAI_COMPATIBLE_API_KEY: ${{ secrets.LIVE_OPENAI_COMPATIBLE_API_KEY }}
          LIVE_OPENAI_COMPATIBLE_BASE_URL: ${{ vars.LIVE_OPENAI_COMPATIBLE_BASE_URL }}
          LIVE_OPENAI_COMPATIBLE_MODEL: ${{ vars.LIVE_OPENAI_COMPATIBLE_MODEL }}
        run: |
          echo "LLM_BACKEND=openai_compatible" >> "${GITHUB_ENV}"
          echo "LLM_API_KEY=${LIVE_OPENAI_COMPATIBLE_API_KEY}" >> "${GITHUB_ENV}"
          echo "LLM_BASE_URL=${LIVE_OPENAI_COMPATIBLE_BASE_URL}" >> "${GITHUB_ENV}"
          echo "LLM_MODEL=${LIVE_OPENAI_COMPATIBLE_MODEL}" >> "${GITHUB_ENV}"
      - name: Run provider matrix lane
        env:
          LANE: provider-matrix
          PROVIDER: ${{ matrix.provider }}
          PROVIDER_TEST_TARGET: ${{ matrix.test_target }}
          SCENARIO: ${{ inputs.scenario || matrix.scenario }}
          COMMAND_TIMEOUT: 90m
          LIBSQL_PATH: ${{ runner.temp }}/ironclaw-live-provider-${{ matrix.provider }}.db
        run: scripts/live-canary/run.sh
      - name: Scrub artifacts
        if: always()
        run: scripts/live-canary/scrub-artifacts.sh artifacts/live-canary
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-canary-provider-${{ matrix.provider }}
          path: artifacts/live-canary/
          retention-days: 14

  release-public-full:
    name: Release Public Full Live
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.lane == 'all' || inputs.lane == 'release-public-full'))
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      LLM_BACKEND: anthropic
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.LIVE_ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: live-canary-release-public-full
      - name: Setup OVH sccache
        uses: ./.github/actions/setup-sccache-dist
        with:
          scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
          cache-ssh-host: ${{ vars.SCCACHE_CACHE_SSH_HOST }}
          cache-ssh-user: ${{ vars.SCCACHE_CACHE_SSH_USER }}
          cache-ssh-port: ${{ vars.SCCACHE_CACHE_SSH_PORT }}
          cache-ssh-private-key: ${{ secrets.SCCACHE_CACHE_SSH_PRIVATE_KEY }}
          cache-ssh-known-hosts: ${{ secrets.SCCACHE_CACHE_SSH_KNOWN_HOSTS }}
          redis-password: ${{ secrets.SCCACHE_REDIS_PASSWORD }}
      - name: Install cargo-component
        run: cargo install cargo-component --locked || true
      - name: Build WASM extensions
        run: ./scripts/build-wasm-extensions.sh
      - name: Pre-install zizmor
        run: pip install zizmor || true
      - name: Run release public full lane
        env:
          LANE: release-public-full
          PROVIDER: anthropic
          COMMAND_TIMEOUT: 300m
          LIBSQL_PATH: ${{ runner.temp }}/ironclaw-live-release.db
        run: scripts/live-canary/run.sh
      - name: Scrub artifacts
        if: always()
        run: scripts/live-canary/scrub-artifacts.sh artifacts/live-canary
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-canary-release-public-full
          path: artifacts/live-canary/
          retention-days: 30

  upgrade-canary:
    name: Upgrade Canary
    if: >
      (github.event_name == 'workflow_dispatch' && (inputs.lane == 'all' || inputs.lane == 'upgrade-canary'))
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: live-canary-upgrade
      - name: Setup OVH sccache
        uses: ./.github/actions/setup-sccache-dist
        with:
          scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
          cache-ssh-host: ${{ vars.SCCACHE_CACHE_SSH_HOST }}
          cache-ssh-user: ${{ vars.SCCACHE_CACHE_SSH_USER }}
          cache-ssh-port: ${{ vars.SCCACHE_CACHE_SSH_PORT }}
          cache-ssh-private-key: ${{ secrets.SCCACHE_CACHE_SSH_PRIVATE_KEY }}
          cache-ssh-known-hosts: ${{ secrets.SCCACHE_CACHE_SSH_KNOWN_HOSTS }}
          redis-password: ${{ secrets.SCCACHE_REDIS_PASSWORD }}
      - name: Run upgrade canary lane
        env:
          LANE: upgrade-canary
          PROVIDER: upgrade
          PREVIOUS_REF: ${{ inputs.previous_ref }}
          CURRENT_REF: ${{ github.sha }}
          COMMAND_TIMEOUT: 150m
        run: scripts/live-canary/run.sh
      - name: Scrub artifacts
        if: always()
        run: scripts/live-canary/scrub-artifacts.sh artifacts/live-canary
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-canary-upgrade
          path: artifacts/live-canary/
          retention-days: 30

  canary-report:
    name: Canary Report
    needs:
      - auth-smoke
      - auth-full
      - auth-channels
      - auth-live-seeded
      - auth-browser-consent
      - workflow-canary
      - preflight-reborn-webui-v2-google-oauth
      - reborn-webui-v2-live-qa
      - deterministic-replay
      - public-smoke
      - persona-rotating
      - private-oauth
      - provider-matrix
      - release-public-full
      - upgrade-canary
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Download all lane artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          # Each upstream lane uploads to `live-canary-<lane>` / `live-canary-provider-<provider>`.
          # Merging into a single artifacts/live-canary/ tree lets notify_slack.py
          # walk the <lane>/<provider>/<timestamp>/ layout it already expects.
          pattern: live-canary-*
          path: artifacts/live-canary
          merge-multiple: true
      - name: Generate and post Slack report
        # Notifier exits 0 even on Slack/Haiku failure (see
        # notify_slack.py docstring) so a flaky webhook can't fail the
        # whole canary run. Gated on schedule + workflow_dispatch only —
        # PR-triggered runs (if any) skip the post to keep noise out of
        # the channel.
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CANARY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          CANARY_TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || '' }}
          CANARY_TARGET_PR: ${{ github.event_name == 'workflow_dispatch' && inputs.target_pr || '' }}
          CANARY_TARGET_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || '' }}
          CANARY_TRIGGER_CONTEXT: ${{ github.event_name == 'workflow_dispatch' && inputs.trigger_context || '' }}
          REBORN_GOOGLE_OAUTH_PREFLIGHT_STATUS: ${{ needs.preflight-reborn-webui-v2-google-oauth.outputs.status }}
          CANARY_CREATE_ISSUES: "0"
          CANARY_POST_PR_COMMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.target_pr != '' && '1' || '0' }}
        run: |
          # The notifier is intentionally side-effect-light: it exits 0 even on
          # failure so the canary run's overall status isn't masked by a flaky
          # notification path.
          python3 scripts/live-canary/notify_slack.py \
            --artifacts-dir artifacts/live-canary
