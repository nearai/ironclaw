name: OVH Runner Benchmark

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA or ref to benchmark
        required: false
        type: string

permissions:
  contents: read

env:
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  github-hosted-gateway-build:
    name: GitHub-hosted gateway build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ovh-runner-benchmark-gateway-smoke
          save-if: false

      - name: Setup OVH sccache cache
        uses: ./.github/actions/setup-sccache-dist
        with:
          cache-ssh-host: ${{ vars.SCCACHE_CACHE_SSH_HOST }}
          cache-ssh-user: ${{ vars.SCCACHE_CACHE_SSH_USER }}
          cache-ssh-port: ${{ vars.SCCACHE_CACHE_SSH_PORT }}
          cache-ssh-private-key: ${{ secrets.SCCACHE_CACHE_SSH_PRIVATE_KEY }}
          cache-ssh-known-hosts: ${{ secrets.SCCACHE_CACHE_SSH_KNOWN_HOSTS }}
          redis-password: ${{ secrets.SCCACHE_REDIS_PASSWORD }}

      - id: build
        name: Build ironclaw with libSQL
        run: |
          start="$(date +%s)"
          cargo build --no-default-features --features libsql
          end="$(date +%s)"
          elapsed="$((end - start))"
          echo "build_seconds=${elapsed}" >> "$GITHUB_OUTPUT"
          printf '### GitHub-hosted gateway build\n\n- Build step: %ss\n' "${elapsed}" >> "$GITHUB_STEP_SUMMARY"

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  ovh-gateway-build:
    name: OVH gateway build
    runs-on: [self-hosted, Linux, X64, ovh-benchmark]
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ovh-runner-benchmark-gateway-smoke
          save-if: false

      - name: Setup OVH sccache cache
        uses: ./.github/actions/setup-sccache-dist
        with:
          cache-ssh-host: ${{ vars.SCCACHE_CACHE_SSH_HOST }}
          cache-ssh-user: ${{ vars.SCCACHE_CACHE_SSH_USER }}
          cache-ssh-port: ${{ vars.SCCACHE_CACHE_SSH_PORT }}
          cache-ssh-private-key: ${{ secrets.SCCACHE_CACHE_SSH_PRIVATE_KEY }}
          cache-ssh-known-hosts: ${{ secrets.SCCACHE_CACHE_SSH_KNOWN_HOSTS }}
          redis-password: ${{ secrets.SCCACHE_REDIS_PASSWORD }}

      - id: build
        name: Build ironclaw with libSQL
        run: |
          start="$(date +%s)"
          cargo build --no-default-features --features libsql
          end="$(date +%s)"
          elapsed="$((end - start))"
          echo "build_seconds=${elapsed}" >> "$GITHUB_OUTPUT"
          printf '### OVH gateway build\n\n- Build step: %ss\n' "${elapsed}" >> "$GITHUB_STEP_SUMMARY"

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
