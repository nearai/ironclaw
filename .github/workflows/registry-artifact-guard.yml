name: Registry Artifact Guard

on:
  pull_request:
    paths:
      - 'registry/**/*.json'
  push:
    branches:
      - staging
    paths:
      - 'registry/**/*.json'

jobs:
  validate-registry-artifacts:
    name: Validate Registry Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate artifact URLs and checksums
        run: ./scripts/check-registry-artifacts.sh
