# Slash-command dispatcher for nearai-bench on PR comments. A maintainer
# (write/maintain/admin permission) comments `/benchmark <suite>`
# (optionally `--model <id>` and/or `--framework <ironclaw|ironclaw-reborn>`)
# on a PR; this workflow validates auth,
# parses the command, resolves the PR head SHA, reacts with 🚀, then
# triggers nearai/benchmarks's bench-pr-reusable.yml workflow (which builds
# the harness against the PR's ironclaw SHA, runs the suite, compares
# against a baseline, and posts a markdown comment back here).
#
# Setup / usage docs:
# https://github.com/nearai/benchmarks/blob/main/docs/ci/README.md
#
# nearai/benchmarks is a PRIVATE repo (since 2026-07-22, PR #291). A
# cross-repo reusable-workflow `uses:` call (the previous approach here) is
# structurally incapable of working for a public caller -> private callee:
# a private repo's Actions "Access" setting can only ever grant access to
# OTHER PRIVATE repos in the org ("Access is allowed only from private
# repositories" per GitHub's own docs) — nearai/ironclaw is public, so no
# access-level setting on the benchmarks side can fix this while ironclaw
# stays public. (Confirmed: every `/benchmark` run failed pre-flight with
# 0 jobs / `referenced_workflows: []` from ~2026-07-21 onward.)
#
# Cross-repo `workflow_dispatch` triggering (this workflow's `bench` job)
# is a different, unrestricted GitHub mechanism — the same as a human
# clicking "Run workflow" on that repo — gated only on the calling token
# having `actions: write` there. bench-pr-reusable.yml already declares a
# matching `workflow_dispatch:` trigger (same inputs) for exactly this.
# The triggered run posts its own result comment back to this PR directly
# (via pr-repo/pr-number) using nearai/benchmarks' own secrets — nothing
# needs forwarding from here, so `BENCHMARKS_DISPATCH_TOKEN` (a
# fine-grained PAT, `actions: write` scoped to nearai/benchmarks only) is
# the only new credential this side needs.

name: nearai-bench

on:
  issue_comment:
    types: [created]

# Minimum surface for the `parse` job's own steps (gh pr view/comment,
# reactions). The `bench` job below overrides this down to `contents: read`
# — it only dispatches a workflow_dispatch call with an explicit PAT, it
# doesn't need any of this workflow's own GITHUB_TOKEN writes.
#
# `pull-requests: write` (not just `issues: write`) is required because
# GitHub's reactions endpoint for PR-issue-comments rejects an
# `issues: write`-only GITHUB_TOKEN with `403 Resource not accessible by
# integration`, despite the docs at
# https://docs.github.com/rest/reactions/reactions#create-reaction-for-an-issue-comment
# listing only `issues: write`. Observed in
# https://github.com/nearai/ironclaw/actions/runs/26197185339 (the
# canary on PR #3834 that found this bug).
permissions:
  pull-requests: write  # gh pr view + gh pr comment + reactions on PR comments
  issues: write         # belt-and-suspenders; also covers parse-error comment
  contents: read

jobs:
  parse:
    # Tightened from `startsWith(body, '/benchmark')` to whole-word
    # match — `/benchmarking-something` no longer enters the parse path.
    if: >-
      github.event.issue.pull_request != null
      && (
        startsWith(github.event.comment.body, '/benchmark ')
        || github.event.comment.body == '/benchmark'
      )
    runs-on: ubuntu-latest
    outputs:
      suite: ${{ steps.parse.outputs.suite }}
      model: ${{ steps.parse.outputs.model }}
      framework: ${{ steps.parse.outputs.framework }}
      head_sha: ${{ steps.parse.outputs.head_sha }}
      authorized: ${{ steps.auth.outputs.authorized }}
      # "true" only for same-repo PRs. Fork PRs run untrusted code at compile
      # time (build scripts/proc macros), so we must NOT expose sccache creds to
      # them — they'd be readable from ~/.config/sccache/config during cargo build.
      trusted: ${{ steps.parse.outputs.trusted }}
    steps:
      - name: Check commenter has write permission
        id: auth
        # SHA-pinned to v7.0.1 to match the rest of this repo's workflows.
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.0.1
        with:
          script: |
            // `getCollaboratorPermissionLevel` throws 404 for users who
            // aren't collaborators at all (external contributors), and we
            // want to silently drop those rather than fail the workflow
            // with a noisy red run. Rethrow anything else.
            let permission = 'none';
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.payload.comment.user.login,
              });
              permission = data.permission;
            } catch (err) {
              if (err.status !== 404) throw err;
              // 404 → not a collaborator → unauthorized.
            }
            const ok = ['admin', 'write', 'maintain'].includes(permission);
            core.setOutput('authorized', ok ? 'yes' : 'no');
            if (!ok) {
              core.notice(`Comment author @${context.payload.comment.user.login} is not authorized to trigger benchmarks (permission: ${permission}).`);
            }

      - name: Parse command
        id: parse
        if: steps.auth.outputs.authorized == 'yes'
        env:
          BODY: ${{ github.event.comment.body }}
          PR: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # nearai/benchmarks is private, so reading its suites/ contents
          # below (an ironclaw-repo-scoped GITHUB_TOKEN can't see another
          # private repo) needs the same PAT the `bench` job uses to
          # dispatch — it must also carry Contents: Read-only on
          # nearai/benchmarks (in addition to Actions: Read and write) for
          # this specific lookup. Scoped to just those two `gh api` calls
          # below via a per-command GH_TOKEN override — everything else in
          # this step (gh pr view/comment on THIS repo) still uses the
          # ambient GITHUB_TOKEN above, since this PAT has no access to
          # nearai/ironclaw at all.
          BENCH_GH_TOKEN: ${{ secrets.BENCHMARKS_DISPATCH_TOKEN }}
          # Ref on nearai/benchmarks used to validate the requested suite
          # exists. Must match the ref the `bench` job actually dispatches
          # against so the pre-dispatch check gives the same answer as the
          # dispatched workflow. That dispatch targets `--ref main`, so a
          # pinned SHA here drifts stale and rejects suites that already exist
          # on main (e.g. pinchbench26, officeqa, terminal-bench-2). Track
          # `main` so the two stay in lock-step.
          BENCH_PIN: main
        run: |
          set -euo pipefail
          # Grammar: /benchmark <suite> [--model <model-id>] [--framework <ironclaw|ironclaw-reborn>]
          #   <suite>     first token after the command, [A-Za-z0-9_-]+
          #   --model     [A-Za-z0-9_./:-]+ (allows openrouter-style "vendor/model")
          #   --framework ironclaw (default) | ironclaw-reborn
          # The two flags may appear in either order. Newlines/tabs are
          # normalised to single spaces so a multi-line comment still parses.
          USAGE=$'Usage: `/benchmark <suite> [--model <model-id>] [--framework ironclaw|ironclaw-reborn]`\n\nExample: `/benchmark ironclaw-smoke --framework ironclaw-reborn`'
          body_norm=$(printf '%s' "$BODY" | tr '\n\t' '  ' | tr -s ' ')
          suite=$(printf '%s' "$body_norm" | sed -nE 's@^/benchmark[[:space:]]+([A-Za-z0-9_-]+).*@\1@p')
          model=$(printf '%s' "$body_norm" | sed -nE 's@.*--model[[:space:]]+([A-Za-z0-9_./:-]+).*@\1@p')
          framework=$(printf '%s' "$body_norm" | sed -nE 's@.*--framework[[:space:]]+([A-Za-z0-9_-]+).*@\1@p')
          if [ -z "$suite" ]; then
            # User-input error — post a helpful reply and exit cleanly
            # (exit 0 keeps the Actions tab green; bad syntax isn't infra
            # failure).
            gh pr comment "$PR" --repo "$REPO" --body "Could not parse \`/benchmark\` command."$'\n\n'"$USAGE"
            exit 0
          fi
          # Reject unrecognised --flags so a typo (e.g. --frmework) fails
          # loudly instead of silently falling back to the defaults.
          unknown_flag=$(printf '%s' "$body_norm" | grep -oE -- '--[A-Za-z0-9_-]+' | grep -vE '^--(model|framework)$' | head -1 || true)
          if [ -n "$unknown_flag" ]; then
            gh pr comment "$PR" --repo "$REPO" --body "Unknown option \`${unknown_flag}\`."$'\n\n'"$USAGE"
            exit 0
          fi
          # Validate the framework against the allowlist. Empty = unset =
          # reusable workflow's default (ironclaw).
          if [ -n "$framework" ] && [ "$framework" != "ironclaw" ] && [ "$framework" != "ironclaw-reborn" ]; then
            gh pr comment "$PR" --repo "$REPO" --body "Unknown framework \`${framework}\`. Use \`ironclaw\` (default) or \`ironclaw-reborn\`."$'\n\n'"$USAGE"
            exit 0
          fi
          # Pre-dispatch suite check: refuse unknown suite names before
          # we acknowledge with 🚀 or spend any LLM credit. Cheap GitHub
          # API lookup against the pinned benchmarks SHA so the user gets
          # the same answer the dispatched workflow would. Uses
          # BENCH_GH_TOKEN (not the step's ambient GH_TOKEN) — see env block.
          if ! GH_TOKEN="$BENCH_GH_TOKEN" gh api "repos/nearai/benchmarks/contents/suites/${suite}.toml?ref=${BENCH_PIN}" --silent >/dev/null 2>&1; then
            available=$(GH_TOKEN="$BENCH_GH_TOKEN" gh api "repos/nearai/benchmarks/contents/suites?ref=${BENCH_PIN}" \
              --jq '[.[] | select(.name | endswith(".toml")) | .name | rtrimstr(".toml")] | sort | join(", ")')
            gh pr comment "$PR" --repo "$REPO" --body "Unknown suite \`${suite}\`. Available: ${available}"
            exit 0
          fi
          info=$(gh pr view "$PR" --repo "$REPO" --json headRefOid,isCrossRepository)
          sha=$(printf '%s' "$info" | jq -r .headRefOid)
          # Same-repo PR = trusted; fork PR (isCrossRepository) = untrusted, no
          # sccache creds (see the `trusted` output rationale above).
          if [ "$(printf '%s' "$info" | jq -r .isCrossRepository)" = "true" ]; then
            trusted=false
          else
            trusted=true
          fi
          echo "suite=$suite" >> "$GITHUB_OUTPUT"
          echo "model=$model" >> "$GITHUB_OUTPUT"
          echo "framework=$framework" >> "$GITHUB_OUTPUT"
          echo "head_sha=$sha" >> "$GITHUB_OUTPUT"
          echo "trusted=$trusted" >> "$GITHUB_OUTPUT"

      - name: Acknowledge with 🚀 reaction
        if: steps.auth.outputs.authorized == 'yes' && steps.parse.outputs.suite != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api "/repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" -F content=rocket

      - name: Post "started" comment with link to dispatcher run
        # Closes the gap between the 🚀 reaction and the eventual result
        # comment (~5–10 min later from the called workflow). Gives the
        # maintainer a clickable link straight to the Actions run.
        if: steps.auth.outputs.authorized == 'yes' && steps.parse.outputs.suite != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
          SUITE: ${{ steps.parse.outputs.suite }}
          MODEL: ${{ steps.parse.outputs.model }}
          FRAMEWORK: ${{ steps.parse.outputs.framework }}
          HEAD_SHA: ${{ steps.parse.outputs.head_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          short_sha="${HEAD_SHA:0:10}"
          model_part=""
          if [ -n "$MODEL" ]; then
            model_part=" (model \`$MODEL\`)"
          fi
          framework_part=""
          if [ -n "$FRAMEWORK" ] && [ "$FRAMEWORK" != "ironclaw" ]; then
            framework_part=" on \`$FRAMEWORK\`"
          fi
          gh pr comment "$PR" --repo "$REPO" --body \
            "🧪 Started \`$SUITE\`${framework_part}${model_part} against ironclaw \`$short_sha\` — [watch run]($RUN_URL)."

  bench:
    needs: parse
    if: needs.parse.outputs.authorized == 'yes' && needs.parse.outputs.suite != ''
    runs-on: ubuntu-latest
    # This job only *dispatches* the real run in nearai/benchmarks and
    # returns — the benchmark itself (build/run/compare/PR comment) happens
    # entirely inside that triggered run, on nearai/benchmarks' own compute
    # and secrets. No id-token/pull-requests/issues writes needed here
    # (those apply to the ambient GITHUB_TOKEN, which this step doesn't use
    # for the privileged call — see BENCHMARKS_DISPATCH_TOKEN below).
    timeout-minutes: 5
    permissions:
      contents: read
    # Concurrency lives on the authorized job, not the workflow root —
    # otherwise an unauthorized commenter typing `/benchmark whatever`
    # would acquire the per-PR group and cancel an in-flight maintainer
    # run before failing auth.
    concurrency:
      group: nearai-bench-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - name: Dispatch benchmark run in nearai/benchmarks
        env:
          # Fine-grained PAT, `actions: write` scoped to nearai/benchmarks
          # only — needed because GITHUB_TOKEN here can't write to another
          # repo's Actions API, and (per the header comment) a private
          # repo's cross-repo *reusable-workflow* access can't be opened to
          # a public caller at all, so `uses:` is not an option regardless.
          GH_TOKEN: ${{ secrets.BENCHMARKS_DISPATCH_TOKEN }}
          IRONCLAW_REV: ${{ needs.parse.outputs.head_sha }}
          PR_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          SUITE: ${{ needs.parse.outputs.suite }}
          MODEL: ${{ needs.parse.outputs.model }}
          FRAMEWORK: ${{ needs.parse.outputs.framework }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          set -euo pipefail
          # Bump from the reusable workflow's 240 default. The /benchmark
          # path is used for the heavy container suites — claw-swe-bench-lite
          # (80 tasks, ~3-4h at its TOML parallelism=3) and clawbench — where
          # 240 is too low: the last full-suite run (run 29606955146) was
          # cancelled by the 240-min job cap after only 7/350 tasks. 350 also
          # sits above the run step's own internal
          # `timeout --kill-after=120s 290m` guard, so an overrun is killed
          # gracefully by that guard (which snapshots a partial run, uploads
          # it, and posts the PR comment) instead of GitHub cancelling the
          # job at the cap. 350 < the 360-min hard cap on the ubuntu-16core
          # runner. Lightweight suites (ironclaw-smoke, pinchbench) finish
          # well before this — it is a ceiling, not a duration.
          gh workflow run bench-pr-reusable.yml \
            --repo nearai/benchmarks --ref main \
            -f "ironclaw-rev=${IRONCLAW_REV}" \
            -f "pr-repo=${PR_REPO}" \
            -f "pr-number=${PR_NUMBER}" \
            -f "suite-name=${SUITE}" \
            -f "model=${MODEL}" \
            -f "framework=${FRAMEWORK}" \
            -f "dry-run=false" \
            -f "timeout-minutes=350" \
            -f "trigger-comment-id=${COMMENT_ID}"
