name: Claude Code Review

on:
  workflow_call:
    inputs:
      diff_range:
        description: "Git diff range to review (e.g., abc123..def456)"
        required: true
        type: string
      ref:
        description: "Git ref to checkout"
        required: false
        type: string
        default: staging
    outputs:
      has_blocking:
        description: "Whether blocking findings were found (CRITICAL ≥80 confidence)"
        value: ${{ jobs.review.outputs.has_blocking }}
  workflow_dispatch:
    inputs:
      diff_range:
        description: "Git diff range to review"
        required: true
        type: string
      ref:
        description: "Git ref to checkout"
        required: false
        type: string
        default: staging

permissions:
  contents: read
  issues: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    outputs:
      has_blocking: ${{ steps.gate-check.outputs.has_blocking }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Generate diff context
        id: diff
        run: |
          RANGE="${{ inputs.diff_range }}"
          if [ -z "$RANGE" ]; then
            echo "diff_available=false" >> "$GITHUB_OUTPUT"
            echo "No diff range provided"
            exit 0
          fi
          echo "diff_available=true" >> "$GITHUB_OUTPUT"

          # File-level diffstat for overview
          git diff --stat $RANGE > /tmp/diffstat.txt
          # Commit log with full messages
          git log --format="- %h %s" $RANGE > /tmp/commits.txt
          # Full diff
          git diff $RANGE > /tmp/staging-diff.patch

          # Truncate diff if too large (>200KB) to avoid token limits
          DIFF_SIZE=$(wc -c < /tmp/staging-diff.patch)
          if [ "$DIFF_SIZE" -gt 204800 ]; then
            echo "::warning::Diff is ${DIFF_SIZE} bytes, truncating to 200KB"
            head -c 204800 /tmp/staging-diff.patch > /tmp/staging-diff-truncated.patch
            mv /tmp/staging-diff-truncated.patch /tmp/staging-diff.patch
          fi

          # Build the prompt with actual file contents (not heredoc references)
          {
            cat <<'STATIC_PART'
          You are reviewing a batch of commits that just landed on the staging branch
          of the IronClaw project (a Rust AI assistant). This is a thorough security
          and quality review.

          ## Your Review Process

          1. **Read CLAUDE.md** for project coding standards and conventions
          2. **Read the full diff** below to understand what changed
          3. **Read the complete source files** for every changed file (use the Read tool)
             to understand the full context, not just the diff hunks
          4. **Trace data flows** through changed code paths to find bugs
          5. **Check for security issues** across the OWASP top 10 categories

          ## Severity Categories

          ### CRITICAL
          - Security vulnerabilities: injection, XSS, SSRF, path traversal, auth bypass
          - Data exfiltration risks: secrets in logs, unescaped user data reaching LLM
          - Memory safety: unsafe blocks, unbounded allocations, panics in prod code
          - .unwrap() or .expect() in production code (not tests)
          - Race conditions in concurrent code (Arc/RwLock misuse, TOCTOU)

          ### HIGH
          - Logic bugs that would cause incorrect behavior
          - Missing error handling that would cause silent failures
          - Breaking changes to public APIs or database schema
          - Regression in safety/sanitizer/leak detection layers

          ### MEDIUM
          - Missing tests for new functionality
          - Unnecessary complexity or poor abstractions
          - Performance concerns (N+1 queries, unbounded loops)

          ### LOW
          - Documentation gaps, naming suggestions

          ## Confidence Scoring

          For EVERY finding, assign a confidence score from 0 to 100:
          - **90-100**: You are certain this is a real issue. You can point to the exact code and explain why it's wrong.
          - **70-89**: Very likely a real issue but you'd want a human to verify.
          - **50-69**: Possibly an issue but you're not fully sure of the context.
          - **0-49**: Speculative. Might be a false positive.

          Be honest with your confidence. A CRITICAL finding you're unsure about should get a low confidence score.

          ## Output Format

          Write your findings to a file called /tmp/review-results.json with this structure:
          {
            "summary": "One paragraph overall assessment",
            "critical": [{"title": "...", "description": "...", "file": "...", "line": 0, "confidence": 85}],
            "high": [{"title": "...", "description": "...", "file": "...", "line": 0, "confidence": 75}],
            "medium": [{"title": "...", "description": "...", "file": "...", "line": 0, "confidence": 60}],
            "low": [{"title": "...", "description": "...", "file": "...", "line": 0, "confidence": 50}]
          }

          If you find no issues at a given severity, use an empty array.

          ## Context

          Changed files:
          STATIC_PART
            cat /tmp/diffstat.txt
            echo ""
            echo "Commits:"
            cat /tmp/commits.txt
            echo ""
            echo "Diff:"
            cat /tmp/staging-diff.patch
          } > /tmp/review-prompt.txt

      - name: Load prompt into env
        id: load-prompt
        if: steps.diff.outputs.diff_available == 'true'
        run: |
          # Use GITHUB_ENV with delimiter to handle multiline content
          DELIM=$(openssl rand -hex 16)
          echo "REVIEW_PROMPT<<${DELIM}" >> "$GITHUB_ENV"
          cat /tmp/review-prompt.txt >> "$GITHUB_ENV"
          echo "${DELIM}" >> "$GITHUB_ENV"

      - name: Run Claude Code review
        id: claude-review
        if: steps.diff.outputs.diff_available == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ env.REVIEW_PROMPT }}
          claude_args: "--max-turns 30"

      - name: Validate and process results
        id: process-results
        if: always() && steps.diff.outputs.diff_available == 'true'
        run: |
          # Default: no results
          if [ ! -f /tmp/review-results.json ]; then
            echo '{"summary":"Claude review did not produce structured output.","critical":[],"high":[],"medium":[],"low":[]}' > /tmp/review-results.json
          fi

          # Validate JSON
          if ! jq empty /tmp/review-results.json 2>/dev/null; then
            echo "::warning::review-results.json is not valid JSON, using fallback"
            echo '{"summary":"Claude review produced invalid JSON.","critical":[],"high":[],"medium":[],"low":[]}' > /tmp/review-results.json
          fi

          # Ensure confidence field exists on all findings (default to 50 if missing)
          for severity in critical high medium low; do
            jq ".$severity = [.$severity[]? | .confidence = (.confidence // 50)]" /tmp/review-results.json > /tmp/review-results-tmp.json
            mv /tmp/review-results-tmp.json /tmp/review-results.json
          done

      - name: Create GitHub issues for findings
        if: always() && steps.diff.outputs.diff_available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RANGE="${{ inputs.diff_range }}"
          REPO="${{ github.repository }}"
          # Use current HEAD SHA for permalinks
          SHA=$(git rev-parse HEAD)
          ISSUES_CREATED=0

          # Function to create an issue for a finding
          create_issue() {
            local severity="$1" title="$2" file="$3" line="$4" confidence="$5" labels="$6"

            jq -r ".$severity[$i].description // \"No description\"" /tmp/review-results.json > /tmp/issue-desc.txt
            {
              echo "## ${severity^^} Issue Found by Staging CI Review"
              echo ""
              echo "**Severity:** ${severity^^}"
              echo "**Confidence:** ${confidence}/100"
              echo "**File:** [\`${file}:${line}\`](https://github.com/${REPO}/blob/${SHA}/${file}#L${line})"
              echo "**Commit range:** \`${RANGE}\`"
              echo ""
              echo "### Description"
              cat /tmp/issue-desc.txt
              echo ""
              echo "---"
              echo "*Auto-created by staging-ci Claude Code review*"
            } > /tmp/issue-body.md

            gh issue create \
              --title "[${severity^^}] ${title}" \
              --body-file /tmp/issue-body.md \
              --label "${labels}"
            ISSUES_CREATED=$((ISSUES_CREATED + 1))
          }

          # CRITICAL: always create issue (any confidence)
          # ≥80 → bug,risk: high,staging-ci-review
          # 50-79 → bug,risk: high,staging-ci-review
          # <50 → bug,risk: high,staging-ci-review,low-confidence
          CRIT_COUNT=$(jq '.critical | length' /tmp/review-results.json 2>/dev/null || echo 0)
          for i in $(seq 0 $((CRIT_COUNT > 0 ? CRIT_COUNT - 1 : -1))); do
            [ "$i" -lt 0 ] && break
            TITLE=$(jq -r ".critical[$i].title // \"Untitled\"" /tmp/review-results.json)
            FILE=$(jq -r ".critical[$i].file // \"unknown\"" /tmp/review-results.json)
            LINE=$(jq -r ".critical[$i].line // 0" /tmp/review-results.json)
            CONF=$(jq -r ".critical[$i].confidence // 50" /tmp/review-results.json)

            LABELS="bug,risk: high,staging-ci-review"
            if [ "$CONF" -lt 50 ]; then
              LABELS="${LABELS},low-confidence"
            fi
            create_issue "critical" "$TITLE" "$FILE" "$LINE" "$CONF" "$LABELS"
          done

          # HIGH: create issue if confidence ≥50
          HIGH_COUNT=$(jq '.high | length' /tmp/review-results.json 2>/dev/null || echo 0)
          for i in $(seq 0 $((HIGH_COUNT > 0 ? HIGH_COUNT - 1 : -1))); do
            [ "$i" -lt 0 ] && break
            CONF=$(jq -r ".high[$i].confidence // 50" /tmp/review-results.json)
            [ "$CONF" -lt 50 ] && continue
            TITLE=$(jq -r ".high[$i].title // \"Untitled\"" /tmp/review-results.json)
            FILE=$(jq -r ".high[$i].file // \"unknown\"" /tmp/review-results.json)
            LINE=$(jq -r ".high[$i].line // 0" /tmp/review-results.json)
            create_issue "high" "$TITLE" "$FILE" "$LINE" "$CONF" "bug,risk: medium,staging-ci-review"
          done

          # MEDIUM: create issue if confidence ≥80
          MED_COUNT=$(jq '.medium | length' /tmp/review-results.json 2>/dev/null || echo 0)
          for i in $(seq 0 $((MED_COUNT > 0 ? MED_COUNT - 1 : -1))); do
            [ "$i" -lt 0 ] && break
            CONF=$(jq -r ".medium[$i].confidence // 50" /tmp/review-results.json)
            [ "$CONF" -lt 80 ] && continue
            TITLE=$(jq -r ".medium[$i].title // \"Untitled\"" /tmp/review-results.json)
            FILE=$(jq -r ".medium[$i].file // \"unknown\"" /tmp/review-results.json)
            LINE=$(jq -r ".medium[$i].line // 0" /tmp/review-results.json)
            create_issue "medium" "$TITLE" "$FILE" "$LINE" "$CONF" "risk: medium,staging-ci-review"
          done

          # LOW: create issue if confidence ≥80
          LOW_COUNT=$(jq '.low | length' /tmp/review-results.json 2>/dev/null || echo 0)
          for i in $(seq 0 $((LOW_COUNT > 0 ? LOW_COUNT - 1 : -1))); do
            [ "$i" -lt 0 ] && break
            CONF=$(jq -r ".low[$i].confidence // 50" /tmp/review-results.json)
            [ "$CONF" -lt 80 ] && continue
            TITLE=$(jq -r ".low[$i].title // \"Untitled\"" /tmp/review-results.json)
            FILE=$(jq -r ".low[$i].file // \"unknown\"" /tmp/review-results.json)
            LINE=$(jq -r ".low[$i].line // 0" /tmp/review-results.json)
            create_issue "low" "$TITLE" "$FILE" "$LINE" "$CONF" "risk: low,staging-ci-review"
          done

          echo "Created ${ISSUES_CREATED} issues total"

      - name: Write review summary
        if: always() && steps.diff.outputs.diff_available == 'true'
        run: |
          if [ ! -f /tmp/review-results.json ]; then
            echo "No review results to summarize" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "## Claude Code Review Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          SUMMARY=$(jq -r '.summary // "No summary"' /tmp/review-results.json)
          echo "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Count findings by severity
          CRIT=$(jq '.critical | length' /tmp/review-results.json 2>/dev/null || echo 0)
          HIGH=$(jq '.high | length' /tmp/review-results.json 2>/dev/null || echo 0)
          MED=$(jq '.medium | length' /tmp/review-results.json 2>/dev/null || echo 0)
          LOW=$(jq '.low | length' /tmp/review-results.json 2>/dev/null || echo 0)

          # Count blocking (CRITICAL ≥80)
          BLOCKING=$(jq '[.critical[]? | select(.confidence >= 80)] | length' /tmp/review-results.json 2>/dev/null || echo 0)

          echo "| Severity | Count | Blocking (≥80 conf) |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|---------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Critical | $CRIT | $BLOCKING |" >> "$GITHUB_STEP_SUMMARY"
          echo "| High | $HIGH | — |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Medium | $MED | — |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Low | $LOW | — |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Print all findings with confidence scores and computed action
          TOTAL=$((CRIT + HIGH + MED + LOW))
          if [ "$TOTAL" -gt 0 ]; then
            echo "### All Findings" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Severity | Confidence | Action | Title | File |" >> "$GITHUB_STEP_SUMMARY"
            echo "|----------|-----------|--------|-------|------|" >> "$GITHUB_STEP_SUMMARY"

            # CRITICAL: always issue, ≥80 blocks
            jq -r '.critical[]? | "| CRITICAL | \(.confidence) | \(if .confidence >= 80 then "BLOCKS + issue" elif .confidence >= 50 then "issue" else "issue (low-confidence)" end) | \(.title) | \(.file):\(.line) |"' /tmp/review-results.json >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
            # HIGH: issue if ≥50
            jq -r '.high[]? | "| HIGH | \(.confidence) | \(if .confidence >= 50 then "issue" else "summary only" end) | \(.title) | \(.file):\(.line) |"' /tmp/review-results.json >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
            # MEDIUM: issue if ≥80
            jq -r '.medium[]? | "| MEDIUM | \(.confidence) | \(if .confidence >= 80 then "issue" else "summary only" end) | \(.title) | \(.file):\(.line) |"' /tmp/review-results.json >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
            # LOW: issue if ≥80
            jq -r '.low[]? | "| LOW | \(.confidence) | \(if .confidence >= 80 then "issue" else "summary only" end) | \(.title) | \(.file):\(.line) |"' /tmp/review-results.json >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          fi

      - name: Set gate output
        id: gate-check
        if: always()
        run: |
          # Default: no blocking findings
          HAS_BLOCKING=false

          if [ -f /tmp/review-results.json ]; then
            # Only CRITICAL findings with confidence ≥80 block
            BLOCKING=$(jq '[.critical[]? | select(.confidence >= 80)] | length' /tmp/review-results.json 2>/dev/null || echo 0)
            if [ "$BLOCKING" -gt 0 ]; then
              HAS_BLOCKING=true
              echo "::warning::Found ${BLOCKING} blocking finding(s) (CRITICAL ≥80 confidence)"
            fi
          fi

          echo "has_blocking=${HAS_BLOCKING}" >> "$GITHUB_OUTPUT"
