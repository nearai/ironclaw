name: Claude Code Review

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude Code Review
    if: contains(github.event.pull_request.labels.*.name, 'staging-promotion')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read prompt
        id: prompt
        run: |
          {
            echo 'content<<PROMPT_EOF'
            cat .github/prompts/review-promotion.md
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code review
        uses: anthropics/claude-code-action@1eddb334cfa79fdb21ecbe2180ca1a016e8e7d47 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "ironclaw-ci[bot]"
          # Opus for the promotion gate — highest-stakes review (last check before staging merge).
          # 4 sub-agents + 20 turns ≈ $10-20 per promotion review. Justified by low frequency
          # and need for deep reasoning when consolidating security/architecture/bug/perf findings.
          claude_args: "--max-turns 20 --model claude-opus-4-6 --allowedTools 'Read,Glob,Grep,Agent,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh issue view:*),Bash(gh issue list:*),Bash(gh search:*),Bash(git blame:*),Bash(git log:*),Bash(git diff:*)'"
          prompt: ${{ steps.prompt.outputs.content }}
