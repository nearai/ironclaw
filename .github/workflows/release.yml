name: Release

permissions:
  contents: read

concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
      - 'ironclaw-v1.0.0-rc.[0-9]+'

jobs:
  reborn-binary-compile:
    name: Reborn binary compile
    uses: ./.github/workflows/reborn-release-compile.yml
    with:
      ref: ${{ github.sha }}

  publish-reborn-release:
    name: Publish Reborn GitHub Release
    needs: reborn-binary-compile
    if: needs.reborn-binary-compile.result == 'success'
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RELEASE_COMMIT: ${{ github.sha }}
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Download Reborn binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: reborn-compile-*
          path: reborn-staging
          merge-multiple: false

      - id: package
        name: Package Reborn release assets
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^ironclaw-v1\.0\.0-rc\.[0-9]+$ ]]; then
            echo "::error::Unexpected release tag: $RELEASE_TAG"
            exit 1
          fi

          tag_commit="$(gh api "repos/$GH_REPO/commits/$RELEASE_TAG" --jq .sha)"
          if [[ "$tag_commit" != "$RELEASE_COMMIT" ]]; then
            echo "::error::Tag $RELEASE_TAG resolves to $tag_commit, expected $RELEASE_COMMIT"
            exit 1
          fi

          release_version="${RELEASE_TAG#ironclaw-v}"
          cli_version="$(
            awk -F '"' '/^version = "/ { print $2; exit }' \
              crates/ironclaw_reborn_cli/Cargo.toml
          )"
          if [[ "$cli_version" != "$release_version" ]]; then
            echo "::error::Release tag version $release_version does not match Reborn package version $cli_version"
            exit 1
          fi
          echo "version=$release_version" >> "$GITHUB_OUTPUT"

          targets_file=".github/reborn-release-targets.tsv"
          notes_file="$RUNNER_TEMP/release-notes.md"
          bash .github/scripts/render-reborn-release-notes.sh \
            CHANGELOG.md \
            "$targets_file" \
            "$GH_REPO" \
            "$RELEASE_TAG" \
            "$release_version" \
            > "$notes_file"
          if [[ ! -s "$notes_file" ]]; then
            echo "::error::Rendered Release notes are empty"
            exit 1
          fi

          mapfile -t targets < <(cut -f1 "$targets_file")
          if [[ "${#targets[@]}" -ne 7 ]]; then
            echo "::error::Expected seven release targets"
            exit 1
          fi

          mapfile -t artifact_dirs < <(
            find reborn-staging -mindepth 1 -maxdepth 1 -type d -print | sort
          )
          if [[ "${#artifact_dirs[@]}" -ne "${#targets[@]}" ]]; then
            echo "::error::Expected ${#targets[@]} Reborn artifacts, found ${#artifact_dirs[@]}"
            exit 1
          fi

          package_parent="$RUNNER_TEMP/reborn-packages"
          asset_dir="$RUNNER_TEMP/release-assets"
          mkdir -p "$package_parent" "$asset_dir"
          source_date_epoch="$(git show -s --format=%ct "$RELEASE_COMMIT")"

          for target in "${targets[@]}"; do
            artifact_dir="reborn-staging/reborn-compile-$target"
            binary_name=ironclaw
            if [[ "$target" == "x86_64-pc-windows-msvc" ]]; then
              binary_name=ironclaw.exe
            fi
            binary_path="$artifact_dir/$binary_name"

            mapfile -t artifact_entries < <(
              find "$artifact_dir" -mindepth 1 -maxdepth 1 -print | sort
            )
            if [[ "${#artifact_entries[@]}" -ne 1 || "${artifact_entries[0]:-}" != "$binary_path" || ! -f "$binary_path" || ! -s "$binary_path" || -L "$binary_path" ]]; then
              echo "::error::$artifact_dir must contain exactly one non-empty regular file named $binary_name"
              exit 1
            fi

            package_name="ironclaw-$target"
            package_dir="$package_parent/$package_name"
            mkdir -p "$package_dir"
            install -m 0755 "$binary_path" "$package_dir/$binary_name"
            for document in LICENSE-APACHE LICENSE-MIT README.md CHANGELOG.md; do
              install -m 0644 "$document" "$package_dir/$document"
            done
            tar \
              --sort=name \
              --mtime="@$source_date_epoch" \
              --owner=0 \
              --group=0 \
              --numeric-owner \
              -C "$package_parent" \
              -czf "$asset_dir/$package_name.tar.gz" \
              "$package_name"
          done

          release_assets=()
          for target in "${targets[@]}"; do
            archive="ironclaw-$target.tar.gz"
            (
              cd "$asset_dir"
              sha256sum "$archive" > "$archive.sha256"
            )
            release_assets+=("$asset_dir/$archive" "$asset_dir/$archive.sha256")
          done
          (
            cd "$asset_dir"
            sha256sum ironclaw-*.tar.gz > sha256.sum
          )
          release_assets+=("$asset_dir/sha256.sum")

          expected_asset_count=$(( ${#targets[@]} * 2 + 1 ))
          if [[ "${#release_assets[@]}" -ne "$expected_asset_count" ]]; then
            echo "::error::Expected $expected_asset_count release assets, found ${#release_assets[@]}"
            exit 1
          fi
          for asset_path in "${release_assets[@]}"; do
            if [[ ! -s "$asset_path" ]]; then
              echo "::error::Release asset is empty: $asset_path"
              exit 1
            fi
          done

      - name: Publish Reborn GitHub Release
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail

          targets_file=".github/reborn-release-targets.tsv"
          mapfile -t targets < <(cut -f1 "$targets_file")
          if [[ "${#targets[@]}" -ne 7 ]]; then
            echo "::error::Expected seven release targets"
            exit 1
          fi

          release_assets=()
          for target in "${targets[@]}"; do
            archive="$RUNNER_TEMP/release-assets/ironclaw-$target.tar.gz"
            release_assets+=("$archive" "$archive.sha256")
          done
          release_assets+=("$RUNNER_TEMP/release-assets/sha256.sum")

          mapfile -t actual_assets < <(
            find "$RUNNER_TEMP/release-assets" -mindepth 1 -maxdepth 1 -type f -print | sort
          )
          if [[ "${#release_assets[@]}" -ne 15 || "${#actual_assets[@]}" -ne 15 ]]; then
            echo "::error::Expected 15 release assets, found ${#actual_assets[@]}"
            exit 1
          fi
          for asset_path in "${release_assets[@]}"; do
            if [[ ! -s "$asset_path" || -L "$asset_path" ]]; then
              echo "::error::Release asset is not a non-empty regular file: $asset_path"
              exit 1
            fi
          done

          release_args=(
            "$RELEASE_TAG"
            --verify-tag
            --target "$RELEASE_COMMIT"
            --title "Version $RELEASE_VERSION"
            --notes-file "$RUNNER_TEMP/release-notes.md"
            --draft
            --prerelease
          )
          # `gh release create` refuses an existing Release. A failed upload may
          # leave a draft, which must be inspected and removed before retrying.
          gh release create "${release_args[@]}" "${release_assets[@]}"

          tag_commit="$(gh api "repos/$GH_REPO/commits/$RELEASE_TAG" --jq .sha)"
          if [[ "$tag_commit" != "$RELEASE_COMMIT" ]]; then
            echo "::error::Tag $RELEASE_TAG changed before publication"
            exit 1
          fi
          gh release edit "$RELEASE_TAG" --draft=false
