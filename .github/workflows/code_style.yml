name: Code Style
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: code-style-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Skip when only docs/config changed ──
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      has_code: ${{ steps.check.outputs.has_code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          CODE_CHANGES=$(git diff --name-only "$BASE_SHA"...HEAD -- \
            'src/' 'crates/' 'channels-src/' 'tools-src/' 'tests/' 'migrations/' \
            'Cargo.toml' 'Cargo.lock' 'Dockerfile' 'build.rs' \
            | head -1)
          if [ -n "$CODE_CHANGES" ]; then
            echo "has_code=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_code=false" >> "$GITHUB_OUTPUT"
            echo "No code changes — style checks will be skipped"
          fi

  # ── Dynamic matrix: PRs run only all-features clippy; main PRs get full matrix ──
  clippy-matrix:
    name: Configure clippy matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          FULL='[{"name":"all-features","flags":"--all-features"},{"name":"default","flags":""},{"name":"libsql-only","flags":"--no-default-features --features libsql"}]'
          SLIM='[{"name":"all-features","flags":"--all-features"}]'

          if [ "${{ github.base_ref }}" = "main" ]; then
            echo "matrix=${FULL}" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=${SLIM}" >> "$GITHUB_OUTPUT"
          fi

  format:
    name: Formatting
    needs: changes
    if: needs.changes.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        components: rustfmt
    - name: Check formatting
      run: cargo fmt --all -- --check

  deny-check:
    name: cargo-deny
    needs: changes
    if: needs.changes.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - name: Run cargo deny
      uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2

  clippy:
    name: Clippy (${{ matrix.name }})
    needs: [changes, clippy-matrix]
    if: needs.changes.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.clippy-matrix.outputs.matrix) }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        components: clippy
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        key: clippy-${{ matrix.name }}
    - name: Check lints
      run: cargo clippy --all --benches --tests --examples ${{ matrix.flags }} -- -D warnings

  clippy-windows:
    name: Clippy Windows (${{ matrix.name }})
    if: github.base_ref == 'main'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: all-features
            flags: "--all-features"
          - name: default
            flags: ""
          - name: libsql-only
            flags: "--no-default-features --features libsql"
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        components: clippy
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        key: clippy-windows-${{ matrix.name }}
    - name: Check lints
      run: cargo clippy --all --benches --tests --examples ${{ matrix.flags }} -- -D warnings

  no-panics:
    name: No panics in production code
    needs: changes
    if: needs.changes.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0
        persist-credentials: false
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.12"
    - name: Check for .unwrap(), .expect(), assert!() in production code
      run: |
        BASE="${{ github.event.pull_request.base.sha }}"
        python3 scripts/check_no_panics.py --base "$BASE" --head HEAD

  # Roll-up job for branch protection
  code-style:
    name: Code Style (fmt + clippy + deny)
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, clippy-matrix, format, clippy, clippy-windows, deny-check, no-panics]
    steps:
      - run: |
          # If no code changes, all style jobs were correctly skipped
          if [[ "${{ needs.changes.outputs.has_code }}" == "false" ]]; then
            echo "No code changes — style checks skipped correctly"
            exit 0
          fi

          if [[ "${{ needs.format.result }}" != "success" || "${{ needs.clippy.result }}" != "success" || "${{ needs.deny-check.result }}" != "success" || "${{ needs.no-panics.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          # clippy-windows only runs on main PRs, so skipped is acceptable but failure is not
          if [[ "${{ needs.clippy-windows.result }}" != "success" && "${{ needs.clippy-windows.result }}" != "skipped" ]]; then
            echo "Windows clippy failed: ${{ needs.clippy-windows.result }}"
            exit 1
          fi
