name: Cache channel WASM artifacts
description: Restore or build deterministic WASM channel artifacts.

inputs:
  channel:
    description: Channel name to build, or "all" for every registry channel.
    required: false
    default: all

runs:
  using: composite
  steps:
    - name: Compute channel WASM cache key
      id: key
      shell: bash
      env:
        CHANNEL: ${{ inputs.channel }}
      run: |
        set -euo pipefail
        digest="$(
          python3 - <<'PY'
        import hashlib
        import os
        from pathlib import Path

        channel = os.environ["CHANNEL"]
        roots = [
            Path("scripts/build-wasm-extensions.sh"),
            Path("registry/channels"),
            Path("wit"),
            Path("channels-src"),
        ]
        files = []
        for root in roots:
            if not root.exists():
                continue
            if root.is_file():
                files.append(root)
                continue
            files.extend(path for path in root.rglob("*") if path.is_file())

        digest = hashlib.sha256()
        for path in sorted(set(files), key=lambda item: item.as_posix()):
            normalized = path.as_posix()
            if "/target/" in normalized:
                continue
            digest.update(normalized.encode("utf-8"))
            digest.update(b"\0")
            digest.update(path.read_bytes())
            digest.update(b"\0")
        print(digest.hexdigest())
        PY
        )"
        echo "key=channel-wasm-v1-${RUNNER_OS}-${CHANNEL}-${digest}" >> "${GITHUB_OUTPUT}"

    - name: Restore channel WASM artifact cache
      id: cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: channels-src/*/target/wasm32-wasip2/release/*_channel.wasm
        key: ${{ steps.key.outputs.key }}

    - name: Verify cached channel WASM artifacts
      if: steps.cache.outputs.cache-hit == 'true'
      shell: bash
      run: bash scripts/ci/verify-channel-wasm-artifacts.sh "${{ inputs.channel }}"

    - name: Build channel WASM artifacts
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        CHANNEL: ${{ inputs.channel }}
      run: |
        set -euo pipefail
        if [ "${CHANNEL}" = "all" ]; then
          ./scripts/build-wasm-extensions.sh --channels
        else
          cargo build \
            --manifest-path "channels-src/${CHANNEL}/Cargo.toml" \
            --target wasm32-wasip2 \
            --release
        fi
        bash scripts/ci/verify-channel-wasm-artifacts.sh "${CHANNEL}"
