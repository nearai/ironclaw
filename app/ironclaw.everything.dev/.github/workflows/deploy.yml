name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy Production
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    env:
      NEAR_PRIVATE_KEY: ${{ secrets.NEAR_PRIVATE_KEY }}
      ZE_SERVER_TOKEN: ${{ secrets.ZEPHYR_AUTH_TOKEN }}
      ZE_USER_EMAIL: ${{ secrets.ZEPHYR_USER_EMAIL }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      TARGET_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Sync to triggering commit
        run: git reset --hard "$TARGET_SHA"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.2.20"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run postinstall
        run: bun run postinstall

      - name: Install NEAR CLI
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/near/near-cli-rs/releases/download/v0.23.5/near-cli-rs-installer.sh | sh

      - name: Verify NEAR CLI
        run: near --version

      - name: Publish with deploy
        run: bun run bos publish --deploy

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Redeploy Railway
        run: railway redeploy --service app --yes

      - name: Commit and push bos.config.json updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bos.config.json
          git diff --cached --quiet || git commit -m "chore: update deployment URLs [skip ci]"
          git push origin HEAD:"$TARGET_BRANCH"

      - name: Create GitHub Releases for deployed workspaces
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          changelogs=( */CHANGELOG.md plugins/*/CHANGELOG.md )
          shopt -u nullglob

          for changelog in "${changelogs[@]}"; do
            pkg_dir=$(dirname "$changelog")

            [[ "$(basename "$pkg_dir")" == _* ]] && continue

            PKG_JSON="$pkg_dir/package.json"
            [ ! -f "$PKG_JSON" ] && continue

            VERSION=$(jq -r '.version // empty' "$PKG_JSON")
            NAME=$(jq -r '.name // empty' "$PKG_JSON")
            [ -z "$VERSION" ] || [ -z "$NAME" ] && continue

            TAG="${NAME}@${VERSION}"

            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG already exists, skipping"
              continue
            fi

            NOTES=$(sed -n "/^## ${VERSION}/,/^## [0-9]/p" "$changelog" | sed '$d' | tail -n +2)
            [ -z "$NOTES" ] && NOTES="Release $TAG"

            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$NOTES" \
              --target "$TARGET_BRANCH"
          done
