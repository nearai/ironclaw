name: Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    env:
      NEAR_PRIVATE_KEY: ${{ secrets.NEAR_PRIVATE_KEY }}
      ZE_SERVER_TOKEN: ${{ secrets.ZEPHYR_AUTH_TOKEN }}
      ZE_USER_EMAIL: ${{ secrets.ZEPHYR_USER_EMAIL }}
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}
      TARGET_SHA: ${{ github.sha }}
      TARGET_BRANCH: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Sync to triggering commit
        run: git reset --hard "$TARGET_SHA"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.2.20"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run postinstall
        run: bun run postinstall

      - name: Install NEAR CLI
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/near/near-cli-rs/releases/download/v0.23.5/near-cli-rs-installer.sh | sh

      - name: Verify NEAR CLI
        run: near --version

      - name: Publish with deploy
        run: bun run bos publish --deploy --env staging

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Redeploy Railway
        run: railway redeploy --service app --yes

      - name: Commit and push bos.config.json updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bos.config.json
          git diff --cached --quiet || git commit -m "chore: update staging deployment URLs [skip ci]"
          git push origin HEAD:"$TARGET_BRANCH"
