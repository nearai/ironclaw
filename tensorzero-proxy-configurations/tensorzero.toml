# ============================================================================

# --- DS on DeepSeek native API (non-TEE) -----------------------------------
[models.ds_native]
routing = ["deepseek"]

[models.ds_native.timeouts.streaming]
ttft_ms = 7000
total_ms = 550000

[models.ds_native.timeouts.non_streaming]
