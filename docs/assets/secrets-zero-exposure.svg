<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="360" viewBox="50 50 800 360">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1e3a5f" />
    </marker>
  </defs>
  <rect x="100" y="100" width="160" height="80" fill="#ddd6fe" stroke="#1e3a5f" stroke-width="2" rx="8"/>
  <text x="250" y="144" font-family="sans-serif" font-size="14" fill="#374151" text-anchor="middle">Secret Store
(Encrypted in DB)</text>
  <rect x="340" y="100" width="160" height="80" fill="#3b82f6" stroke="#1e3a5f" stroke-width="2" rx="8"/>
  <text x="490" y="144" font-family="sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Proxy
(Injects Headers)</text>
  <rect x="580" y="100" width="160" height="80" fill="#a7f3d0" stroke="#1e3a5f" stroke-width="2" rx="8"/>
  <text x="730" y="144" font-family="sans-serif" font-size="14" fill="#374151" text-anchor="middle">External
Service</text>
  <rect x="340" y="280" width="160" height="80" fill="#dbeafe" stroke="#1e3a5f" stroke-width="2" rx="8"/>
  <text x="490" y="324" font-family="sans-serif" font-size="14" fill="#374151" text-anchor="middle">Container
(Sandbox)</text>
  <path d="M 260 140 L 340 140" fill="none" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="325" y="132" font-family="sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Decrypt</text>
  <path d="M 500 140 L 580 140" fill="none" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 420 280 L 420 180" fill="none" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="445" y="237" font-family="sans-serif" font-size="12" fill="#dc2626" text-anchor="start">Never passes
through container</text>
  <text x="445" y="120" font-family="sans-serif" font-size="10" fill="#64748b" text-anchor="start">Authorization: Bearer</text>
</svg>