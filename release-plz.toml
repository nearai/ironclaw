[workspace]
# Reborn RC GitHub Releases are created by release.yml, not release-plz.
# release-plz still creates legacy git tags and publishes eligible crates.
git_release_enable = false

# ── Main binary ─────────────────────────────────────────────
# Not published to crates.io. Keep its legacy tags until stable Release
# ownership moves to Reborn; they do not match release.yml's RC-only filter.
[[package]]
name = "ironclaw"
publish = false

# ── Internal crates (not useful standalone) ─────────────────
[[package]]
name = "ironclaw_tui"
publish = false
release = false

[[package]]
name = "ironclaw_gateway"
publish = false
release = false
