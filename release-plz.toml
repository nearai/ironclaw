[workspace]
# GitHub Releases are created by cargo-dist (ironclaw-release.yml), not release-plz.
# release-plz only creates git tags and publishes to crates.io.
git_release_enable = false

# ── Main binary ─────────────────────────────────────────────
# Not published to crates.io. Still create git tags so cargo-dist builds
# binaries and creates GitHub Releases.
[[package]]
name = "ironclaw"
publish = false

# ── Root workspace package ──────────────────────────────────
# Post-Tier-B the workspace root is a test-only host for the Reborn integration
# suite (`ironclaw_reborn_integration_tests`); it has no lib/bin and must never
# be versioned, tagged, or published. (The former `ironclaw_legacy`, `ironclaw_tui`,
# and `ironclaw_gateway` overrides were dropped with those deleted crates.)
[[package]]
name = "ironclaw_reborn_integration_tests"
publish = false
release = false
