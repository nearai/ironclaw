[workspace]
# GitHub Releases are created by cargo-dist (release.yml), not release-plz.
# release-plz only creates git tags and publishes to crates.io.
git_release_enable = false

# ── Shipping Reborn binary ──────────────────────────────────
# Not published to crates.io. Manage its version from unified git tags; the
# root v1 package remains in the workspace but is not a release target.
[[package]]
name = "ironclaw_reborn_cli"
publish = false
git_only = true
git_tag_name = "v{{ version }}"
changelog_path = "CHANGELOG.md"
semver_check = false

# ── Retained v1 package ─────────────────────────────────────
[[package]]
name = "ironclaw"
publish = false
release = false

# ── Internal crates (not useful standalone) ─────────────────
[[package]]
name = "ironclaw_tui"
publish = false
release = false

[[package]]
name = "ironclaw_gateway"
publish = false
release = false
