# Compose file used on the GCP testnet VM.
#
# Identical to docker-compose.staging.yml except:
#   1. Images use the :testnet tag (promoted from staging via testnet-gcp.yml).
#   2. T3N_SDK_ENV defaults to "testnet".

services:
  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["app"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: t3claw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: t3claw
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U t3claw"]
      interval: 5s
      timeout: 3s
      retries: 5

  t3claw:
    profiles: ["app"]
    image: us-central1-docker.pkg.dev/gen-lang-client-0263867259/t3claw/agent:testnet
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "0.0.0.0:3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://t3claw:${POSTGRES_PASSWORD}@postgres:5432/t3claw
      GATEWAY_ENABLED: "true"
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "3000"
      CLI_ENABLED: "false"
      ONBOARD_COMPLETED: "true"
      T3CLAW_IN_DOCKER: "true"
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-false}
      SANDBOX_POLICY: ${SANDBOX_POLICY:-readonly}
      T3N_MCP_SOCKET_PATH: /var/run/t3n-mcp/t3n-mcp.sock
    volumes:
      - t3claw-data:/home/t3claw/.t3claw
      - t3n-mcp-socket:/var/run/t3n-mcp
      - /var/run/docker.sock:/var/run/docker.sock

  t3n-mcp-sidecar:
    profiles: ["app"]
    user: "0:0"
    image: us-central1-docker.pkg.dev/gen-lang-client-0263867259/t3claw/t3n-mcp-sidecar:testnet
    restart: unless-stopped
    environment:
      T3N_SDK_ENV: ${T3N_SDK_ENV:-testnet}
      T3N_MCP_RPC_URL: ${T3N_MCP_RPC_URL:-}
      T3N_MCP_DASHBOARD_URL: ${T3N_MCP_DASHBOARD_URL:-}
      PRIVATE_KEY: ${T3N_MCP_PRIVATE_KEY:-}
      T3N_MCP_AGENT_SECRET_HEX: ${T3N_MCP_AGENT_SECRET_HEX:-}
      T3N_RPC_EXTRA_HEADERS: ${T3N_RPC_EXTRA_HEADERS:-}
      MCP_SOCKET_PATH: /var/run/t3n-mcp/t3n-mcp.sock
    volumes:
      - t3n-mcp-socket:/var/run/t3n-mcp

volumes:
  postgres-data:
  t3claw-data:
  t3n-mcp-socket:
