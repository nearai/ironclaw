services:
  prometheus:
    image: prom/prometheus:v3.4.2
    container_name: ironclaw-prometheus
    network_mode: host
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.1.1
    container_name: ironclaw-grafana
    network_mode: host
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3001"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: ironclaw-node-exporter
    network_mode: host
    command:
      - --path.rootfs=/
    restart: unless-stopped

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.4.1-4.6.0-ubuntu22.04
    container_name: ironclaw-dcgm-exporter
    network_mode: host
    cap_add:
      - SYS_ADMIN
    restart: unless-stopped
