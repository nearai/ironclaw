[project]
name = "ironclaw-e2e"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-playwright>=0.5",
    "pytest-timeout>=2.3",
    "playwright>=1.40",
    "aiohttp>=3.9",
    "httpx>=0.27",
    "cryptography>=42.0",
]

[project.optional-dependencies]
vision = [
    "anthropic>=0.40",
]
telegram = [
    "telethon>=1.40",
]
# Reborn TUI PTY e2e (test_reborn_tui_happy_path.py): drives the ratatui
# thin client through a real pseudo-terminal. `pyte` is a VT100 screen
# emulator — ratatui's crossterm backend only rewrites terminal cells that
# changed between frames (unchanged interior cells, often plain spaces,
# are skipped via cursor-jump escapes), so a rendered sentence is not
# reliably one contiguous run of bytes in the raw pty stream. Feeding the
# stream through `pyte` reconstructs the actual on-screen 2D character
# grid, so an exact-substring assertion against `screen.display` holds.
tui = [
    "pexpect>=4.9",
    "pyte>=0.8",
]

# `fixtures/` (live-LLM record/replay JSON, no Python) sits alongside
# `scenarios/` after #3133 landed. Setuptools auto-discovery refuses a
# flat layout with multiple top-level packages, so scope discovery to
# the actual Python package and exclude data-only directories.
[tool.setuptools.packages.find]
include = ["scenarios*"]
exclude = ["fixtures*", "screenshots*", "test-pages*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
timeout = 360
# Strict-by-default xfail: an XPASS (test starts passing despite the
# xfail mark) is a real failure, forcing whoever fixed the underlying
# contract to either un-xfail the test or update the reason. Two stale
# xfail(strict=False) markers in test_v2_auth_oauth_matrix.py masked
# the chat-driven tool_install regression shipped in #3366 for five
# days — neither XFAIL nor XPASS would have alerted anyone with the
# default (strict=False). Un-xfailed in #3589. Explicit
# `strict=False` is still allowed for the rare genuinely-flaky case
# but must be deliberate, not the default. See `.claude/rules/testing.md`
# for the policy.
xfail_strict = true
