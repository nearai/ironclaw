tokens:
  ghp_emulate_github_token:
    login: reborn-dev
    scopes:
      - repo
      - user
  ghp_emulate_github_secondary_token:
    login: reborn-reviewer
    scopes:
      - repo
      - user

github:
  users:
    - login: reborn-dev
      name: Reborn Dev
      email: reborn-dev@example.com
    - login: reborn-reviewer
      name: Reborn Reviewer
      email: reborn-reviewer@example.com
  orgs:
    - login: nearai
      name: NEAR AI
      description: Emulated organization for Reborn QA.
  repos:
    - owner: nearai
      name: ironclaw
      description: Emulated IronClaw repo for Reborn QA.
      language: Rust
      topics:
        - reborn
        - qa
      auto_init: true
  workflows:
    - owner: nearai
      repo: ironclaw
      id: 101
      name: CI
      path: .github/workflows/ci.yml
  workflow_runs:
    - owner: nearai
      repo: ironclaw
      workflow_id: 101
      id: 1001
      name: CI
      head_branch: main
      head_sha: seeded-main-sha
      event: workflow_dispatch
      status: completed
      conclusion: failure
      actor: reborn-dev
      run_attempt: 1
      logs: REBORN_PROVIDER_CASE_RUN_LOG
  jobs:
    - owner: nearai
      repo: ironclaw
      run_id: 1001
      id: 2001
      name: provider-contract
      status: completed
      conclusion: failure
      logs: REBORN_PROVIDER_CASE_JOB_LOG
  artifacts:
    - owner: nearai
      repo: ironclaw
      run_id: 1001
      id: 3001
      name: provider-results
