tokens:
  ghp_emulate_github_token:
    login: reborn-dev
    scopes:
      - repo
      - user
  ghp_emulate_github_secondary_token:
    login: reborn-reviewer
    scopes:
      - repo
      - user

github:
  users:
    - login: reborn-dev
      name: IronClaw Dev
      email: reborn-dev@example.com
    - login: reborn-reviewer
      name: IronClaw Reviewer
      email: reborn-reviewer@example.com
  orgs:
    - login: nearai
      name: NEAR AI
      description: Emulated organization for IronClaw QA.
  repos:
    - owner: nearai
      name: ironclaw
      description: Emulated IronClaw repo for IronClaw QA.
      language: Rust
      topics:
        - reborn
        - qa
      auto_init: true
