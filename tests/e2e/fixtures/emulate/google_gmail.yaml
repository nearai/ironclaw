tokens:
  mock-token-mock_auth_code:
    login: e2e.google@example.com
    scopes:
      - https://www.googleapis.com/auth/gmail.readonly
      - https://www.googleapis.com/auth/gmail.send
      - https://www.googleapis.com/auth/calendar.readonly
      - https://www.googleapis.com/auth/calendar.events
      - https://www.googleapis.com/auth/drive.readonly
      - https://www.googleapis.com/auth/drive.file
      - https://www.googleapis.com/auth/documents
      - https://www.googleapis.com/auth/spreadsheets
  mock-refreshed-access-token:
    login: e2e.google@example.com
    scopes:
      - https://www.googleapis.com/auth/gmail.readonly
      - https://www.googleapis.com/auth/gmail.send
      - https://www.googleapis.com/auth/calendar.readonly
      - https://www.googleapis.com/auth/calendar.events
      - https://www.googleapis.com/auth/drive.readonly
      - https://www.googleapis.com/auth/drive.file
      - https://www.googleapis.com/auth/documents
      - https://www.googleapis.com/auth/spreadsheets
  emulate-google-secondary-token:
    login: secondary.google@example.com
    scopes:
      - https://www.googleapis.com/auth/gmail.readonly
      - https://www.googleapis.com/auth/gmail.send
      - https://www.googleapis.com/auth/calendar.readonly
      - https://www.googleapis.com/auth/calendar.events
      - https://www.googleapis.com/auth/drive.readonly
      - https://www.googleapis.com/auth/drive.file
      - https://www.googleapis.com/auth/documents
      - https://www.googleapis.com/auth/spreadsheets

google:
  users:
    - email: e2e.google@example.com
      name: E2E Google User
    - email: secondary.google@example.com
      name: Secondary Google User
  messages:
    - id: msg_emulate_unread
      user_email: e2e.google@example.com
      from: qa-sender@example.com
      to: e2e.google@example.com
      subject: Emulate seeded unread
      body_text: This message came from the Emulate Google API.
      date: "2026-06-22T12:00:00.000Z"
      label_ids:
        - INBOX
        - UNREAD
    - id: msg_emulate_near_inbound
      user_email: e2e.google@example.com
      from: partnerships@near.ai
      to: e2e.google@example.com
      subject: Follow up from NEAR AI
      body_text: Please add this near.ai inbound to the ABC CRM sheet.
      date: "2026-06-22T11:55:00.000Z"
      label_ids:
        - INBOX
        - UNREAD
    - id: msg_emulate_secondary_private
      user_email: secondary.google@example.com
      from: private-sender@example.com
      to: secondary.google@example.com
      subject: Secondary account private message
      body_text: This message must never appear in the primary account.
      date: "2026-06-22T11:50:00.000Z"
      label_ids:
        - INBOX
        - UNREAD
  calendars:
    - id: primary
      user_email: e2e.google@example.com
      summary: E2E Primary Calendar
      description: Calendar data seeded by Emulate for Reborn QA.
      time_zone: UTC
      primary: true
      selected: true
      access_role: owner
    - id: primary
      user_email: secondary.google@example.com
      summary: Secondary Primary Calendar
      description: Isolated calendar for the secondary Emulate identity.
      time_zone: UTC
      primary: true
      selected: true
      access_role: owner
  calendar_events:
    - id: evt_reborn_planning_sync
      user_email: e2e.google@example.com
      calendar_id: primary
      summary: Reborn planning sync
      description: Calendar event seeded by Emulate for Reborn QA.
      start_date_time: "2026-06-22T13:00:00.000Z"
      end_date_time: "2026-06-22T13:30:00.000Z"
      attendees:
        - email: teammate@example.com
          display_name: Teammate
    - id: evt_pepsico_procurement_sync
      user_email: e2e.google@example.com
      calendar_id: primary
      summary: PepsiCo procurement sync
      description: Next meeting company is PepsiCo.
      start_date_time: "2026-06-22T14:00:00.000Z"
      end_date_time: "2026-06-22T14:30:00.000Z"
      attendees:
        - email: buyer@pepsico.example
          display_name: PepsiCo Buyer
    - id: evt_secondary_private
      user_email: secondary.google@example.com
      calendar_id: primary
      summary: Secondary private planning
      description: This event belongs only to the secondary identity.
      start_date_time: "2026-06-22T16:00:00.000Z"
      end_date_time: "2026-06-22T16:30:00.000Z"
  drive_items:
    - id: drv_reborn_qa_brief
      user_email: e2e.google@example.com
      name: Reborn QA Brief
      mime_type: text/plain
      parent_google_ids:
        - root
      data: Drive content seeded by Emulate for Reborn QA.
    - id: drv_pepsico_account_brief
      user_email: e2e.google@example.com
      name: PepsiCo Account Brief
      mime_type: text/plain
      parent_google_ids:
        - root
      data: "PepsiCo account brief: procurement team is evaluating NEAR AI user-owned agents."
    - id: drv_near_ai_strategy
      user_email: e2e.google@example.com
      name: NEAR AI Strategy
      mime_type: text/plain
      parent_google_ids:
        - root
      data: "NEAR AI Strategy: user-owned agents keep credentials and data under user control."
    - id: drv_secondary_private
      user_email: secondary.google@example.com
      name: Secondary Private Brief
      mime_type: text/plain
      parent_google_ids:
        - root
      data: "This Drive item belongs only to the secondary identity."
  documents:
    - id: doc_reborn_strategy
      user_email: e2e.google@example.com
      title: NEAR AI Strategy
      body: "NEAR AI Strategy: user-owned agents keep credentials and data under user control."
  spreadsheets:
    - id: sheet_reborn_abc
      user_email: e2e.google@example.com
      title: ABC
      sheets:
        - id: 0
          title: Sheet1
          values:
            - [Company, Contact, Source, Status, QA Marker]
            - [NEAR AI, partnerships@near.ai, Gmail, New, REBORN_QA_SEEDED]
    - id: sheet_reborn_bug_tracker
      user_email: e2e.google@example.com
      title: Reborn QA Bug Tracker
      sheets:
        - id: 0
          title: Sheet1
          values:
            - [Summary, Reporter, Slack Timestamp, Status, QA Marker]
