# Reborn integration-tier coverage exemptions.
#
# Each [[exemption]] entry excludes ONE source file from the per-crate
# "uncovered" accounting in the Reborn integration-tier coverage report:
#   - Computed by scripts/ci/reborn-coverage-summary.sh from the merged lcov
#     tracefile (scripts/ci/reborn-coverage-merge-lcov.sh), scoped to
#     crates/ironclaw_* (all workspace crates the int-tier suites exercise).
#   - Rendered by the `coverage-report` job in
#     .github/workflows/reborn-tests.yml into $GITHUB_STEP_SUMMARY and a
#     sticky PR comment.
#
# An exempted file's lines are dropped from the per-crate table's
# covered/total line counts entirely — they neither help nor hurt a crate's
# percentage — and the file is listed verbatim, with its reason and tracking
# issue, in the report's own "Exemptions" section. The exclusion must stay
# visible, never silent.
#
# This coverage signal is INFORMATIONAL ONLY: no ratchet, no fail threshold,
# on this report yet. Exemptions exist for visibility/triage today, not to
# game a gate that doesn't exist — every entry still needs a reason and a
# tracking issue so a future ratchet effort (or a reviewer) can tell "known,
# tracked gap" from "nobody looked".
#
# Schema (repeat the [[exemption]] table once per exempted file):
#
#   [[exemption]]
#   module = "crates/ironclaw_x/src/y.rs"                       # required: repo-relative source path
#   reason = "why this file cannot be exercised by int-tier tests"  # required
#   issue  = "https://github.com/nearai/ironclaw/issues/NNNN"   # required: tracking issue
#
# No entries yet — add one per exemption, each with `reason` and `issue`.
