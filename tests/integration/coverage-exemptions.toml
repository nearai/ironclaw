reason = "v1-only: consumed exclusively by the root `ironclaw` package (src/main.rs, src/channels/tui.rs); no crates/*/Cargo.toml depends on it. The crate's own doc comment: \"intentionally decoupled from the main `ironclaw` crate: the Channel trait bridge lives in src/channels/tui.rs\" — i.e. bridged INTO v1, not Reborn. Tracked by .github/workflows/test.yml (\"Tests (Legacy)\"), not this Reborn-scoped report. Confirmed via Cargo.toml reverse-dependency audit, 2026-07-04."
