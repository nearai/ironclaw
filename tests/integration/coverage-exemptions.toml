# Reborn integration-tier coverage exemptions. Each [[exemption]] excludes one
# source file (`module`) or one whole crate (`crate`, never both) from the
# per-crate accounting in scripts/ci/reborn-coverage-summary.sh — informational only, reason + issue required per entry.
#
# Schema — exactly ONE of `module`/`crate` per entry (never both, never
# neither; reborn-coverage-summary.sh rejects malformed entries at parse
# time):
#
#   # Per-file form: exempts one source file.
#   [[exemption]]
#   module = "crates/ironclaw_x/src/y.rs"                       # repo-relative source path
#   reason = "why this file cannot be exercised by the Reborn CI jobs"
#   issue  = "https://github.com/nearai/ironclaw/issues/5657"   # required: tracking issue
#
#   # Whole-crate form: exempts every file under crates/<crate>/.
#   [[exemption]]
#   crate  = "ironclaw_x"
#   reason = "why this whole crate is out of scope for this report"
#   issue  = "https://github.com/nearai/ironclaw/issues/5657"   # required: tracking issue

# Three crates below are v1-only (consumed exclusively by root `ironclaw`, no
# crates/*/Cargo.toml dependents); already covered by .github/workflows/test.yml ("Tests (Legacy)"). Tracked by #5657.

[[exemption]]
crate  = "ironclaw_embeddings"
reason = "v1-only: consumed only by root `ironclaw` (src/app.rs, src/tools/builtin/memory.rs, src/workspace/mod.rs, src/config/{mod,embeddings}.rs); no crates/* dependents. Covered by \"Tests (Legacy)\"."
issue  = "https://github.com/nearai/ironclaw/issues/5657"

[[exemption]]
crate  = "ironclaw_gateway"
reason = "v1-only: consumed only by root `ironclaw` (src/channels/web/platform/static_files.rs, src/channels/web/handlers/frontend.rs); no crates/* dependents. Covered by \"Tests (Legacy)\"."
issue  = "https://github.com/nearai/ironclaw/issues/5657"

[[exemption]]
crate  = "ironclaw_tui"
reason = "v1-only: consumed only by root `ironclaw` (src/main.rs, src/channels/tui.rs); no crates/* dependents. Crate's own doc comment confirms it bridges INTO v1, not Reborn. Covered by \"Tests (Legacy)\"."
issue  = "https://github.com/nearai/ironclaw/issues/5657"
