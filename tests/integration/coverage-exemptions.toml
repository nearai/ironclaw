# Reborn integration-tier coverage exemptions.
#
# Each [[exemption]] entry excludes either ONE source file (`module`) or ONE
# WHOLE CRATE (`crate`) from the per-crate "uncovered" accounting in the
# Reborn integration-tier coverage report:
#   - Computed by scripts/ci/reborn-coverage-summary.sh from the merged lcov
#     tracefile (scripts/ci/reborn-coverage-merge-lcov.sh, now merging both
#     the integration-tier lane artifacts AND the instrumented crate-tests
#     bucket artifacts), scoped to crates/ironclaw_* (all workspace crates
#     the Reborn CI jobs exercise).
#   - Rendered by the `coverage-report` job in
#     .github/workflows/reborn-tests.yml into $GITHUB_STEP_SUMMARY and a
#     sticky PR comment.
#
# An exempted entry's lines are dropped from the per-crate table's
# covered/total line counts entirely — they neither help nor hurt a crate's
# percentage — and the entry is listed verbatim, with its reason and tracking
# issue, in the report's own "Exemptions" section. The exclusion must stay
# visible, never silent.
#
# This coverage signal is INFORMATIONAL ONLY: no ratchet, no fail threshold,
# on this report yet. Exemptions exist for visibility/triage today, not to
# game a gate that doesn't exist — every entry still needs a reason and a
# tracking issue so a future ratchet effort (or a reviewer) can tell "known,
# tracked gap" from "nobody looked".
#
# Schema — exactly ONE of `module`/`crate` per entry (never both, never
# neither; reborn-coverage-summary.sh rejects malformed entries at parse
# time):
#
#   # Per-file form: exempts one source file.
#   [[exemption]]
#   module = "crates/ironclaw_x/src/y.rs"                       # repo-relative source path
#   reason = "why this file cannot be exercised by the Reborn CI jobs"
#   issue  = "https://github.com/nearai/ironclaw/issues/5657"   # required: tracking issue
#
#   # Whole-crate form: exempts every file under crates/<crate>/.
#   [[exemption]]
#   crate  = "ironclaw_x"
#   reason = "why this whole crate is out of scope for this report"
#   issue  = "https://github.com/nearai/ironclaw/issues/5657"   # required: tracking issue

# The following four crates are consumed exclusively by the root `ironclaw`
# v1 package (confirmed via a Cargo.toml reverse-dependency audit, 2026-07-04
# — no crates/*/Cargo.toml depends on any of them) and are already tracked
# and run by a separate CI workflow (.github/workflows/test.yml, "Tests
# (Legacy)"), not this Reborn-scoped report. They are NOT untested; they are
# out of this report's scope by product line.
#
# TODO(open item, not yet filed): file one tracking issue "v1-only crates
# excluded from Reborn coverage scope" covering all four entries below and
# replace the NNNN placeholder with its number before merge.

[[exemption]]
crate  = "ironclaw_embeddings"
reason = "v1-only: consumed exclusively by the root `ironclaw` package (src/app.rs, src/tools/builtin/memory.rs, src/workspace/mod.rs, src/config/{mod,embeddings}.rs); no crates/*/Cargo.toml depends on it. Tracked by .github/workflows/test.yml (\"Tests (Legacy)\"), not this Reborn-scoped report. Confirmed via Cargo.toml reverse-dependency audit, 2026-07-04."
issue  = "https://github.com/nearai/ironclaw/issues/5657"

